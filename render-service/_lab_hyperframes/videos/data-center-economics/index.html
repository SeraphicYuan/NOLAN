<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #F0ECE5;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="159.52"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-boom"
        class="scene"
        data-composition-id="01-boom"
        data-composition-src="compositions/frames/01-boom.html"
        data-start="0"
        data-duration="68.26"
        data-track-index="0"
      ></div>
      <audio
        id="el-01-boom-voice"
        src="assets/voice/01.wav"
        data-start="0"
        data-duration="67.76"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-02-bill"
        class="scene"
        data-composition-id="02-bill"
        data-composition-src="compositions/frames/02-bill.html"
        data-start="67.76"
        data-duration="91.76"
        data-track-index="1"
      ></div>
      <audio
        id="el-02-bill-voice"
        src="assets/voice/02.wav"
        data-start="67.76"
        data-duration="91.76"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <!-- captions -->
      <div
        id="el-captions"
        class="scene"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="159.52"
        data-track-index="2"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-boom", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 67.76);
        tl.fromTo("#el-02-bill", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 67.76);
        tl.to({}, { duration: 159.52 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
