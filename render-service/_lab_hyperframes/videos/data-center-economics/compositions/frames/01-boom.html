      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const R = (id) => document.getElementById(id);

        /* ---------- slow bounded camera drift under everything (multi-phase-camera: drift) ----------
           Scale stays >= 1.006 so the tiny translate never reveals an edge; X and Y ride slightly
           different frequencies so the motion is an organic Lissajous, not a mechanical diagonal. */
        const cam = R("boom-cam");
        const drift = { p: 0 };
        tl.to(
          drift,
          {
            p: Math.PI * 2 * 2,
            duration: 67.76,
            ease: "none",
            onUpdate: () => {
              const s = 1.012 + Math.sin(drift.p) * 0.006;
              const dx = Math.sin(drift.p) * 5;
              const dy = Math.sin(drift.p * 1.3) * 3;
              cam.style.transform = `scale(${s}) translate(${dx}px, ${dy}px)`;
            },
          },
          0
        );

        /* ---------- helpers ---------- */
        // counting-dynamic-scale: value counts A->B while font-size grows A->B in ONE eased tween.
        function countUp(el, from, to, at, dur, fmt, sPx, ePx, ease) {
          const st = { v: from, fs: sPx };
          el.style.fontSize = sPx + "px";
          el.textContent = fmt(from);
          tl.fromTo(
            st,
            { v: from, fs: sPx },
            {
              v: to,
              fs: ePx,
              duration: dur,
              ease: ease || "power3.out",
              onUpdate: () => {
                el.textContent = fmt(st.v);
                el.style.fontSize = st.fs + "px";
              },
            },
            at
          );
        }
        // quiet reveal (opacity + short rise); transforms/opacity only
        function reveal(el, at, dur, y) {
          tl.fromTo(
            el,
            { opacity: 0, y: y == null ? 22 : y },
            { opacity: 1, y: 0, duration: dur || 0.6, ease: "power3.out" },
            at
          );
        }
        // scaleX line draw (rules, chrome bars, arrow)
        function draw(el, at, dur, ease) {
          tl.fromTo(
            el,
            { scaleX: 0, opacity: 0 },
            { scaleX: 1, opacity: 1, duration: dur || 0.6, ease: ease || "power2.out" },
            at
          );
        }
        const money = (v) => "$" + Math.round(v) + "B";
        const moneyT = (v) => "$" + (v >= 1000 ? "1T+" : Math.round(v) + "B");
        const millions = (v) => Math.round(v) + "M";
        const times = (v) => Math.round(v) + "×";
        const pct = (v) => Math.round(v) + "%";

        /* ============================ SCENE 1 (0.0–8.6) ============================
           "the boom is real" slams in word-by-word (kinetic-beat-slam: ONE beat grid,
           DISTINCT entrance per word, short percussive attacks). "real" inks fire-orange
           on its spoken cue (asr-keyword-glow: color + scale emphasis + soft glow). */
        reveal(R("boom-s1kicker"), 0.1, 0.5, 10);
        draw(R("boom-s1rule"), 0.15, 0.5);

        const S1 = [0.15, 1.2, 2.35, 3.35]; // one beat grid for the four words
        // w1 "the" — scale slam
        tl.fromTo(R("boom-w1"), { scale: 1.45, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power4.out" }, S1[0]);
        // w2 "boom" — side snap
        tl.fromTo(R("boom-w2"), { x: -190, opacity: 0 }, { x: 0, opacity: 1, duration: 0.45, ease: "expo.out" }, S1[1]);
        // w3 "is" — rise + rotate
        tl.fromTo(R("boom-w3"), { y: 80, rotation: 6, opacity: 0 }, { y: 0, rotation: 0, opacity: 1, duration: 0.5, ease: "circ.out" }, S1[2]);
        // w4 "real" — scale slam
        tl.fromTo(R("boom-w4"), { scale: 1.45, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power4.out" }, S1[3]);

        // "real" inks fire-orange on the VO cue (~4.4s) and holds
        tl.fromTo(R("boom-w4"), { color: "#f0ece5" }, { color: "#e85d26", duration: 0.35, ease: "power2.out" }, 4.4);
        tl.fromTo(
          R("boom-w4"),
          { textShadow: "0 0 0px rgba(232,93,38,0)" },
          { textShadow: "0 0 18px rgba(232,93,38,0.38)", duration: 0.4, ease: "power2.out" },
          4.4
        );

        // quiet lead beneath, fading up
        reveal(R("boom-s1lead"), 5.5, 0.7, 14);

        /* ============================ SCENE 2 (8.6–25.7) ============================
           Stat grid, the dense frame. Chrome bars, three top-border cards revealed
           left->right, numerals counting up (counting-dynamic-scale). */
        reveal(R("boom-s2kicker"), 8.75, 0.5, 8);
        draw(R("boom-chrometop"), 8.8, 0.7);
        reveal(R("boom-chrometopL"), 9.0, 0.5, 6);
        reveal(R("boom-chrometopR"), 9.0, 0.5, 6);

        // card A: $800B, counts up
        reveal(R("boom-cardA"), 12.5, 0.5, 16);
        countUp(R("boom-cardAnum"), 0, 800, 12.7, 1.5, money, 52, 92, "power3.out");
        // card B: rockets past $800B and tips over into $1T+ (real count-up, same unit as A)
        reveal(R("boom-cardB"), 16.7, 0.5, 16);
        countUp(R("boom-cardBnum"), 0, 1000, 16.95, 1.6, moneyT, 52, 92, "power3.out");
        // card C: "≈ US defense budget" — no count, a slam
        reveal(R("boom-cardC"), 21.35, 0.5, 16);
        tl.fromTo(R("boom-cardCword"), { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power4.out" }, 21.4);

        draw(R("boom-chromebot"), 10.0, 0.7);
        reveal(R("boom-chromebotL"), 10.2, 0.5, 6);
        reveal(R("boom-chromebotR"), 10.2, 0.5, 6);

        /* ============================ SCENE 3 (25.7–34.6) ============================
           OpenAI chatbot users: a single big count-up 400M -> 900M, the figure grows
           with the value; a thin fire-orange arrow between the two states. */
        reveal(R("boom-s3kicker"), 26.0, 0.5, 8);
        reveal(R("boom-s3start"), 26.6, 0.5, 14);
        draw(R("boom-s3arrow"), 26.9, 0.55);
        reveal(R("boom-s3num"), 27.2, 0.4, 10);
        countUp(R("boom-s3num"), 400, 900, 27.7, 2.1, millions, 118, 190, "power3.out");
        reveal(R("boom-s3note"), 32.0, 0.6, 12);

        /* ============================ SCENE 4 (34.6–51.4) ============================
           US electricity to data centers: a left-axis vertical bar-track (stat-bars-and-fills,
           scaleY grow), then a 10x top-border card. */
        reveal(R("boom-s4kicker"), 34.9, 0.5, 8);
        tl.fromTo(R("boom-axis"), { scaleY: 0 }, { scaleY: 1, duration: 0.6, ease: "power2.out" }, 35.2);
        // 4.4% cream-hint bar grows first
        tl.fromTo(R("boom-bar1"), { scaleY: 0 }, { scaleY: 1, duration: 0.85, ease: "power3.out" }, 37.0);
