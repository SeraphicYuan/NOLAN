    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    /* ---------- shared count-up (counting-dynamic-scale): value + font-size in ONE eased tween ---------- */
    const fmtInt = (v) => String(Math.round(v));
    const fmtDec2 = (v) => v.toFixed(2);
    const fmtLoc = (v) => Math.round(v).toLocaleString();
    function countUp(valSel, numSel, target, fmt, at, dur, s0, s1) {
      const v = document.querySelector(valSel);
      const n = document.querySelector(numSel);
      const st = { v: 0, fs: s0 };
      tl.to(st, {
        v: target, fs: s1, duration: dur, ease: "power3.out",
        onUpdate: () => { v.textContent = fmt(st.v); n.style.fontSize = st.fs.toFixed(3) + "cqw"; }
      }, at);
    }

    /* ---------- shared keyword-glow (asr-keyword-glow): attack/sustain/release envelope ----------
       color ramps cream -> fire-orange (permanent ink) while a text-shadow glow blooms then decays. */
    const CREAM = [240, 236, 229], ORANGE = [232, 93, 38];
    const ATTACK = 0.22, RELEASE = 0.45, REST = 0.2;
    function mix(t) {
      return "rgb(" + Math.round(CREAM[0] + (ORANGE[0] - CREAM[0]) * t) + "," +
        Math.round(CREAM[1] + (ORANGE[1] - CREAM[1]) * t) + "," +
        Math.round(CREAM[2] + (ORANGE[2] - CREAM[2]) * t) + ")";
    }
    function ramp(t, s) { return t < s ? 0 : Math.min((t - s) / ATTACK, 1); }          // permanent (ink stays)
    function genv(t, s, e) {                                                            // glow: decays to REST
      if (t < s) return 0;
      if (t < e) return Math.min((t - s) / ATTACK, 1);
      const re = e + RELEASE;
      if (t < re) return 1 - ((t - e) / RELEASE) * (1 - REST);
      return REST;
    }
    function glowDriver(sel, timings, start, dur) {
      const words = gsap.utils.toArray(sel);
      const d = { t: 0 };
      tl.to(d, {
        t: dur, duration: dur, ease: "none",
        onUpdate: () => {
          words.forEach((w) => {
            const tm = timings[w.dataset.g];
            if (!tm) return;
            const c = ramp(d.t, tm.s);
            const g = genv(d.t, tm.s, tm.e);
            w.style.color = mix(c);
            w.style.textShadow = "0 0 " + (g * 15).toFixed(1) + "px rgba(232,93,38," + (0.5 * g).toFixed(3) + ")";
          });
        }
      }, start);
    }
