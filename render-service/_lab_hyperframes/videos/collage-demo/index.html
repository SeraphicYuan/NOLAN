<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0d10; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #0a0d10; }
      .scene { position: absolute; inset: 0; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="7.5"
         data-width="1920" data-height="1080">
      <div id="el-collage-demo" class="scene"
           data-composition-id="collage-demo"
           data-composition-src="compositions/frames/collage-demo.html"
           data-start="0" data-duration="7.5" data-track-index="1"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.to({}, { duration: 7.5 }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
