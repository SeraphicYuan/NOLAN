<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #EFE9DC;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="26.85"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-power"
        class="scene"
        data-composition-id="01-power"
        data-composition-src="compositions/frames/01-power.html"
        data-start="0"
        data-duration="12.01"
        data-track-index="1"
      ></div>
      <audio
        id="el-01-power-voice"
        src="assets/voice/01.wav"
        data-start="0"
        data-duration="12.01"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-02-water"
        class="scene"
        data-composition-id="02-water"
        data-composition-src="compositions/frames/02-water.html"
        data-start="12.01"
        data-duration="9.36"
        data-track-index="1"
      ></div>
      <audio
        id="el-02-water-voice"
        src="assets/voice/02.wav"
        data-start="12.01"
        data-duration="9.36"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <div
        id="el-03-reckoning"
        class="scene"
        data-composition-id="03-reckoning"
        data-composition-src="compositions/frames/03-reckoning.html"
        data-start="21.369999999999997"
        data-duration="5.48"
        data-track-index="1"
      ></div>
      <audio
        id="el-03-reckoning-voice"
        src="assets/voice/03.wav"
        data-start="21.369999999999997"
        data-duration="5.48"
        data-track-index="10"
        data-volume="1"
      ></audio>

      <!-- captions -->
      <div
        id="el-captions"
        class="scene"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="26.85"
        data-track-index="2"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
