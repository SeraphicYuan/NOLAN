<!--
  Highlighter Editorial — caption skin (preset-local source).

  Same engine contract as every skin: captions.mjs fills the three reserved holes
  (GROUPS array · duration/canvas size · the empty data-brand-tokens style) and wraps
  this fragment in a <template> as compositions/captions.html.

  Token contract — reference ONLY the fixed vocab (injected from frame.md):
    --cap-ink · --cap-canvas · --cap-accent · --cap-accent-2 · --font-display ·
    --font-body · --cap-band-top · --cap-band-height
  Hooks (do not rename): .caption-group / .caption-word + states .is-active / .is-spoken,
  root data-composition-id="captions", timeline at window.__timelines["captions"].
  State changes use gsap.set({className}) — never tl.call() callbacks.

  Visual: the explanatory-journalism lower third — a MIST plate (paper, not black),
  sharp corners, a 1px graphene hairline on the bottom edge only. Sentence-case bold
  gothic sans in deep ink. Upcoming words sit at ~45% ink; the CURRENT word takes the
  signature highlighter-yellow block with deep-ink reading on top (the system's one
  accent, swept per word); spoken words settle to solid ink, the yellow cleared.
-->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

<!-- captions.mjs injects the project's :root tokens here -->
<style data-brand-tokens></style>

<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  /* THE paper plate — mist ground, sharp corners, a single 1px graphene hairline
     on the bottom edge (the evidence-bar voice), no shadow */
  .caption-pill {
    max-width: 80%;
    padding: 16px 40px 20px;
    background: var(--cap-canvas, #f1f3f2);
    border-bottom: 2px solid var(--cap-ink, #2b2d2c);
    border-radius: 0;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.05em 0.32em;
    font-family: var(--font-display, "Libre Franklin"), system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 4vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.01em;
  }

  /* upcoming — recessed ink on paper */
  .caption-word {
    display: inline-block;
    padding: 0 0.08em;
    color: color-mix(in srgb, var(--cap-ink, #2b2d2c) 45%, var(--cap-canvas, #f1f3f2));
  }
  /* current word — THE signature: a solid highlighter-yellow block, deep ink on top
     (box-shadow spread = sharp block without layout shift; no blur, no radius) */
  .caption-word.is-active {
    color: var(--cap-ink, #2b2d2c);
    background: var(--cap-accent, #fff200);
    box-shadow: 0 0 0 0.07em var(--cap-accent, #fff200);
  }
  /* already spoken — solid ink, the yellow cleared */
  .caption-word.is-spoken {
    color: var(--cap-ink, #2b2d2c);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  .caption-word.cap-brand {
    text-decoration: underline;
    text-decoration-thickness: 0.12em;
    text-decoration-color: var(--cap-accent, #fff200);
    text-underline-offset: 0.12em;
  }
  .caption-word.cap-num {
    font-variant-numeric: tabular-nums;
    color: var(--cap-ink, #2b2d2c);
  }
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 0.12em;
    text-decoration-color: var(--cap-accent-2, #6d98a8);
    text-underline-offset: 0.12em;
  }

  @media (max-aspect-ratio: 9/16) {
    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(30px, 5vw, 44px);
    }
  }
</style>

<div
  id="captions-root"
  data-composition-id="captions"
  data-timeline-locked
  data-start="0"
  data-duration="0"
  data-fps="30"
  data-width="0"
  data-height="0"
>
  <div class="caption-layer" aria-hidden="true">
    <div id="caption-stage" class="caption-stage"></div>
  </div>
</div>

<script>
  // captions.mjs injects the engine's scene-aware groups + real duration here.
  var GROUPS = [];
  var DURATION = 0;

  (function () {
    var stage = document.getElementById("caption-stage");

    GROUPS.forEach(function (group, g) {
      var groupEl = document.createElement("div");
      groupEl.className = "caption-group";
      groupEl.id = "caption-group-" + g;
      var pill = document.createElement("div");
      pill.className = "caption-pill";
      var line = document.createElement("div");
      line.className = "caption-line";
      (group.words || []).forEach(function (w, i) {
        var span = document.createElement("span");
        span.className = "caption-word";
        span.id = "caption-word-" + g + "-" + i;
        span.textContent = String(w.text);
        line.appendChild(span);
      });
      pill.appendChild(line);
      groupEl.appendChild(pill);
      stage.appendChild(groupEl);
    });

    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    GROUPS.forEach(function (group, g) {
      var groupEl = document.getElementById("caption-group-" + g);
      var words = group.words || [];
      var next = GROUPS[g + 1];
      var isLast = g === GROUPS.length - 1;
      var start = Math.max(0, Number(group.start));
      var end = isLast ? DURATION : Math.min(Number(next.start), Number(group.end) + 0.3);
      if (end <= start) end = start + 0.01;

      tl.set(groupEl, { opacity: 1 }, start);
      tl.set(groupEl, { opacity: 0 }, end);

      words.forEach(function (w, i) {
        var el = document.getElementById("caption-word-" + g + "-" + i);
        var at = Math.max(start, Number(w.start));
        tl.set(el, { className: "caption-word" }, start);
        tl.set(el, { className: "caption-word is-active" }, at);
        tl.fromTo(el, { scale: 0.94 }, { scale: 1, duration: 0.1, ease: "power3.out" }, at);
        if (i + 1 < words.length) {
          var nextAt = Math.max(start, Number(words[i + 1].start));
          tl.set(el, { className: "caption-word is-spoken" }, nextAt);
        }
      });
      if (words.length) {
        var lastEl = document.getElementById("caption-word-" + g + "-" + (words.length - 1));
        var lastSpoken = Math.min(end, Number(words[words.length - 1].end) + 0.1);
        tl.set(lastEl, { className: "caption-word is-spoken" }, lastSpoken);
      }
    });

    tl.to({}, { duration: DURATION }, 0);
    window.__timelines["captions"] = tl;
  })();
</script>
