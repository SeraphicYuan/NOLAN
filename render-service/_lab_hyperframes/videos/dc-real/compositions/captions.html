<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  /* THE paper plate — mist ground, sharp corners, a single 1px graphene hairline
     on the bottom edge (the evidence-bar voice), no shadow */
  .caption-pill {
    max-width: 80%;
    padding: 16px 40px 20px;
    background: var(--cap-canvas, #f1f3f2);
    border-bottom: 2px solid var(--cap-ink, #2b2d2c);
    border-radius: 0;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.05em 0.32em;
    font-family: "Libre Franklin", system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 4vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.01em;
  }

  /* upcoming — recessed ink on paper */
  .caption-word {
    display: inline-block;
    padding: 0 0.08em;
    color: color-mix(in srgb, var(--cap-ink, #2b2d2c) 45%, var(--cap-canvas, #f1f3f2));
  }
  /* current word — THE signature: a solid highlighter-yellow block, deep ink on top
     (box-shadow spread = sharp block without layout shift; no blur, no radius) */
  .caption-word.is-active {
    color: var(--cap-ink, #2b2d2c);
    background: var(--cap-accent, #fff200);
    box-shadow: 0 0 0 0.07em var(--cap-accent, #fff200);
  }
  /* already spoken — solid ink, the yellow cleared */
  .caption-word.is-spoken {
    color: var(--cap-ink, #2b2d2c);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  .caption-word.cap-brand {
    text-decoration: underline;
    text-decoration-thickness: 0.12em;
    text-decoration-color: var(--cap-accent, #fff200);
    text-underline-offset: 0.12em;
  }
  .caption-word.cap-num {
    font-variant-numeric: tabular-nums;
    color: var(--cap-ink, #2b2d2c);
  }
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 0.12em;
    text-decoration-color: var(--cap-accent-2, #6d98a8);
    text-underline-offset: 0.12em;
  }

  @media (max-aspect-ratio: 9/16) {
    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(30px, 5vw, 44px);
    }
  }
