<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0b0c; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #0a0b0c; }
      .scene { position: absolute; inset: 0; width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="25"
         data-width="1920" data-height="1080">
      <div id="el-dg" class="scene"
           data-composition-id="dg"
           data-composition-src="compositions/frames/dg.html"
           data-start="0" data-duration="9" data-track-index="1"></div>
      <div id="el-cmp1" class="scene"
           data-composition-id="cmp1"
           data-composition-src="compositions/frames/cmp1.html"
           data-start="9" data-duration="8" data-track-index="1"></div>
      <div id="el-cmp2" class="scene"
           data-composition-id="cmp2"
           data-composition-src="compositions/frames/cmp2.html"
           data-start="17" data-duration="8" data-track-index="1"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.to({}, { duration: 25 }, 0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
