            const tr = document.getElementById(`field-${id}-transition`);
            if (tr && tr.value !== (scene.transition || 'cut')) out.push('transition');
            const sh = document.getElementById(`field-${id}-shots`);
            if (sh && sh.value.trim() !== (scene.shots ? JSON.stringify(scene.shots) : '')) out.push('shots');
            const effSel = document.getElementById(`mo-${id}-effect`);
            const savedEff = (scene.motion_spec && scene.motion_spec.effect) || '';
            if ((effSel && effSel.value !== savedEff) || _moDirty[id]) out.push('motion spec');
            const note = document.getElementById(`note-${id}`);
            if (note && note.value.trim()) out.push('comment (typed but not sent)');
            return out;
        }
        async function queueSceneChecked(id) {
            const pend = pendingEdits(id);
            if (pend.length) {
                const auto = pend.filter(p => p !== 'comment (typed but not sent)');
                const msg = `Unapplied edits on ${id}: ${pend.join(', ')}.\n\n` +
                    (auto.length ? 'OK → apply them now, then queue.' : 'OK → queue anyway.') +
                    (pend.length !== auto.length ? '\n(Your comment is NOT auto-sent — use ⚡ Quick edit or Send to agent.)' : '') +
                    '\nCancel → don’t queue (review first).';
                if (!confirm(msg)) return;
                if (auto.some(p => p !== 'motion spec')) await applyFields(id);
                if (auto.includes('motion spec')) await moApply(id);
            }
            toggleSelect(id, true);
            renderScenes(); renderInspector();
        }

        // ---------- Iteration: select / edit / comment / re-render ----------
        function toggleSelect(id, checked) {
            if (checked) selectedScenes.add(id); else selectedScenes.delete(id);
            updateRerenderBar();
        }
        function clearSelection() { selectedScenes.clear(); renderScenes(); }

        function updateRerenderBar() {
            let bar = document.getElementById('rerenderBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'rerenderBar';
                bar.className = 'rerender-bar';
                document.body.appendChild(bar);
            }

            bar.style.display = 'flex';
            const agentOpts = fleetAgents.filter(a => a.session_alive)
                .map(a => `<option value="${a.agent}">${a.agent}${a.state==='working'?' (busy)':''}</option>`).join('')
                || '<option value="">no agents</option>';
            bar.innerHTML =
                `<div class="rerender-row">
                   <span>${selectedScenes.size} scene(s) selected · pipeline <b>${currentPipeline}</b></span>
                   <label class="rerender-model">gen model:
                     <select id="rerenderModel">
                       <option value="flux-dev">flux-dev</option>
                       <option value="z-image">z-image-turbo</option>
                     </select>
                   </label>
                   <button onclick="clearSelection()">Clear</button>
                   <button class="primary" onclick="rerenderSelected()">Re-render selected</button>
                 </div>
                 <div class="rerender-row">
                   <input id="agentNote" class="agent-note mention-input" placeholder="note for the agent · @ references assets/motions (e.g. @[motion]kinetic-text)">
                   <label class="rerender-model">agent:
                     <select id="agentSelect" class="js-agent-select">${agentOpts}</select>
                   </label>
                   <button class="primary" onclick="dispatchToAgent()">Send to agent →</button>
                   <span id="rerenderMsg" class="rerender-msg"></span>
                 </div>`;
        }

        function toggleEdit(id) {
            const p = document.getElementById(`edit-${id}`);
            p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        }

        // Per-beat super search — the /broll pairing engine WITH the loaded project + this scene's
        // beat as context (auto-located server-side from the narration).
        function superSearchToggle(id) {
            const p = document.getElementById(`ss-${id}`);
            p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        }
        function _pollSS(jobId) {
            return new Promise(resolve => {
                (function tick() {
                    fetch(`/api/jobs/${jobId}`).then(r => r.json()).then(j => {
                        if (['done', 'error', 'cancelled'].includes(j.status)) resolve(j);
                        else setTimeout(tick, 1500);
                    }).catch(() => setTimeout(tick, 2500));
                })();
            });
        }
        async function superSearch(id) {
            const scene = allScenes.find(s => s.id === id);
            const line = scene ? (scene.narration_excerpt || scene.visual_description || '') : '';
            if (!line) { return; }
            const op = (document.getElementById(`ss-op-${id}`) || {}).value || 'auto';
            const st = document.getElementById(`ss-status-${id}`);
            const out = document.getElementById(`ss-results-${id}`);
            st.textContent = `searching (${op})…`; out.innerHTML = '';
            try {
                const start = await (await fetch('/api/scenes/scene/super-search', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, line, operator: op, media: ['image', 'video'] })
                })).json();
                const job = await _pollSS(start.job_id);
                if (job.status !== 'done' || !job.result) { st.textContent = 'failed: ' + (job.error || job.status); return; }
                renderSSPicks(id, job.result);
            } catch (e) { st.textContent = 'error: ' + e.message; }
        }
        function renderSSPicks(id, res) {
            const st = document.getElementById(`ss-status-${id}`);
            const out = document.getElementById(`ss-results-${id}`);
            let trace = '';
            if (res.auto) {
                const a = res.auto;
                trace = `<div class="ss-trace">🤖 chose <b>${esc(a.chosen || a.primary)}</b>` +
                    (a.judge ? ` · judge ${a.judge.score}/10` : '') + ` — ${esc(a.why || '')}</div>`;
            }
            const picks = res.picks || [];
            st.textContent = `${res.status} · ${picks.length} pick(s)`;
            if (!picks.length) { out.innerHTML = trace + `<div class="ss-trace">Nothing fit (${esc(res.reason || '')}).</div>`; return; }
            const cards = picks.map(c => {
                const isVid = c.kind === 'video' || /\.mp4($|\?)/.test(c.url || '');
                const media = (c.kind === 'image')
                    ? `<img src="${esc(c.poster || c.url)}">`
                    : (c.poster ? `<img src="${esc(c.poster)}">` : `<video src="${esc(c.url)}" muted></video>`);
                const kind = isVid ? 'video' : 'image';
                // data-attrs + a real listener (below) — inline onclick with a URL breaks the attribute quoting
                return `<div class="ss-pick">${media}<div class="ss-meta">${esc(c.source || '')} · ${esc((c.why || '').slice(0, 40))}</div>` +
                    `<button class="ss-attach" data-url="${esc(c.url)}" data-kind="${kind}" data-source="${esc(c.source || '')}">Attach →</button></div>`;
            }).join('');
            out.innerHTML = trace + `<div class="ss-grid">${cards}</div>`;
            out.querySelectorAll('.ss-attach').forEach(btn => {
                btn.addEventListener('click', () => attachAsset(id, btn.dataset.url, btn.dataset.kind, btn.dataset.source));
            });
        }
        async function attachAsset(id, url, kind, source) {
            const st = document.getElementById(`ss-status-${id}`);
            st.textContent = 'attaching…';
            try {
                const start = await (await fetch('/api/scenes/scene/attach', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_id: id, url, kind, source })
                })).json();
                const job = await _pollSS(start.job_id);
                if (job.status === 'done') { st.textContent = '✓ attached — reloading'; await loadSceneData(); }
                else st.textContent = 'attach failed: ' + (job.error || job.status);
            } catch (e) { st.textContent = 'error: ' + e.message; }
        }
        function setEditMode(id, mode) {
            ['note','assets','fields'].forEach(m => {
                const body = document.getElementById(`body-${m}-${id}`);
                if (body) body.style.display = (mode === m) ? 'block' : 'none';
                const tab = document.getElementById(`tab-${m}-${id}`);
                if (tab) tab.classList.toggle('active', mode === m);
            });
        }

        // ---------- Asset tray (per-scene binding) ----------
        const ANCHORS = [[0.2,0.25],[0.5,0.2],[0.8,0.25],[0.2,0.5],[0.5,0.5],[0.8,0.5],[0.2,0.78],[0.5,0.82],[0.8,0.78]];
        function placeDots(sceneId, a) {
            const cur = a.place ? `${a.place[0]},${a.place[1]}` : '';
            const dots = ANCHORS.map(p => {
                const on = (`${p[0]},${p[1]}` === cur);
                return `<i class="pdot${on?' on':''}" title="place ${p[0]},${p[1]}"
                          onclick="assetSetPlace('${sceneId}','${a.id}',[${p[0]},${p[1]}])"></i>`;
            }).join('');
            const clr = a.place ? `<i class="pclr" title="auto-place" onclick="assetSetPlace('${sceneId}','${a.id}',null)">×</i>` : '';
            return `<div class="pgrid">${dots}${clr}</div>`;
        }
        function assetTrayHtml(scene) {
            const assets = scene.assets || [];
            const pin = scene.pinned_asset || null;
            const pinBar = pin ? `
                <div class="tray-pinbar">📌 Pinned for this beat: <b>${esc((pin.src||'').split(/[\\\\/]/).pop())}</b>
                    ${pin.note ? ` — “${esc(pin.note)}”` : ''}
                    <button class="tray-x" title="unpin" onclick="assetOp('${scene.id}',{op:'unpin'}).then(()=>refreshScenes())">✕</button>
                </div>` : '';
            const candHtml = candidatesHtml(scene);
            if (!assets.length && !pinBar && !candHtml)
                return `<div class="tray-empty">No assets yet — search below to add pictures.</div>`;
            return pinBar + assets.map((a, i) => `
                <div class="tray-card" draggable="true"
                     ondragstart="trayDragStart(event,'${scene.id}','${a.id}')"
                     ondragover="event.preventDefault()"
                     ondrop="trayDrop(event,'${scene.id}','${a.id}')">
                    <span class="tray-idx">${i}</span>
                    <span class="tray-kind ${a.kind||'image'}" title="${a.kind||'image'}">${(a.kind||'image')==='image'?'IMG':(a.kind==='clip'||a.kind==='video'?'VID':a.kind.toUpperCase())}</span>
                    <img class="tray-thumb" src="${a.thumb || assetUrl(a.src)}" alt="">
                    <div class="tray-meta">
                        <div class="tray-label" title="id=${a.id}">${esc(a.label || a.id)}</div>
                        ${placeDots(scene.id, a)}
                    </div>
                    <button class="tray-eye" title="preview" onclick="previewAsset('${scene.id}','${a.id}')">⤢</button>
                    <button class="tray-pin" title="pin: THIS asset for THIS beat (outranks auto-matching)"
                            onclick="pinAsset('${scene.id}','${a.id}')">📌</button>
                    <button class="tray-x" title="remove" onclick="assetOp('${scene.id}',{op:'remove',asset_id:'${a.id}'})">✕</button>
                </div>`).join('') + candHtml;
        }
        function candidatesHtml(scene) {
            // Review tray: what matching CONSIDERED (library runner-ups) —
            // one click swaps it in via the existing pin flow. Candidates are
            // referenced by index (Windows paths can't ride inline handlers).
            const cands = scene.asset_candidates || [];
            if (!cands.length) return '';
            return `<div class="tray-cands"><div class="insp-note">Matching also considered:</div>` +
                cands.map((c, i) => `
                <div class="tray-card cand">
                    <img class="tray-thumb" src="${assetUrl(c.src)}" alt="">
                    <div class="tray-meta"><div class="tray-label">${esc((c.src||'').split(/[\\\\/]/).pop())} · ${c.score}</div></div>
                    <button class="tray-pin" title="use this instead (pins it)"
                            onclick="pinCandidate('${scene.id}', ${i})">📌 use</button>
                    <button class="tray-pin" title="${shortlistKeys.has('path:' + c.src)
                                ? 'shortlisted — click to remove from the shortlist'
                                : 'shortlist for this scene — the next match run prefers it (softer than pin)'}"
                            onclick="shortlistCandidate('${scene.id}', ${i})">${shortlistKeys.has('path:' + c.src) ? '★' : '☆'}</button>
                </div>`).join('') + `</div>`;
        }
        function pinCandidate(sceneId, idx) {
            const scene = allScenes.find(s => s.id === sceneId);
            const c = scene && (scene.asset_candidates || [])[idx];
            if (!c) return;
            assetOp(sceneId, {op:'pin', src: c.src, kind:'image'}).then(()=>refreshScenes()).catch(e => alert(e.message));
        }
        async function shortlistCandidate(sceneId, idx) {
            // Softer than pin: TOGGLES the project shortlist WITH a scene hint,
            // so the matcher's tier-0 prefers it on the next match run.
            const scene = allScenes.find(s => s.id === sceneId);
            const c = scene && (scene.asset_candidates || [])[idx];
            if (!c) return;
            const key = 'path:' + c.src;
            const st = document.getElementById(`editstatus-${sceneId}`);
            try {
                if (shortlistKeys.has(key)) {
                    const res = await fetch('/api/shortlist/remove', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ project: currentProject, keys: [key] }) });
                    if (!res.ok) throw new Error(await res.text());
                    shortlistKeys.delete(key);
                    if (st) st.textContent = 'Removed from shortlist.';
                } else {
                    const note = prompt('Optional note (why this asset for this scene):') || '';
                    const body = { project: currentProject, path: c.src, kind: 'image', scene_hint: sceneId };
                    if (note) body.note = note;
                    const res = await fetch('/api/pool/shortlist', {
                        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                    if (!res.ok) throw new Error(await res.text());
                    shortlistKeys.add(key);
                    if (st) st.textContent = `Shortlisted for ${sceneId} — the next match run prefers it. Click ★ to undo.`;
                }
                const tray = document.getElementById(`tray-${sceneId}`);
                if (tray) tray.innerHTML = assetTrayHtml(scene);
            } catch (e) { alert('shortlist: ' + e.message); }
        }
        async function loadShortlistKeys() {
            try {
                const j = await (await fetch('/api/shortlist?project=' + encodeURIComponent(currentProject))).json();
                shortlistKeys = new Set((j.items || []).map(it => it.key));
            } catch (e) { shortlistKeys = new Set(); }
        }
        function pinAsset(sceneId, assetId) {
            const note = prompt('Optional note for the design passes (e.g. "slow pan over the letter"):') || '';
            assetOp(sceneId, {op:'pin', asset_id: assetId, note}).then(()=>refreshScenes()).catch(e => alert(e.message));
        }
        function assetUrl(src) {
            // best-effort thumb for path-added assets that live under the project
            return `/scenes/file?project=${encodeURIComponent(currentProject)}&path=${encodeURIComponent(src)}&_=${assetNonce}`;
        }
        async function assetOp(sceneId, body) {
            body.project = currentProject; body.scene_id = sceneId;
            const res = await fetch('/api/scenes/scene/assets', {
                method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(j.detail || res.statusText);
            const scene = allScenes.find(s => s.id === sceneId);
            if (scene) scene.assets = j.assets;
            const tray = document.getElementById(`tray-${sceneId}`);
            if (tray && scene) tray.innerHTML = assetTrayHtml(scene);
            const tab = document.getElementById(`tab-assets-${sceneId}`);
            if (tab) tab.textContent = 'Assets' + (j.assets.length ? ` (${j.assets.length})` : '');
            return j;
        }
        function assetSetPlace(sceneId, assetId, place) {
            assetOp(sceneId, {op:'set_place', asset_id: assetId, place}).catch(e => alert(e.message));
        }
        // ---------- Drag & drop (desktop): reorder tray + drop local files onto a scene ----------
        let _trayDrag = null;
        function trayDragStart(e, sceneId, aid) {
            _trayDrag = { sceneId, aid };
            e.dataTransfer.effectAllowed = 'move';
            try {
                e.dataTransfer.setData('text/plain', aid);
                // timeline drop target reads this to pin the asset elsewhere
                e.dataTransfer.setData('application/x-nolan-tray',
                                       JSON.stringify({ sceneId, assetId: aid }));
            } catch (x) {}
        }
        function trayDrop(e, sceneId, targetId) {
            e.preventDefault(); e.stopPropagation();
            if (!_trayDrag || _trayDrag.sceneId !== sceneId) { _trayDrag = null; return; }
            const scene = allScenes.find(s => s.id === sceneId); if (!scene) { _trayDrag = null; return; }
            const ids = (scene.assets || []).map(a => a.id);
            const from = ids.indexOf(_trayDrag.aid), to = ids.indexOf(targetId);
            _trayDrag = null;
            if (from < 0 || to < 0 || from === to) return;
            ids.splice(to, 0, ids.splice(from, 1)[0]);
            assetOp(sceneId, { op: 'reorder', order: ids }).catch(err => alert(err.message));
        }
        function sceneDragOver(e) {
            if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
                e.preventDefault();
                e.currentTarget.classList.add('drop-target');
            }
        }
        function sceneDragLeave(e) { e.currentTarget.classList.remove('drop-target'); }
        async function sceneFileDrop(e, sceneId) {
            const files = e.dataTransfer && e.dataTransfer.files;
            if (!files || !files.length) return;   // tray reorder (no files) — ignore here
            e.preventDefault(); e.stopPropagation();
            e.currentTarget.classList.remove('drop-target');
            for (const file of files) {
                if (!/^(image|video)\//.test(file.type)) continue;
                try {
                    const fd = new FormData();
                    fd.append('project', currentProject); fd.append('file', file);
                    const res = await fetch('/api/scenes/scene/upload', { method: 'POST', body: fd });
                    const j = await res.json();
                    if (!res.ok) throw new Error(j.detail || 'upload failed');
                    await assetOp(sceneId, { op: 'add', source: 'path', path: j.path, kind: j.kind, label: j.label });
                } catch (err) { alert('Drop failed: ' + err.message); }
            }
        }

        // ---------- typed @-mentions: @[scope]token autocomplete ----------
        // `@` opens the scope menu; `@[pic]quer` autocompletes within that scope.
        // The inserted token is canonical (`@[pic]123`, `@[motion]kenburns-pan`) —
        // the server (nolan.mentions) expands it into an explicit reference at
        // the revise/dispatch doors, so the LLM/agent gets a real path, not prose.
        // Works in any .edit-note / .mention-input field. Legacy bare `@a1`
        // (scene tray assets) still completes too.
        (function () {
            const SCOPES = [
                ['asset',  'tray assets bound to the scene'],
                ['pic',    'picture library (global + project)'],
                ['vid',    'saved clips from the video library'],
                ['motion', 'camera treatments + motion effects'],
                ['pool',   'project asset pool (by filename)'],
            ];
            let pop = null, curTa = null, matchStart = 0, seq = 0, debTimer = null;
            let motionCache = null;
            function ensure() {
                if (!pop) { pop = document.createElement('div'); pop.className = 'mention-pop'; pop.style.display = 'none'; document.body.appendChild(pop); }
                return pop;
            }
            function hide() { if (pop) pop.style.display = 'none'; curTa = null; }
            function isMentionField(el) {
                return el.classList && (el.classList.contains('edit-note') || el.classList.contains('mention-input'));
            }
            function scenesFor(ta) {
                // note-<sceneId> fields scope the asset search to that scene;
                // the re-render bar / timeline dialog search every scene.
                const id = (ta.id || '').replace(/^note-/, '');
                const one = allScenes.find(s => s.id === id);
                return one ? [one] : allScenes;
            }
            function show(ta, html) {
                const p = ensure();
                p.innerHTML = html;
                const r = ta.getBoundingClientRect();
                p.style.left = (r.left + window.scrollX) + 'px';
                p.style.top = (r.bottom + window.scrollY + 2) + 'px';
                p.style.width = Math.max(260, r.width) + 'px';
                p.style.display = 'block';
            }
            function scopeMenu(partial) {
                const hits = SCOPES.filter(([s]) => s.startsWith(partial || ''));
                if (!hits.length) return '';
                return hits.map(([s, doc]) => `<div class="mention-item" data-insert="@[${s}]" data-keep="1">
                    <b>@[${s}]</b><span class="mi-label">${doc}</span></div>`).join('');
            }
            function assetItems(ta, q) {
                const seen = new Set();
                const out = [];
                for (const scene of scenesFor(ta)) {
                    for (const a of (scene.assets || [])) {
                        if (seen.has(a.id)) continue;
                        if (!(a.id + ' ' + (a.label || '')).toLowerCase().includes(q)) continue;
                        seen.add(a.id);
                        out.push({ token: '@[asset]' + a.id, thumb: a.thumb || assetUrl(a.src),
                                   label: `${a.id} · ${a.kind || 'image'} · ${(a.label || '').slice(0, 36)}` });
                    }
                }
                return out.slice(0, 8);
            }
            async function fetchScopeItems(ta, scope, q) {
                if (scope === 'asset') return assetItems(ta, q);
                if (scope === 'motion') {
                    if (!motionCache) {
                        const j = await (await fetch('/api/motion/registry')).json();
                        motionCache = (j.treatments || []).map(t =>
                                          ({ token: '@[motion]' + t, label: `${t} · camera treatment` }))
                            .concat((j.effects || []).map(e =>
                                          ({ token: '@[motion]' + e.id, label: `${e.id} · ${e.purpose.slice(0, 44)}` })));
                    }
                    return motionCache.filter(it => it.token.slice(9).toLowerCase().includes(q)).slice(0, 8);
                }
                if (scope === 'pic') {
                    const url = q
                        ? `/api/images/search?q=${encodeURIComponent(q)}&scope=both&project=${encodeURIComponent(currentProject)}&k=8`
                        : `/api/images/list?scope=global&limit=8`;
                    const j = await (await fetch(url)).json();
                    return (j.results || []).map(h =>
                        ({ token: '@[pic]' + h.id, thumb: h.raw, label: `#${h.id} · ${(h.title || '').slice(0, 40)}` }));
                }
                if (scope === 'vid') {
                    const j = await (await fetch(`/api/library/clips?projects=${encodeURIComponent(currentProject)}`)).json();
                    return (j.clips || [])
                        .filter(c => ((c.label || '') + ' ' + (c.video_name || '') + ' ' + c.id).toLowerCase().includes(q))
                        .slice(0, 8).map(c =>
                        ({ token: '@[vid]' + c.id, thumb: thumbUrl(c.source_video_path, c.clip_start),
                           label: `${(c.label || c.video_name || c.id).slice(0, 40)} · ${c.clip_start}-${c.clip_end}s` }));
                }
                if (scope === 'pool') {
                    const j = await (await fetch(`/api/pool?project=${encodeURIComponent(currentProject)}`)).json();
                    return (j.items || [])
                        .filter(it => it.exists && (it.name || '').toLowerCase().includes(q))
                        .slice(0, 8).map(it =>
                        ({ token: '@[pool]' + it.name, label: `${it.name} · ${it.kind} · ${it.status}` }));
                }
                return [];
            }
            function itemsHtml(items) {
                return items.map(it => `<div class="mention-item" data-insert="${esc(it.token)}">
                    ${it.thumb ? `<img src="${it.thumb}" onerror="this.style.visibility='hidden'">` : ''}
                    <b>${esc(it.token)}</b><span class="mi-label">${esc(it.label)}</span></div>`).join('');
            }
            document.addEventListener('input', function (e) {
                const ta = e.target;
                if (!isMentionField(ta)) return;
                const before = ta.value.slice(0, ta.selectionStart);
                // scoped form first: @[scope]query
                const ms = before.match(/@\[(\w+)\]([\w.#-]*)$/);
                const mo = !ms && before.match(/@(?:\[)?(\w*)$/);   // @  @par  @[par
                if (!ms && !mo) return hide();
                curTa = ta;
                if (ms) {
                    matchStart = ta.selectionStart - ms[0].length;
                    const scope = ms[1], q = (ms[2] || '').toLowerCase();
                    if (!SCOPES.some(([s]) => s === scope)) return hide();
                    const mySeq = ++seq;
                    clearTimeout(debTimer);
                    debTimer = setTimeout(async () => {
                        try {
                            const items = await fetchScopeItems(ta, scope, q);
                            if (mySeq !== seq || curTa !== ta) return;   // stale response
                            if (!items.length) return hide();
                            show(ta, itemsHtml(items));
                        } catch (err) { hide(); }
                    }, scope === 'asset' || scope === 'motion' ? 0 : 220);
                } else {
                    matchStart = ta.selectionStart - mo[0].length;
                    const partial = (mo[1] || '').toLowerCase();
                    // scope menu + (legacy) direct tray-asset hits on a bare @query
                    const legacy = mo[0].startsWith('@[') ? [] : assetItems(ta, partial);
                    const html = scopeMenu(partial) + itemsHtml(legacy);
                    if (!html) return hide();
                    show(ta, html);
                }
            });
            document.addEventListener('click', function (e) {
                if (!pop || pop.style.display === 'none') return;
                const item = e.target.closest && e.target.closest('.mention-item');
                if (item && curTa) {
                    const ins = item.getAttribute('data-insert');
                    const keep = item.getAttribute('data-keep');   // scope chosen -> keep typing the query
                    const ta = curTa, pos = ta.selectionStart;
                    const suffix = keep ? '' : ' ';
                    ta.value = ta.value.slice(0, matchStart) + ins + suffix + ta.value.slice(pos);
                    const np = matchStart + ins.length + suffix.length;
                    ta.focus(); ta.setSelectionRange(np, np);
                    if (keep) ta.dispatchEvent(new Event('input', { bubbles: true }));
                    else hide();
                } else if (!pop.contains(e.target)) hide();
            });
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') hide(); });
        })();

        // ---------- Asset picker drawer (browse + search, multi-select) ----------
        let pickerScene = null, pickerTab = 'pictures', pickerSel = new Map(), pickerItems = [];
        let vidScope = 'project', vidSource = 'clips', vidVideo = null, pickerVideos = [];
        function openPicker(sceneId) {
            pickerScene = sceneId; pickerSel = new Map();
            document.getElementById('pickerTitle').textContent = 'Add assets → ' + sceneId;
            document.getElementById('pickerDrawer').classList.add('open');
            document.getElementById('pickerBackdrop').classList.add('open');
            // Arriving from a library "Send to essay" opens straight on Shortlist.
            setPickerTab(window._shortlistIntent ? 'shortlist' : 'pictures');
        }
        function closePicker() {
            document.getElementById('pickerDrawer').classList.remove('open');
            document.getElementById('pickerBackdrop').classList.remove('open');
            pickerScene = null;
        }
        function setPickerTab(tab) {
            pickerTab = tab; vidVideo = null;
            document.getElementById('ptab-pictures').classList.toggle('active', tab === 'pictures');
            document.getElementById('ptab-videos').classList.toggle('active', tab === 'videos');
            document.getElementById('ptab-shortlist').classList.toggle('active', tab === 'shortlist');
            document.getElementById('ptab-pool').classList.toggle('active', tab === 'pool');
            document.getElementById('pickerQ').placeholder = tab === 'pictures'
                ? 'search pictures (blank = browse all)…'
                : tab === 'pool' ? 'filter by name or status (in-video/candidate/…)…' : 'filter by name…';
            renderSub(); loadPicker();
        }
        function renderSub() {
            const sub = document.getElementById('pickerSub');
            if (pickerTab !== 'videos') { sub.style.display = 'none'; sub.innerHTML = ''; return; }
            sub.style.display = 'flex';
            const tog = (cur, val, lbl, fn) => `<button class="subbtn${cur===val?' on':''}" onclick="${fn}('${val}')">${lbl}</button>`;
            sub.innerHTML =
                `<span class="subseg">Scope ${tog(vidScope,'project','This project','setVidScope')}${tog(vidScope,'all','All','setVidScope')}</span>` +
                `<span class="subseg">Source ${tog(vidSource,'clips','Saved clips','setVidSource')}${tog(vidSource,'segments','Segments','setVidSource')}</span>`;
        }
        function setVidScope(s) { vidScope = s; vidVideo = null; renderSub(); loadPicker(); }
        function setVidSource(s) { vidSource = s; vidVideo = null; renderSub(); loadPicker(); }
        function pickKey(it) { return `${it.source}:${it.k}`; }
        function thumbUrl(src, t) { return `/api/scenes/frame-thumb?project=${encodeURIComponent(currentProject)}&src=${encodeURIComponent(src)}&t=${t||0}`; }

        async function loadPicker() {
            const q = document.getElementById('pickerQ').value.trim();
            const grid = document.getElementById('pickerGrid');
            grid.innerHTML = '<div class="loading">Loading…</div>';
            try {
                if (pickerTab === 'pictures') return renderItems(await fetchPictures(q), grid);
                if (pickerTab === 'shortlist') return renderItems(await fetchShortlist(q), grid);
                if (pickerTab === 'pool') return renderItems(await fetchPool(q), grid);
                if (vidSource === 'clips') return renderItems(await fetchClips(q), grid);
                if (!vidVideo) return renderVideoList(await fetchVideos(q), grid);
                return renderItems(await fetchSegments(vidVideo, q), grid, true);
            } catch (e) { grid.innerHTML = '<div class="tray-empty">Error: ' + e.message + '</div>'; }
        }
        async function fetchPictures(q) {
            const url = q
                ? `/api/images/search?q=${encodeURIComponent(q)}&scope=both&project=${encodeURIComponent(currentProject)}&k=40`
                : `/api/images/list?scope=global&limit=60`;
            const j = await (await fetch(url)).json();
            return (j.results || []).map(h => ({
                source: 'library', k: h.id, thumb: h.raw, label: h.title || ('#' + h.id),
                payload: {op:'add', source:'library', image_id: h.id, scope: h.scope || 'global',
                          scope_project: h.scope_project || null, label: h.title || ''} }));
        }
        // The per-project shortlist: assets curated from the Picture/Clip
        // libraries. Items are already in op:add payload shape, so adding one to
        // a scene goes through the same path as any other picker source.
        async function fetchShortlist(q) {
            if (!currentProject) return [];
            const j = await (await fetch('/api/shortlist?project=' + encodeURIComponent(currentProject))).json();
            let items = j.items || [];
            if (q) { const ql = q.toLowerCase(); items = items.filter(it => (it.label || '').toLowerCase().includes(ql)); }
            return items.map(it => ({
                source: (it.payload && it.payload.source) || it.kind, k: it.key,
                thumb: it.thumb, label: it.label, payload: it.payload,
            }));
        }
        // The project asset pool (derived bin): everything the project has,
        // labeled by usage status. Adding one to a scene goes through the same
        // op:add path — and pool cards drag onto the timeline like any picker card.
        async function fetchPool(q) {
            if (!currentProject) return [];
            const j = await (await fetch(`/api/pool?project=${encodeURIComponent(currentProject)}`)).json();
            let items = (j.items || []).filter(it => it.exists);
            if (q) { const ql = q.toLowerCase(); items = items.filter(it =>
                (it.name + ' ' + (it.status || '')).toLowerCase().includes(ql)); }
            return items.map(it => ({
                source: 'pool', k: it.path,
                thumb: it.kind === 'video' ? thumbUrl(it.path, 1)
                                           : `/api/pool/file?path=${encodeURIComponent(it.path)}`,
                label: `${it.status && it.status !== 'unused' ? '[' + it.status + '] ' : ''}${it.name}`,
                payload: { op: 'add', source: 'path', path: it.path, kind: it.kind, label: it.name } }));
        }
        async function fetchClips(q) {
            const proj = vidScope === 'project' ? currentProject : '';
            const j = await (await fetch(`/api/library/clips?projects=${encodeURIComponent(proj)}`)).json();
            let clips = j.clips || [];
            if (q) { const ql = q.toLowerCase(); clips = clips.filter(c =>
                ((c.label||'') + ' ' + (c.video_name||'')).toLowerCase().includes(ql)); }
            return clips.map(c => ({
                source: 'clip', k: c.id, thumb: thumbUrl(c.source_video_path, c.clip_start),
                label: c.label || c.video_name || c.id,
                payload: {op:'add', source:'clip', source_video_path: c.source_video_path,
                          clip_start: c.clip_start, clip_end: c.clip_end, label: c.label || c.video_name || ''} }));
        }
        async function fetchVideos(q) {
            const proj = vidScope === 'project' ? currentProject : '';
            const j = await (await fetch(`/api/library/videos${proj?`?project=${encodeURIComponent(proj)}`:''}`)).json();
            let vids = j.videos || [];
            if (q) { const ql = q.toLowerCase(); vids = vids.filter(v => (v.name||'').toLowerCase().includes(ql)); }
            return vids;
        }
        async function fetchSegments(videoPath, q) {
            const j = await (await fetch(`/api/library/videos/${encodeURIComponent(videoPath)}/segments`)).json();
            let segs = j.segments || [];
            if (q) { const ql = q.toLowerCase(); segs = segs.filter(s =>
                ((s.frame_description||'') + ' ' + (s.transcript||'')).toLowerCase().includes(ql)); }
            return segs.map((s, i) => ({
                source: 'seg', k: `${videoPath}#${s.timestamp_start}`,
                thumb: thumbUrl(s.video_path, s.timestamp_start),
                label: s.frame_description || s.timestamp_formatted || ('seg ' + i),
                payload: {op:'add', source:'clip', source_video_path: s.video_path,
                          clip_start: s.timestamp_start, clip_end: s.timestamp_end,
                          label: s.frame_description || s.timestamp_formatted || ''} }));
        }
        function renderVideoList(videos, grid) {
            grid.className = 'picker-list';
            pickerVideos = videos;
            if (!videos.length) { grid.innerHTML = '<div class="tray-empty">No indexed videos in scope.</div>'; return; }
            grid.innerHTML = videos.map((v, i) => `
                <div class="vid-row" onclick="pickVideo(${i})">
                    <span class="vid-name">${esc(v.name)}</span>
                    <span class="vid-meta">${v.segment_count||0} segs · ${esc(v.duration_formatted||'')} ›</span>
                </div>`).join('');
        }
        function pickVideo(i) { const v = pickerVideos[i]; if (!v) return; vidVideo = v.path;
            document.getElementById('pickerQ').value = ''; loadPicker(); }
        function renderItems(items, grid, segMode) {
            grid.className = 'picker-grid';
            pickerItems = items;
            const back = segMode ? `<div class="seg-back" onclick="vidVideo=null;loadPicker()">← all videos</div>` : '';
            if (!items.length) { grid.innerHTML = back + '<div class="tray-empty">Nothing here.</div>'; return; }
            grid.innerHTML = back + items.map((it, i) => {
                const on = pickerSel.has(pickKey(it));
                return `<div class="pk-card${on?' on':''}" data-key="${pickKey(it)}" onclick="togglePick(${i})"
                    draggable="true" ondragstart="pickDragStart(event,${i})">
                    <img src="${it.thumb}" loading="lazy" alt=""><span>${esc((it.label||'').slice(0,42))}</span>
                    <i class="pk-eye" title="preview" onclick="event.stopPropagation();previewItem(${i})">⤢</i>
                    <i class="pk-check">✓</i></div>`;
            }).join('');
        }
        function pickDragStart(e, i) {
            const it = pickerItems[i];
            if (!it || !it.payload) return;
            try {   // timeline drop target: add -> pin on the target scene
                e.dataTransfer.setData('application/x-nolan-pick',
                                       JSON.stringify({ payload: it.payload }));
            } catch (x) {}
        }
        function togglePick(i) {
            const it = pickerItems[i]; if (!it) return;
            const key = pickKey(it);
            if (pickerSel.has(key)) pickerSel.delete(key); else pickerSel.set(key, it.payload);
            const el = document.querySelector(`.pk-card[data-key="${key}"]`);
            if (el) el.classList.toggle('on', pickerSel.has(key));
            document.getElementById('pickerAdd').textContent = `Add ${pickerSel.size} to scene`;
            document.getElementById('pickerAdd').disabled = pickerSel.size === 0;
        }
        async function pickerAddSelected() {
            if (!pickerScene || !pickerSel.size) return;
            const btn = document.getElementById('pickerAdd'); btn.disabled = true; btn.textContent = 'Adding…';
            try {
                for (const payload of pickerSel.values()) await assetOp(pickerScene, {...payload});
                closePicker();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        async function postRevise(body) {
            const res = await fetch('/api/scenes/scene/revise', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body) });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(j.detail || res.statusText);
            return j;
        }

        async function refreshScenes() {
            const res = await fetch(`/api/scenes/scenes/flat?project=${encodeURIComponent(currentProject)}`);
            const data = await res.json();
            allScenes = data.scenes;
            renderScenes();
            // scene DATA changed — refresh the open Inspector (list repaints
            // alone deliberately don't, to preserve an in-progress comment)
            if (inspectorScene) renderInspector();
        }

        // Populate the flow-refine agent selector from the live tmux sessions (script_projects pattern).
        async function loadFlowAgents() {
            const sel = document.getElementById('flowAgent'); if (!sel) return;
            try {
                const sessions = ((await (await fetch('/api/library/tmux-sessions')).json()).sessions) || [];
                const list = sessions.length ? sessions : ['nolan4'];
                const cur = sel.value;
                sel.innerHTML = list.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
                if (list.includes(cur)) sel.value = cur;
                else if (list.includes('nolan4')) sel.value = 'nolan4';
            } catch (e) { sel.innerHTML = '<option value="nolan4">nolan4</option>'; }
        }

        // Authoring mode (Gate A): refine the per-beat plan via the chosen NOLAN agent, then accept it.
        async function flowRefine() {
            if (!currentProject) return;
            const stats = document.getElementById('stats');
            const agent = (document.getElementById('flowAgent') || {}).value || 'nolan4';
            stats.textContent = `✨ Dispatching ${agent} to refine the plan…`;
            try {
                const r = await fetch('/api/scenes/flow/refine', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, agent })
                });
                const d = await r.json();
                stats.textContent = r.ok
                    ? `Refining via ${d.dispatched || agent} — watch the fleet panel, then ✓ Accept draft.`
                    : ('Refine error: ' + (d.detail || r.status));
            } catch (e) { stats.textContent = 'Refine error: ' + e.message; }
        }

        async function flowAccept() {
            if (!currentProject) return;
            if (!confirm("Promote the refined draft to this project's plan? (replaces the current plan)")) return;
            const stats = document.getElementById('stats');
            stats.textContent = 'Accepting draft…';
            try {
                const r = await fetch('/api/scenes/flow/accept', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject })
                });
                const d = await r.json();
                if (r.ok) { await loadSceneData(); }
                else { stats.textContent = 'Accept error: ' + (d.detail || r.status); }
            } catch (e) { stats.textContent = 'Accept error: ' + e.message; }
        }

        async function applyNote(id) {
            const note = document.getElementById(`note-${id}`).value.trim();
            const st = document.getElementById(`editstatus-${id}`);
            if (!note) { st.textContent = 'Enter a comment first.'; return; }
            st.textContent = 'Applying (agent)…';
            try {
                const r = await postRevise({ project: currentProject, scene_id: id, note });
                const keys = Object.keys(r.applied || {});
                const miss = (r.unresolved_mentions || []).length
                    ? ` ⚠ unresolved: ${r.unresolved_mentions.join(', ')}` : '';
                const msg = (keys.length ? ('Applied: ' + keys.join(', ') + ' — Re-render to see it') : 'No change produced.') + miss;
                if (keys.length) { selectedScenes.add(id); editedScenes.add(id); await refreshScenes(); }
                // refreshScenes re-renders the Inspector — write to the FRESH element
                const st2 = document.getElementById(`editstatus-${id}`) || st;
                st2.textContent = msg;
            } catch (e) { st.textContent = 'Error: ' + e.message; }
        }

        async function applyFields(id) {
            const scene = allScenes.find(s => s.id === id);
            const patch = {};
            inlineEditFields(scene).forEach(f => {
                const el = document.getElementById(`field-${id}-${f}`);
                if (el && el.value !== (scene[f] ?? '').toString()) patch[f] = el.value;
            });
            const st = document.getElementById(`editstatus-${id}`);
            // editing-umbrella fields (select / JSON — validated at the premium gate)
            const tr = document.getElementById(`field-${id}-transition`);
            if (tr && tr.value !== (scene.transition || 'cut')) patch.transition = tr.value;
            const sh = document.getElementById(`field-${id}-shots`);
            if (sh) {
                const cur = scene.shots ? JSON.stringify(scene.shots) : '';
                if (sh.value.trim() !== cur) {
                    if (!sh.value.trim()) { patch.shots = null; }
                    else {
                        try { patch.shots = JSON.parse(sh.value); }
                        catch (e) { st.textContent = 'shots is not valid JSON: ' + e.message; return; }
                    }
                }
            }
            if (Object.keys(patch).length === 0) { st.textContent = 'No changes.'; return; }
            st.textContent = 'Saving…';
            try {
                const r = await postRevise({ project: currentProject, scene_id: id, patch });
                selectedScenes.add(id);
                editedScenes.add(id);
                await refreshScenes();
                // refreshScenes re-renders the Inspector — write to the FRESH element
                const st2 = document.getElementById(`editstatus-${id}`) || st;
                st2.textContent = 'Saved: ' + Object.keys(r.applied || {}).join(', ') + ' — Re-render to see it';
            } catch (e) { st.textContent = 'Error: ' + e.message; }
        }

        async function rerenderSelected() {
            const ids = [...selectedScenes];
            if (ids.length === 0) return;
            // last gate: the open Inspector may hold typed-but-unapplied edits
            if (inspectorScene) {
                const pend = pendingEdits(inspectorScene);
                if (pend.length && !confirm(
                    `${inspectorScene} has unapplied edits: ${pend.join(', ')}.\n\n` +
                    'OK → run WITHOUT them (renders the saved values).\n' +
                    'Cancel → go back and Apply first.')) return;
            }
            const msg = document.getElementById('rerenderMsg');
            const model = (document.getElementById('rerenderModel') || {}).value || 'flux-dev';
            // pre-render plan (dry run): what this run will actually do, per scene
            msg.textContent = 'Planning…';
            try {
                const pr = await fetch('/api/scenes/rerender/plan', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: ids }) });
                const pj = await pr.json().catch(() => ({}));
                if (!pr.ok) throw new Error(pj.detail || pr.statusText);
                const lines = (pj.scenes || []).map(p => {
                    const flags = (p.conflicts || []);
                    const worst = flags.some(c => c.severity === 'error') ? ' ⛔'
                                : flags.some(c => c.severity === 'warn') ? ' ⚠' : '';
                    return `• ${p.id} (${p.duration}s): ${p.re_match ? 'RE-MATCH asset + render' : 'render'}`
                         + ` — via ${p.winner.rung}${p.winner.media ? ` (${p.winner.media})` : ''}`
                         + `${p.camera ? `, camera ${p.camera}` : ''}${worst}`;
                });
                const conflictMsgs = (pj.scenes || []).flatMap(p =>
                    (p.conflicts || []).map(c => `  ${p.id}: ${c.message}`));
                if (!confirm(`Render plan — ${ids.length} scene(s), model ${model}:\n\n`
                        + lines.join('\n')
                        + (conflictMsgs.length ? '\n\nConflicts:\n' + conflictMsgs.join('\n') : '')
                        + '\n\nRun now?')) { msg.textContent = ''; return; }
            } catch (e) { msg.textContent = 'Plan error: ' + e.message; return; }
            msg.textContent = 'Submitting…';
            try {
                const res = await fetch('/api/scenes/rerender', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: ids, comfyui_model: model }) });
                const j = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(j.detail || res.statusText);
                pollJob(j.job_id, msg);
            } catch (e) { msg.textContent = 'Error: ' + e.message; }
        }

        async function pollJob(jobId, msg) {
            msg.textContent = 'Rendering…';
            const tick = async () => {
                try {
                    const r = await fetch(`/api/jobs/${jobId}`);
                    const j = await r.json();
                    msg.textContent = j.message || j.status;
                    if (j.status === 'done') {
                        msg.textContent = 'Done ✓ — reloading';
                        selectedScenes.clear();
                        await loadSceneData();
                        return;
                    }
                    if (j.status === 'error') { msg.textContent = 'Error: ' + (j.error || 'render failed'); return; }
                    if (j.status === 'cancelled') { msg.textContent = 'Cancelled'; return; }
                } catch (e) { msg.textContent = 'Poll error: ' + e.message; }
                setTimeout(tick, 1500);
            };
            tick();
        }

        // Reload the current project's scenes + clips (e.g. after an agent finishes).
        async function refreshView() {
            if (!currentProject) return;
            const btn = document.getElementById('refreshBtn');
            const label = btn ? btn.textContent : '';
            if (btn) { btn.textContent = '↻ Refreshing…'; btn.disabled = true; }
            assetNonce = Date.now();          // force re-rendered clips to reload (bypass cache)
            try {
                await loadSceneData();
                await loadFleet();
                if (tlOn) await loadTimeline();
            } finally {
                if (btn) { btn.textContent = label || '↻ Refresh'; btn.disabled = false; }
            }
        }

        // ---------- Fleet: dispatch scenes to Claude Code agents + status board ----------
        async function loadFleet() {
            try {
                const r = await fetch('/api/scenes/fleet');
                fleetAgents = (await r.json()).agents || [];
            } catch (e) { fleetAgents = []; }
            renderFleet();
            refreshAgentSelect();   // update dropdown options in place (don't rebuild the bar / lose the note)
        }

        function refreshAgentSelect() {
            const live = fleetAgents.filter(a => a.session_alive);
            const opts = live.length
                ? live.map(a => `<option value="${a.agent}">${a.agent}${a.state==='working'?' (busy)':''}</option>`).join('')
                : '<option value="">no agents</option>';
            document.querySelectorAll('.js-agent-select').forEach(sel => {
                const cur = sel.value;
                sel.innerHTML = opts;
                if (cur && live.some(a => a.agent === cur)) sel.value = cur;
            });
        }

        function renderFleet() {
            let panel = document.getElementById('fleetPanel');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'fleetPanel';
                panel.className = 'fleet-panel';
                document.body.appendChild(panel);
            }
            if (!fleetAgents.length) { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            const rows = fleetAgents.map(a => {
                const st = a.state || 'idle';
                const where = a.scene_ids ? ` · ${(a.scene_ids || []).join(', ')}` : '';
                const msg = a.message ? `<div class="fleet-msg">${a.message}</div>` : '';
                const dead = a.session_alive ? '' : ' (gone)';
                return `<div class="fleet-agent">
                          <span class="fleet-dot ${st}"></span>
                          <b>${a.agent}</b><span class="fleet-state">${st}${dead}${where}</span>
                          ${msg}
                        </div>`;
            }).join('');
            panel.innerHTML = `<div class="fleet-title">Agents</div>${rows}`;
        }

        async function dispatchToAgent() {

            const agent = (document.getElementById('agentSelect') || {}).value || '';

            try {
                const res = await fetch('/api/scenes/dispatch', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: ids, note, agent }) });
                const j = await res.json().catch(() => ({}));

        // ---------- Preview modal (image OR in/out-bounded clip) ----------
        function _lbReset() {
            const img = document.getElementById('lightboxImg');
            const vid = document.getElementById('lightboxVid');
            img.style.display = 'none'; img.src = '';
            vid.style.display = 'none'; try { vid.pause(); } catch (e) {}
            vid.src = ''; vid.onloadedmetadata = null; vid.ontimeupdate = null;
            document.getElementById('lightboxCap').textContent = '';
        }
        function openLightbox(src, cap) {
            _lbReset();
            const img = document.getElementById('lightboxImg');
            img.src = src; img.style.display = '';
            document.getElementById('lightboxCap').textContent = cap || '';
            document.getElementById('lightbox').classList.add('active');
        }
        function openClipPreview(src, start, end, cap) {
            _lbReset();
            const vid = document.getElementById('lightboxVid');
            start = +start || 0; end = (end != null && +end > start) ? +end : null;
            vid.src = `/api/scenes/source-video?project=${encodeURIComponent(currentProject)}&src=${encodeURIComponent(src)}`;
            vid.style.display = '';
            vid.onloadedmetadata = () => { try { vid.currentTime = start; vid.play().catch(() => {}); } catch (e) {} };
            // bound playback to the clip's out-point (loop the segment)
            vid.ontimeupdate = () => { if (end != null && vid.currentTime >= end) vid.currentTime = start; };
            document.getElementById('lightboxCap').textContent = cap || '';
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            _lbReset();
        }
        // Preview a picker result (image → full pic; clip/segment → bounded video).
        function previewItem(i) {
            const it = pickerItems[i]; if (!it) return;
            if (it.source === 'library') return openLightbox(it.thumb, it.label);
            const p = it.payload || {};
            openClipPreview(p.source_video_path, p.clip_start, p.clip_end, it.label);
        }
        // Preview a bound tray asset.
        function previewAsset(sceneId, assetId) {
            const scene = allScenes.find(s => s.id === sceneId); if (!scene) return;
            const a = (scene.assets || []).find(x => x.id === assetId); if (!a) return;
            if (a.kind === 'clip' || a.kind === 'video') return openClipPreview(a.src, a.clip_start, a.clip_end, a.label || a.id);
            openLightbox(a.thumb || assetUrl(a.src), a.label || a.id);
        }
        // Close on backdrop or × click — never when interacting with the media itself.
        document.getElementById('lightbox').addEventListener('click', function (e) {
            if (e.target === this || e.target.classList.contains('lightbox-close')) closeLightbox();
        });

        // Seek audio to time and set range
        function seekTo(start, end, sceneId) {
            const audio = document.getElementById('audioPlayer');
            if (audio.src) {
                // Set playback range
                playbackRange = { start, end, sceneId };

                // Show range UI
                const rangeContainer = document.getElementById('playbackRange');
                const rangeInfo = document.getElementById('rangeInfo');
                rangeContainer.style.display = 'flex';
                rangeInfo.textContent = `${formatTime(start)} - ${formatTime(end)} (${sceneId})`;

                // Seek and play
                audio.currentTime = start;
                audio.play();
            }
        }

        // Stop range playback
        function stopRangePlayback() {
            const audio = document.getElementById('audioPlayer');
            audio.pause();
            playbackRange = null;
            document.getElementById('playbackRange').style.display = 'none';
        }

        // Update audio time display and highlight current scene
        function updateAudioTime() {
            const audio = document.getElementById('audioPlayer');
            const timeDisplay = document.getElementById('audioTime');
            const currentTime = audio.currentTime;

            timeDisplay.textContent = formatTime(currentTime);

            // Check range playback
            if (playbackRange && currentTime >= playbackRange.end) {
                const loopCheckbox = document.getElementById('loopCheckbox');
                if (loopCheckbox.checked) {
                    // Loop back to start
                    audio.currentTime = playbackRange.start;
                } else {
                    // Stop at end
                    audio.pause();
                    playbackRange = null;
                    document.getElementById('playbackRange').style.display = 'none';
                }
            }

            // Highlight current scene
            document.querySelectorAll('.srow').forEach(row => {
                const start = parseFloat(row.dataset.start);
                const end = parseFloat(row.dataset.end);
                if (currentTime >= start && currentTime < end) {
                    row.classList.add('active');
                    // Scroll into view if not visible
                    if (!isElementInViewport(row)) {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    row.classList.remove('active');
                }
            });
        }

        function isElementInViewport(el) {
            const rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Load projects list
        async function loadProjects() {
            try {
                const res = await fetch('/api/scenes/projects');
                const data = await res.json();
                projects = data.projects || [];

                const projectFilter = document.getElementById('projectFilter');
                projectFilter.innerHTML = '<option value="">Select Project...</option>';

                projects.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.name;
                    option.textContent = `${p.name} (${p.scene_count} scenes)`;
                    projectFilter.appendChild(option);
                });

                // Set from URL or auto-select if only one project
                currentProject = getProjectFromUrl();
                // A library "Send to essay" lands here with ?shortlist=1 — make
                // the asset picker open on the Shortlist tab from then on.
                window._shortlistIntent = new URLSearchParams(window.location.search).get('shortlist') === '1';
                if (!currentProject && projects.length === 1) {
                    currentProject = projects[0].name;
                    updateUrl(currentProject);
                }

                if (currentProject) {
                    projectFilter.value = currentProject;
                    await loadSceneData();
                } else if (projects.length === 0) {
                    document.getElementById('sceneList').innerHTML =

                } else {
                    document.getElementById('sceneList').innerHTML =
                        '<div class="loading">Select a project from the dropdown above.</div>';
                }

                console.error('Failed to load projects:', err);
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Error loading projects.</div>';
            }
        }

        // Load scene data for current project
        async function loadSceneData() {
            if (!currentProject) return;

            try {
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Loading scene plan...</div>';

                // Load scenes
                const scenesRes = await fetch(`/api/scenes/scenes/flat?project=${encodeURIComponent(currentProject)}`);
                const scenesData = await scenesRes.json();
                allScenes = scenesData.scenes;
                sections = scenesData.sections;
                currentPipeline = scenesData.pipeline || 'segment';
                editableFields = scenesData.editable_fields || [];
                // authoring-mode controls (Refine / Accept) only for flow projects
                const fc = document.getElementById('flowControls');
                if (fc) {
                    const isFlow = (currentPipeline === 'flow');
                    fc.style.display = isFlow ? '' : 'none';
                    if (isFlow) loadFlowAgents();
                }
                selectedScenes.clear();
                editedScenes.clear();
                await loadShortlistKeys();

                // Reset and populate section filter
                const sectionFilter = document.getElementById('sectionFilter');
                sectionFilter.innerHTML = '<option value="all">All Sections</option>';
                sections.forEach(section => {
                    const option = document.createElement('option');
                    option.value = section;
                    option.textContent = section;
                    sectionFilter.appendChild(option);
                });
                currentSection = 'all';

                renderScenes();

                // Deep link (e.g. from /pool scene chips): ?scene=<id> opens the Inspector once.
                const deepScene = new URLSearchParams(window.location.search).get('scene');
                if (deepScene && !window._deepSceneDone && allScenes.some(s => s.id === deepScene)) {
                    window._deepSceneDone = true;
                    openInspector(deepScene);
                    const row = document.querySelector(`.srow[data-scene-id="${deepScene}"]`);
                    if (row) row.scrollIntoView({ block: 'center' });
                }

                // Load audio
                const audioRes = await fetch(`/api/scenes/audio-info?project=${encodeURIComponent(currentProject)}`);
                const audioData = await audioRes.json();
                const audioContainer = document.getElementById('audioContainer');
                const audioPlayer = document.getElementById('audioPlayer');

                if (audioData.exists) {
                    audioPlayer.src = audioData.path;
                    audioContainer.style.display = 'flex';
                    audioPlayer.ontimeupdate = updateAudioTime;   // assignment, not addEventListener — loadSceneData runs repeatedly
                } else {
                    audioContainer.style.display = 'none';
                    audioPlayer.src = '';
                }

            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Error loading scene plan.</div>';
            }
        }
