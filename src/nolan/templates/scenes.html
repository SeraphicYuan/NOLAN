        // Initialize
        // ---------- Timeline view (P2, read-only) ----------
        // The scene plan on a time axis, derived server-side (/api/timeline):
        // sections (locked), scenes, visual units with MOTION BADGES (authored
        // solid / derived dashed — the same still-treatment pre-pass premium
        // runs), sfx markers, VO envelope. Click-through opens the Inspector.
        let tlOn = false, tlData = null, tlPps = 12;   // px per second

        async function toggleTimeline() {
            tlOn = !tlOn;
            document.getElementById('timelinePanel').style.display = tlOn ? 'block' : 'none';
            document.getElementById('tlToggle').style.borderColor = tlOn ? 'var(--accent)' : '';
            if (tlOn) await loadTimeline();
        }
        async function loadTimeline() {
            if (!currentProject) return;
            const res = await fetch(`/api/timeline?project=${encodeURIComponent(currentProject)}`);
            if (!res.ok) {
                document.getElementById('tlCanvas').innerHTML =
                    `<div class="tray-empty">timeline unavailable: ${esc(await res.text())}</div>`;
                return;
            }
            tlData = await res.json();
            renderTimeline();
        }
        function tlZoom(f) { tlPps = Math.min(60, Math.max(3, tlPps * f)); renderTimeline(); }
        function tlX(t) { return Math.round((t || 0) * tlPps); }

        function renderTimeline() {
            if (!tlData) return;
            const d = tlData, W = Math.max(600, tlX(d.duration) + 20);
            let html = '';

            // ruler
            const step = d.duration > 240 ? 30 : d.duration > 90 ? 10 : 5;
            let ticks = '';
            for (let t = 0; t <= d.duration; t += step)
                ticks += `<div class="tl-tick" style="left:${tlX(t)}px">${t}s</div>`;
            html += `<div class="tl-ruler" style="width:${W}px">${ticks}</div>`;

            // sections (locked)
            html += `<div class="tl-lane" style="width:${W}px"><span class="tl-lanelabel">sections</span>` +
                d.sections.map(s =>
                    `<div class="tl-block sec" style="left:${tlX(s.start)}px;width:${tlX(s.end) - tlX(s.start) - 2}px"
                          title="locked — narration owns duration">🔒 ${esc(s.name)}</div>`).join('') + `</div>`;

            // scenes (click -> Inspector; edge-drag = roll edit within section)
            html += `<div class="tl-lane" style="width:${W}px"><span class="tl-lanelabel">scenes</span>` +
                d.scenes.map(s => {
                    if (s.start == null || s.end == null) return '';
                    const num = (s.id || '').replace(/^scene_0*/, '');
                    return `<div class="tl-block scene${s.dirty ? ' dirty' : ''}" data-scene="${esc(s.id)}"
                              style="left:${tlX(s.start)}px;width:${Math.max(14, tlX(s.end) - tlX(s.start) - 2)}px"
                              title="${esc(s.id)} · ${esc(s.visual_type || '')}${s.dirty ? ' · NO RENDERED CLIP (renders fresh next run)' : ''}\n${esc(s.excerpt || '')}\ndrag an edge to retime (neighbors absorb it)">
                              <span class="tl-h l" data-edge="start"></span>${num}<span class="tl-h r" data-edge="end"></span></div>`;
                }).join('') + `</div>`;

            // visual units: media + motion badge (click a camera badge to lock)
            html += `<div class="tl-lane" style="width:${W}px"><span class="tl-lanelabel">visual</span>` +
                d.units.map(u => {
                    if (u.start == null || u.end == null) return '';
                    const w = Math.max(14, tlX(u.end) - tlX(u.start) - 2);
                    const lockable = u.motion && TL_TREATMENTS.includes(u.motion.badge);
                    const badge = u.motion ?
                        `<span class="tl-badge ${u.motion.source}${lockable ? ' lockable' : ''}"
                            data-scene="${esc(u.scene_id)}" data-badge="${esc(u.motion.badge)}"
                            title="${u.motion.source === 'derived'
                            ? 'derived — what the next render will do. CLICK to lock/cycle the camera; shift-click back to auto'
                            : lockable ? 'locked by you. CLICK to cycle; shift-click back to auto'
                                       : 'authored on the plan'}">${u.motion.source === 'authored' && lockable ? '🔒' : ''}${esc(u.motion.badge)}</span>` : '';
                    const shots = u.shots > 1 ? `<span class="tl-shots">×${u.shots}</span>` : '';
                    const pin = u.pinned ? '📌' : '';
                    const label = u.media ? esc(u.media) : '<i style="opacity:.5">no media</i>';
                    const confl = (u.intent && u.intent.conflicts) || [];
                    const worst = confl.some(c => c.severity === 'error') ? 'error'
                                : confl.some(c => c.severity === 'warn') ? 'warn'
                                : confl.length ? 'info' : '';
                    const mark = worst ? `<span class="tl-conflict ${worst}">${worst === 'error' ? '⛔' : '⚠'}</span>` : '';
                    const conflTitle = confl.map(c => `${c.severity.toUpperCase()}: ${c.message}`).join('\n');
                    return `<div class="tl-block unit" data-scene="${esc(u.scene_id)}" data-drop="1"
                              style="left:${tlX(u.start)}px;width:${w}px"
                              title="${esc(u.media || 'no media')} — renders via ${esc((u.intent && u.intent.winner) || '?')}${u.citation ? '\n' + esc(u.citation) : ''}${conflTitle ? '\n' + esc(conflTitle) : ''}\ndrop a tray/picker asset here to PIN it">${mark}${pin}${w > 90 ? label : ''}${badge}${shots}</div>`;
                }).join('') + `</div>`;

            // audio: VO envelope + sfx markers
            const peaks = (d.vo && d.vo.peaks) || [];
            let svg = '';
            if (peaks.length) {
                const h = 30, pw = tlPps / d.vo.rate;
                const pts = peaks.map((p, i) =>
                    `${(i * pw).toFixed(1)},${(h - p * h).toFixed(1)}`).join(' ');
                svg = `<svg class="tl-vo" width="${W}" height="${h}" preserveAspectRatio="none">
                         <polyline points="0,${h} ${pts} ${(peaks.length * pw).toFixed(1)},${h}"
                           fill="rgba(37,99,235,.25)" stroke="rgba(37,99,235,.7)" stroke-width="1"/></svg>`;
            }
            const sfx = (d.sfx || []).map(c =>
                `<span class="tl-sfx" style="left:${tlX(c.t)}px"
                       title="sfx: ${esc(c.label)} (${esc(c.scene_id)})">♪</span>`).join('');
            html += `<div class="tl-lane audio" style="width:${W}px"><span class="tl-lanelabel">audio</span>${svg}${sfx}</div>`;

            // notes lane: range notes (drag on the empty lane to add one)
            const notes = (d.notes || []).map((n, i) =>
                `<div class="tl-block note ${n.status || 'open'}" data-note="${esc(n.id)}"
                      style="left:${tlX(n.t0)}px;width:${Math.max(16, tlX(n.t1) - tlX(n.t0) - 2)}px"
                      title="${esc(n.text || '')}\n${n.asset ? 'asset: ' + esc(n.asset) + '\n' : ''}${n.motion ? 'motion: ' + esc(n.motion) + '\n' : ''}status: ${esc(n.status || 'open')} — click to apply/manage">📝 ${esc((n.text || n.motion || 'note').slice(0, 40))}</div>`).join('');
            html += `<div class="tl-lane notes" id="tlNotesLane" style="width:${W}px"
                          title="drag here to add a range note">
                        <span class="tl-lanelabel">notes</span>${notes}</div>`;

            const canvas = document.getElementById('tlCanvas');
            canvas.style.width = W + 'px';
            canvas.innerHTML = html;
            document.getElementById('tlStat').textContent =
                `${Math.round(d.duration)}s · ${d.scenes.length} scenes · ${d.sfx.length} sfx cues · ${(d.notes || []).length} notes`;
        }

        // ---------- Timeline edits (P3) ----------
        const TL_TREATMENTS = ['kenburns-in', 'kenburns-out', 'kenburns-pan', 'drift', 'tour'];

        async function tlPost(url, body) {
            body.project = currentProject;
            const res = await fetch(url, { method: 'POST',
                headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(j.detail || res.statusText);
            return j;
        }

        document.getElementById('tlCanvas').addEventListener('click', async e => {
            const badge = e.target.closest('.tl-badge.lockable');
            if (badge) {                       // camera lock: cycle / shift = back to auto
                e.stopPropagation();
                try {
                    const next = e.shiftKey ? null
                        : TL_TREATMENTS[(TL_TREATMENTS.indexOf(badge.dataset.badge) + 1) % TL_TREATMENTS.length];
                    await tlPost('/api/timeline/treatment',
                                 { scene_id: badge.dataset.scene, treatment: next });
                    await loadTimeline();
                } catch (err) { alert('treatment: ' + err.message); }
                return;
            }
            const noteEl = e.target.closest('.tl-block.note');
            if (noteEl) { tlManageNote(noteEl.dataset.note); return; }
            if (e.target.closest('.tl-h')) return;      // edge handle, not a click
            const b = e.target.closest('[data-scene]');
            if (b) openInspector(b.dataset.scene);
        });

        // edge drag = roll edit (neighbors absorb; section bounds locked server-side)
        let tlDrag = null;
        document.getElementById('tlCanvas').addEventListener('mousedown', e => {
            const h = e.target.closest('.tl-h');
            if (!h) return;
            const block = h.closest('.tl-block.scene');
            tlDrag = { scene: block.dataset.scene, edge: h.dataset.edge,
                       x0: e.clientX, left0: parseFloat(block.style.left),
                       w0: parseFloat(block.style.width), block };
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!tlDrag) return;
            const dx = e.clientX - tlDrag.x0;
            if (tlDrag.edge === 'start') {
                tlDrag.block.style.left = (tlDrag.left0 + dx) + 'px';
                tlDrag.block.style.width = Math.max(10, tlDrag.w0 - dx) + 'px';
            } else {
                tlDrag.block.style.width = Math.max(10, tlDrag.w0 + dx) + 'px';
            }
        });
        document.addEventListener('mouseup', async e => {
            if (!tlDrag) return;
            const d = tlDrag; tlDrag = null;
            const dx = e.clientX - d.x0;
            if (Math.abs(dx) < 3) return;                 // a click, not a drag
            const secs = dx / tlPps;
            const body = { scene_id: d.scene };
            const sc = tlData.scenes.find(s => s.id === d.scene);
            if (!sc) return;
            if (d.edge === 'start') body.start = sc.start + secs;
            else body.end = sc.end + secs;
            try {
                const r = await tlPost('/api/timeline/scene-window', body);
                await loadTimeline();
                await loadSceneData();                     // windows changed -> refresh list
            } catch (err) { alert('retime: ' + err.message); await loadTimeline(); }
        });

        // drop a TRAY or PICKER card on a unit block -> pin that asset there
        document.getElementById('tlCanvas').addEventListener('dragover', e => {
            if (e.target.closest('[data-drop]')) e.preventDefault();
        });
        document.getElementById('tlCanvas').addEventListener('drop', async e => {
            const unit = e.target.closest('[data-drop]');
            if (!unit) return;
            e.preventDefault();
            const sceneId = unit.dataset.scene;
            try {
                const tray = e.dataTransfer.getData('application/x-nolan-tray');
                const pick = e.dataTransfer.getData('application/x-nolan-pick');
                if (tray) {                                // {sceneId, assetId} from the tray
                    const t = JSON.parse(tray);
                    const a = (allScenes.find(s => s.id === t.sceneId)?.assets || [])
                              .find(x => x.id === t.assetId);
                    if (!a || !a.src) throw new Error('tray asset has no src');
                    await assetOp(sceneId, { op: 'pin', src: a.src, kind: a.kind || 'image' });
                } else if (pick) {                         // picker payload: add -> pin
                    const p = JSON.parse(pick);
                    const j = await assetOp(sceneId, { ...p.payload });
                    const added = (j.assets || [])[j.assets.length - 1];
                    if (added) await assetOp(sceneId, { op: 'pin', asset_id: added.id });
                } else { return; }
                await loadTimeline(); await loadSceneData();
            } catch (err) { alert('pin: ' + err.message); }
        });

        // range note: drag on the notes lane -> dialog -> POST /api/timeline/note
        let tlNoteDrag = null;
        document.getElementById('tlCanvas').addEventListener('mousedown', e => {
            const lane = e.target.closest('.tl-lane.notes');
            if (!lane || e.target.closest('.tl-block')) return;
            const rect = lane.getBoundingClientRect();
            tlNoteDrag = { lane, t0: (e.clientX - rect.left) / tlPps, rect };
            e.preventDefault();
        });
        document.addEventListener('mouseup', e => {
            if (!tlNoteDrag) return;
            const d = tlNoteDrag; tlNoteDrag = null;
            const t1 = (e.clientX - d.rect.left) / tlPps;
            if (Math.abs(t1 - d.t0) * tlPps < 8) return;   // too small: ignore
            tlOpenNoteDialog(Math.min(d.t0, t1), Math.max(d.t0, t1));
        });

        function tlOpenNoteDialog(t0, t1) {
            document.getElementById('tlnT0').value = t0.toFixed(1);
            document.getElementById('tlnT1').value = t1.toFixed(1);
            document.getElementById('tlnText').value = '';
            document.getElementById('tlnAsset').value = '';
            document.getElementById('tlnMotion').value = '';
            document.getElementById('tlNoteDlg').showModal();
        }
        async function tlSaveNote(applyNow) {
            const body = {
                t0: parseFloat(document.getElementById('tlnT0').value),
                t1: parseFloat(document.getElementById('tlnT1').value),
                text: document.getElementById('tlnText').value.trim(),
                asset: document.getElementById('tlnAsset').value.trim() || null,
                motion: document.getElementById('tlnMotion').value || null,
            };
            try {
                const note = await tlPost('/api/timeline/note', body);
                document.getElementById('tlNoteDlg').close();
                if (applyNow) await tlApplyNote(note.id);
                else await loadTimeline();
            } catch (err) { alert('note: ' + err.message); }
        }
        async function tlApplyNote(noteId) {
            try {
                const r = await tlPost('/api/timeline/note/apply', { note_id: noteId });
                if (r.route === 'agent' && r.note.text) {
                    // free text -> the EXISTING revise lane against the note's scene
                    await fetch('/api/scenes/scene/revise', { method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ project: currentProject,
                            scene_id: r.scene_id, note: r.note.text }) });
                    await tlPost('/api/timeline/note/update',
                                 { note_id: noteId, status: 'dispatched' });
                }
                await loadTimeline(); await loadSceneData();
            } catch (err) { alert('apply: ' + err.message); }
        }
        async function tlManageNote(noteId) {
            const n = (tlData.notes || []).find(x => x.id === noteId);
            if (!n) return;
            const act = prompt(
                `note ${n.id} [${n.status}]: "${n.text || ''}"` +
                (n.asset ? `\nasset: ${n.asset}` : '') + (n.motion ? `\nmotion: ${n.motion}` : '') +
                `\n\ntype: apply / delete / (cancel)`, 'apply');
            if (act === 'apply') await tlApplyNote(noteId);
            else if (act === 'delete') {
                await tlPost('/api/timeline/note/update', { note_id: noteId, status: 'deleted' });
                await loadTimeline();
            }
        }

        loadProjects();
        loadFleet();
        setInterval(loadFleet, 5000);   // poll the agent fleet board
</script>

<div class="picker-backdrop" id="pickerBackdrop" onclick="closePicker()"></div>
<div class="picker-drawer" id="pickerDrawer">
    <div class="picker-head">
        <span id="pickerTitle">Add assets</span>
        <button class="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div class="picker-tabs">
        <button class="ptab active" id="ptab-pictures" onclick="setPickerTab('pictures')">Pictures</button>
        <button class="ptab" id="ptab-videos" onclick="setPickerTab('videos')">Videos / Clips</button>
        <button class="ptab" id="ptab-shortlist" onclick="setPickerTab('shortlist')">🎞 Shortlist</button>
        <button class="ptab" id="ptab-pool" onclick="setPickerTab('pool')">Pool</button>
    </div>
    <div class="picker-subbar" id="pickerSub" style="display:none"></div>
    <div class="picker-search">
        <input id="pickerQ" placeholder="search…" onkeydown="if(event.key==='Enter')loadPicker()">
        <button onclick="loadPicker()">Go</button>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
    <div class="picker-foot">
        <button class="picker-add" id="pickerAdd" disabled onclick="pickerAddSelected()">Add 0 to scene</button>
    </div>
</div>
</body>
</html>
