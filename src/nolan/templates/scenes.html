<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLAN - Scene Plan Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 680;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .filter-select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .filter-select:hover {
            border-color: var(--text-secondary);
        }

        .stats {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Audio Player */
        .audio-container {
            background: var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .audio-container audio {
            height: 32px;
        }

        .audio-time {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent);
            min-width: 60px;
        }

        .playback-range {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: 1rem;
            padding-left: 1rem;
            border-left: 1px solid var(--border);
        }

        .range-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        #rangeInfo {
            font-family: monospace;
            color: #4ecdc4;
            font-size: 0.85rem;
        }

        .loop-toggle {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .loop-toggle input {
            cursor: pointer;
        }

        .stop-range-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .stop-range-btn:hover {
            background: var(--accent-hover);
        }

        /* Main Content */
        .main {
            padding: 1rem 2rem;
        }

        /* Scene Grid */
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .scene-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .scene-row:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .scene-row.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .scene-row.missing-asset {
            border-left: 3px solid var(--danger);
        }

        /* Left Column - Scene Details */
        .scene-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .scene-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .scene-id {
            font-weight: 650;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .scene-timing {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .scene-timing:hover {
            color: var(--accent);
        }

        .scene-type {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .scene-type.b-roll { background: var(--bg-tertiary); color: #4ecdc4; }
        .scene-type.graphics { background: var(--bg-tertiary); color: #ffe66d; }
        .scene-type.generated { background: var(--bg-tertiary); color: var(--accent); }
        .scene-type.a-roll { background: var(--bg-tertiary); color: #95e1d3; }
        .scene-type.host { background: var(--bg-tertiary); color: #dfe6e9; }

        .scene-narration {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.5;
            background: var(--bg-tertiary);
            padding: 0.75rem 0.85rem;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .scene-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .meta-row {
            display: flex;
            gap: 0.5rem;
        }

        .meta-label {
            color: var(--text-secondary);
            min-width: 80px;
        }

        .meta-value {
            color: var(--text-primary);
            word-break: break-word;
        }

        .scene-status {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .status-badge.matched { background: #2d6a4f; color: #95d5b2; }
        .status-badge.generated { background: #7b2cbf; color: #e0aaff; }
        .status-badge.infographic { background: #1d3557; color: #a8dadc; }
        .status-badge.missing { background: #9d0208; color: #ffccd5; }
        .status-badge.rendered { background: #006d77; color: #83c5be; }

        /* tempo (editorial arc) row */
        .scene-tempo { display: flex; align-items: center; gap: 6px; margin: 4px 0 2px; }
        .tempo-bar { position: relative; width: 90px; height: 6px; background: #23232b; border-radius: 3px; overflow: hidden; }
        .tempo-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; }
        .tempo-chip { font-size: 0.66rem; padding: 0.12rem 0.4rem; border-radius: 5px; background: #2a2a34; color: #c7c7d0; letter-spacing: 0.02em; }

        /* Expandable details */
        .scene-expand {
            margin-top: 0.5rem;
        }

        .expand-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.25rem 0;
        }

        .expand-btn:hover {
            color: var(--accent);
        }

        .scene-full-details {
            display: none;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .scene-full-details.expanded {
            display: block;
        }

        .detail-section {
            margin-bottom: 0.75rem;
        }

        .detail-section-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .detail-section-content {
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            padding: 0.5rem;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Right Column - Asset Preview */
        .asset-preview {
            background: linear-gradient(150deg, var(--bg-tertiary), var(--bg-primary));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            padding: 0.75rem;
            position: relative;
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .asset-preview img,
        .asset-preview video {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 16px -6px rgba(0, 0, 0, 0.55);
        }

        .asset-preview img:hover {
            transform: scale(1.015);
            box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.65);
        }

        .asset-placeholder {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            padding: 2rem;
        }

        .asset-placeholder-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .asset-path {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0));
            padding: 1.25rem 0.5rem 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            font-family: monospace;
            word-break: break-all;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Section Divider */
        .section-divider {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.55rem 0.85rem;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            margin: 1.25rem 0 0.25rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .scene-row {
                grid-template-columns: 1fr;
            }

            .asset-preview {
                min-height: 150px;
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        /* ---- Iteration UI (select / edit / comment / re-render) ---- */
        .scene-select { margin-right: 8px; cursor: pointer; }
        .scene-edit { margin-top: 10px; }
        .edit-toggle {
            background: none; border: 1px solid var(--border); color: var(--text-secondary);
            border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
        }
        .edit-toggle:hover { color: #fff; border-color: var(--text-secondary); }
        .edit-panel {
            margin-top: 8px; padding: 10px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--bg-secondary);
        }
        /* per-beat super search */
        .super-search { margin-top: 8px; padding: 10px; border: 1px solid var(--accent, #4c7dff);
            border-radius: 8px; background: var(--bg-secondary); }
        .ss-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .ss-op { padding: 4px 8px; background: var(--bg-primary, #0f172a); color: var(--text-primary, #e2e8f0);
            border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
        .ss-controls button { padding: 5px 12px; border-radius: 6px; border: 0; background: var(--accent, #4c7dff);
            color: #fff; cursor: pointer; font-size: 12px; }
        .ss-status { font-size: 12px; color: var(--text-secondary); }
        .ss-trace { font-size: 11px; color: var(--text-secondary); margin: 6px 0; }
        .ss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 8px; }
        .ss-pick { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #000; }
        .ss-pick img, .ss-pick video { width: 100%; height: 92px; object-fit: cover; display: block; }
        .ss-pick .ss-meta { padding: 4px 6px; font-size: 10px; color: var(--text-secondary); background: var(--bg-secondary); }
        .ss-pick button { width: 100%; border: 0; padding: 4px; font-size: 11px; background: #2d6a4f; color: #d8f3dc; cursor: pointer; }
        .edit-mode-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
        .tab-btn {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary);
            border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer;
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .edit-note, .field-edit input {
            width: 100%; box-sizing: border-box; background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px;
        }
        .field-edit { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .field-edit .field-label { flex: 0 0 130px; color: var(--text-secondary); font-size: 12px; font-family: monospace; }
        .apply-btn {
            margin-top: 6px; background: var(--success); color: #fff; border: none;
            border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
        }
        .apply-btn:hover { background: var(--success); }
        .note-actions { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .note-or { color: var(--text-secondary); font-size: 11px; }
        /* ---- Asset tray ---- */
        .asset-tray { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .tray-empty { color: var(--text-secondary); font-size: 12px; padding: 4px 0; }
        .tray-card { position: relative; width: 92px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 7px; padding: 5px; }
        .tray-idx { position: absolute; top: 3px; left: 3px; background: var(--accent); color: #fff; font-size: 10px; border-radius: 4px; padding: 0 4px; z-index: 2; }
        .tray-thumb { width: 100%; height: 64px; object-fit: cover; border-radius: 4px; background: var(--bg-primary); display: block; }
        .tray-label { font-size: 10px; color: var(--text-secondary); margin-top: 3px; line-height: 1.2; max-height: 24px; overflow: hidden; }
        .tray-x { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6); color: var(--danger); border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
        .pgrid { display: grid; grid-template-columns: repeat(3, 8px); gap: 2px; margin-top: 4px; align-items: center; }
        .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-tertiary); cursor: pointer; }
        .pdot.on { background: var(--warning); }
        .pclr { grid-column: 1 / span 3; color: var(--text-secondary); font-size: 10px; cursor: pointer; text-align: right; }
        .asset-add { display: flex; gap: 6px; margin: 4px 0; }
        .asset-search { flex: 1; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; padding: 5px 8px; font-size: 12px; }
        .asset-results { display: flex; flex-wrap: wrap; gap: 6px; max-height: 220px; overflow-y: auto; }
        .res-card { width: 80px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; padding: 3px; background: var(--bg-primary); }
        .res-card:hover { border-color: var(--accent); }
        .res-card img { width: 100%; height: 56px; object-fit: cover; border-radius: 4px; display: block; }
        .res-card span { font-size: 9px; color: var(--text-secondary); display: block; margin-top: 2px; line-height: 1.1; max-height: 22px; overflow: hidden; }
        .edit-hint { color: var(--text-secondary); font-size: 11px; margin-top: 6px; line-height: 1.4; }
        .tray-kind { position: absolute; top: 3px; right: 22px; font-size: 8px; font-weight: 700; border-radius: 3px; padding: 0 3px; z-index: 2; color: #fff; }
        .tray-kind.image { background: var(--success); }
        .tray-kind.clip, .tray-kind.video { background: var(--warning); }
        /* ---- Asset picker drawer ---- */
        .picker-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 40; }
        .picker-backdrop.open { opacity: 1; pointer-events: auto; }
        .picker-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 92vw; background: var(--bg-secondary); border-left: 1px solid var(--border); box-shadow: -8px 0 30px rgba(0,0,0,.5); transform: translateX(100%); transition: transform .2s ease; z-index: 41; display: flex; flex-direction: column; }
        .picker-drawer.open { transform: translateX(0); }
        .picker-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-primary); }
        .picker-close { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; }
        .picker-tabs { display: flex; gap: 4px; padding: 8px 14px 0; }
        .ptab { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px 6px 0 0; padding: 6px 12px; cursor: pointer; font-size: 12px; }
        .ptab.active { background: var(--bg-primary); color: #fff; border-bottom-color: var(--bg-primary); }
        .picker-search { display: flex; gap: 6px; padding: 10px 14px; }
        .picker-search input { flex: 1; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; padding: 6px 9px; font-size: 12px; }
        .picker-search button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0 12px; cursor: pointer; }
        .picker-grid { flex: 1; overflow-y: auto; padding: 0 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-content: start; }
        .pk-card { position: relative; cursor: pointer; border: 2px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--bg-primary); }
        .pk-card img { width: 100%; height: 78px; object-fit: cover; display: block; background: var(--bg-primary); }
        .pk-card span { display: block; font-size: 9px; color: var(--text-secondary); padding: 2px 4px; line-height: 1.15; max-height: 24px; overflow: hidden; }
        .pk-card.on { border-color: var(--warning); }
        .pk-check { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; line-height: 16px; text-align: center; font-size: 11px; border-radius: 50%; background: var(--warning); color: var(--bg-primary); opacity: 0; }
        .pk-card.on .pk-check { opacity: 1; }
        .pk-eye { position: absolute; top: 4px; left: 4px; width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 11px; border-radius: 4px; background: rgba(0,0,0,.6); color: #fff; cursor: pointer; opacity: 0; transition: opacity .12s; }
        .pk-card:hover .pk-eye { opacity: 1; }
        .tray-eye { position: absolute; top: 2px; right: 20px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
        .lightbox-cap { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: #e5e7eb; background: rgba(0,0,0,.55); padding: 4px 12px; border-radius: 6px; font-size: 13px; max-width: 80vw; text-align: center; }
        .lightbox-cap:empty { display: none; }
        .tray-card[draggable] { cursor: grab; }
        .tray-card[draggable]:active { cursor: grabbing; }
        .scene-row.drop-target { outline: 2px dashed var(--accent); outline-offset: -4px; background: color-mix(in srgb, var(--accent) 8%, transparent); }
        .mention-pop { position: absolute; z-index: 400; max-height: 280px; overflow-y: auto; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 10px 28px rgba(0,0,0,.45); padding: 4px; }
        .mention-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 7px; cursor: pointer; font-size: 13px; }
        .mention-item:hover { background: var(--bg-tertiary); }
        .mention-item img { width: 40px; height: 28px; object-fit: cover; border-radius: 4px; background: var(--bg-primary); flex: 0 0 auto; }
        .mention-item b { color: var(--accent); font-weight: 600; }
        .mention-item .mi-kind { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
        .mention-item .mi-label { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .picker-subbar { gap: 14px; padding: 8px 14px 0; flex-wrap: wrap; }
        .subseg { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; }
        .subbtn { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 5px; padding: 3px 8px; cursor: pointer; font-size: 11px; }
        .subbtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
        .picker-list { flex: 1; overflow-y: auto; padding: 4px 14px; display: block; }
        .vid-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 10px; border: 1px solid var(--border); border-radius: 7px; margin-bottom: 6px; cursor: pointer; background: var(--bg-primary); }
        .vid-row:hover { border-color: var(--accent); }
        .vid-name { font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
        .vid-meta { font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
        .seg-back { grid-column: 1 / -1; font-size: 11px; color: var(--accent); cursor: pointer; padding: 2px 0 6px; }
        .picker-foot { padding: 12px 14px; border-top: 1px solid var(--border); }
        .picker-add { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 9px; cursor: pointer; font-size: 13px; }
        .picker-add:disabled { background: var(--bg-tertiary); color: var(--text-secondary); cursor: default; }
        .scene-agent {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 4px 6px; font-size: 12px;
        }
        .agent-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 6px;
            padding: 5px 12px; font-size: 12px; cursor: pointer;
        }
        .agent-btn:hover { background: var(--accent-hover); }
        .status-badge.edited { background: var(--warning); color: var(--bg-primary); }
        .asset-placeholder.edited { color: var(--warning); }
        .edit-status { margin-top: 6px; font-size: 12px; color: var(--warning); min-height: 14px; }
        .rerender-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-secondary); border-top: 1px solid var(--border);
            padding: 10px 18px; font-size: 13px; color: var(--text-primary);
            box-shadow: 0 -8px 24px -12px rgba(0, 0, 0, 0.6);
        }
        .rerender-bar button {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 5px 12px; cursor: pointer;
        }
        .rerender-bar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .rerender-model { color: var(--text-secondary); font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .rerender-model select {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 4px 6px; font-size: 12px;
        }
        .rerender-msg { color: var(--warning); }
        .refresh-btn {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
        }
        .refresh-btn:hover { color: #fff; border-color: var(--text-secondary); }
        .refresh-btn:disabled { opacity: 0.6; cursor: default; }
        .rerender-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .agent-note {
            flex: 1; min-width: 240px; background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px;
        }
        .fleet-panel {
            position: fixed; top: 70px; right: 16px; z-index: 40; width: 260px;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 12px; color: var(--text-primary);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .fleet-title { font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; font-size: 11px; }
        .fleet-agent { padding: 6px 0; border-top: 1px solid var(--border); }
        .fleet-agent:first-of-type { border-top: none; }
        .fleet-state { color: var(--text-secondary); margin-left: 6px; }
        .fleet-msg { color: var(--text-secondary); margin-top: 2px; font-size: 11px; }
        .fleet-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); margin-right: 4px; }
        .fleet-dot.working { background: var(--warning); animation: pulse 1.2s infinite; }
        .fleet-dot.done { background: var(--success); }
        .fleet-dot.error { background: var(--danger); }
        .fleet-dot.dispatched { background: var(--accent); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

        /* iPhone / narrow-screen: stack header + controls, single-column scenes, no zoom-on-focus */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
            }
            .header-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .filter-select,
            .refresh-btn {
                width: 100%;
            }
            select, input, textarea {
                font-size: 16px;
            }
            .main {
                padding: 0.75rem 1rem;
            }
            .scene-row {
                grid-template-columns: 1fr;
            }
            .audio-container {
                flex-wrap: wrap;
            }
            .playback-range {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
            }
            .fleet-panel {
                position: static;
                width: auto;
                margin-bottom: 1rem;
            }
            .rerender-bar {
                flex-wrap: wrap;
            }
            .picker-drawer {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<link rel="stylesheet" href="/static/nolan.css">
<script src="/static/nav.js" data-active="scenes"></script>
    <header class="header">
        <h1>Scene Plan Viewer</h1>
        <div class="header-controls">
            <select id="projectFilter" class="filter-select" style="min-width: 150px;">
                <option value="">Select Project...</option>
            </select>
            <select id="sectionFilter" class="filter-select">
                <option value="all">All Sections</option>
            </select>
            <select id="statusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="matched">Matched</option>
                <option value="generated">Generated</option>
                <option value="infographic">Infographic</option>
                <option value="missing">Missing</option>
            </select>
            <button id="refreshBtn" class="refresh-btn" onclick="refreshView()" title="Reload scenes + re-rendered clips (after an agent finishes)">↻ Refresh</button>
            <span id="flowControls" style="display:none;">
                <label style="font-size:.72rem;color:var(--text-secondary)">agent:</label>
                <select id="flowAgent" title="Which NOLAN tmux agent runs the refine" style="font-size:.72rem;padding:2px 5px;background:var(--bg-primary,#111);color:var(--text-primary,#eee);border:1px solid #333;border-radius:5px"></select>
                <button class="refresh-btn" onclick="loadFlowAgents()" title="Refresh agent sessions">⟳</button>
                <button class="refresh-btn" onclick="flowRefine()" title="Authoring mode (Gate A): dispatch the chosen agent to refine the per-beat plan (blocks from the palette + asset wishlist)">✨ Refine plan</button>
                <button class="refresh-btn" onclick="flowAccept()" title="Promote the refined draft to the project's plan">✓ Accept draft</button>
            </span>
            <div class="stats" id="stats">Loading...</div>
        </div>
    </header>

    <div class="audio-container" id="audioContainer" style="display: none;">
        <span class="audio-time" id="audioTime">0:00</span>
        <audio id="audioPlayer" controls></audio>
        <div class="playback-range" id="playbackRange" style="display: none;">
            <span class="range-label">Playing:</span>
            <span id="rangeInfo">--</span>
            <label class="loop-toggle">
                <input type="checkbox" id="loopCheckbox"> Loop
            </label>
            <button class="stop-range-btn" onclick="stopRangePlayback()">Stop</button>
        </div>
    </div>

    <main class="main">
        <div class="scene-list" id="sceneList">
            <div class="loading">Loading scene plan...</div>
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="Full size">
        <video id="lightboxVid" src="" controls playsinline style="display:none; max-width:92vw; max-height:84vh; border-radius:8px;"></video>
        <div id="lightboxCap" class="lightbox-cap"></div>
    </div>

    <script>
        let allScenes = [];
        let sections = [];
        let projects = [];
        let currentProject = '';
        let currentSection = 'all';
        let currentStatus = 'all';

        // Iteration state
        let currentPipeline = 'segment';      // 'segment' | 'orchestrator'
        let editableFields = [];
        let selectedScenes = new Set();       // scene ids queued for re-render
        let editedScenes = new Set();         // scene ids edited this session, pending re-render

        // Range playback state
        let playbackRange = null;  // { start, end, sceneId }

        // Get project from URL
        function getProjectFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('project') || '';
        }

        // Update URL with project
        function updateUrl(project) {
            const url = new URL(window.location);
            if (project) {
                url.searchParams.set('project', project);
            } else {
                url.searchParams.delete('project');
            }
            window.history.replaceState({}, '', url);
        }

        // Format seconds to MM:SS
        function formatTime(seconds) {
            if (!seconds && seconds !== 0) return '--:--';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Get asset status for a scene
        function getAssetStatus(scene) {
            if (scene.rendered_clip) return 'rendered';
            if (scene.generated_asset) return 'generated';
            if (scene.matched_asset) return 'matched';
            if (scene.infographic_asset) return 'infographic';
            return 'missing';
        }

        // Get asset path for a scene
        function getAssetPath(scene) {
            if (scene.rendered_clip) return scene.rendered_clip;
            if (scene.generated_asset) return `assets/generated/${scene.generated_asset}`;
            if (scene.matched_asset) return scene.matched_asset;
            if (scene.infographic_asset) return `assets/${scene.infographic_asset}`;
            return null;
        }

        // Build a project-scoped file URL (handles nested project names + clip paths).
        // The nonce busts the browser cache so re-rendered clips (same path) reload.
        let assetNonce = Date.now();
        function fileUrl(relPath) {
            return `/scenes/file?project=${encodeURIComponent(currentProject)}&path=${encodeURIComponent(relPath)}&_=${assetNonce}`;
        }

        // The handful of fields worth editing inline, per pipeline.
        function inlineEditFields(scene) {
            const order = ['search_query', 'comfyui_prompt', 'visual_type',
                           'narration_excerpt', 'visual_description', 'duration'];
            return order.filter(f => editableFields.includes(f));
        }

        // Escape user-controlled text before inserting into HTML.
        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        // Render a single scene row
        function renderScene(scene, index) {
            // A scene edited this session but not yet re-rendered shows "edited" (not "missing").
            const pendingEdit = editedScenes.has(scene.id) && !scene.rendered_clip;
            const status = pendingEdit ? 'edited' : getAssetStatus(scene);
            const assetPath = getAssetPath(scene);
            const duration = (scene.end_seconds || 0) - (scene.start_seconds || 0);

            const isVideo = assetPath && (assetPath.endsWith('.mp4') || assetPath.endsWith('.webm'));
            const isSvg = assetPath && assetPath.endsWith('.svg');

            let assetHtml = '';
            if (assetPath) {
                const url = fileUrl(assetPath);
                if (isVideo) {
                    assetHtml = `<video src="${url}" controls></video>`;
                } else {
                    assetHtml = `<img src="${url}" alt="${scene.id}" onclick="openLightbox('${url}')">`;
                }
                assetHtml += `<div class="asset-path">${assetPath}</div>`;
            } else if (pendingEdit) {
                assetHtml = `
                    <div class="asset-placeholder edited">
                        <div class="asset-placeholder-icon">✎</div>
                        <div>edited — Re-render to see it</div>
                    </div>
                `;
            } else {
                assetHtml = `
                    <div class="asset-placeholder">
                        <div class="asset-placeholder-icon">?</div>
                        <div>No asset</div>
                    </div>
                `;
            }

            return `
                <div class="scene-row ${status === 'missing' ? 'missing-asset' : ''}"
                     data-section="${esc(scene._section)}"
                     data-status="${status}"
                     data-start="${scene.start_seconds || 0}"
                     data-end="${scene.end_seconds || 0}"
                     data-scene-id="${scene.id}"
                     id="scene-${index}"
                     ondragover="sceneDragOver(event)" ondragleave="sceneDragLeave(event)"
                     ondrop="sceneFileDrop(event,'${scene.id}')">
                    <div class="scene-details">
                        <div class="scene-header">
                            <label class="scene-select" title="Queue this scene for re-render">
                                <input type="checkbox" ${selectedScenes.has(scene.id) ? 'checked' : ''}
                                       onchange="toggleSelect('${scene.id}', this.checked)">
                            </label>
                            <span class="scene-id">${scene.id}</span>
                            <span class="scene-timing" onclick="seekTo(${scene.start_seconds || 0}, ${scene.end_seconds || 0}, '${scene.id}')" title="Click to play this scene's audio">
                                ${formatTime(scene.start_seconds)} - ${formatTime(scene.end_seconds)} (${duration.toFixed(1)}s)
                            </span>
                        </div>

                        <div class="scene-status">
                            <span class="scene-type ${scene.visual_type || 'unknown'}">${scene.visual_type || 'unknown'}</span>
                            <span class="status-badge ${status}">${status}</span>
                        </div>

                        ${scene.energy != null ? `
                        <div class="scene-tempo" title="Editorial arc (tempo_enrich): energy + the transition/motion it chose">
                            <span class="tempo-bar"><span class="tempo-fill" style="width:${Math.round(scene.energy*100)}%;background:${scene.energy>=0.7?'#f2c14e':scene.energy>=0.5?'#7aa2f7':'#6b7280'}"></span></span>
                            <span class="tempo-chip">⚡ ${scene.energy.toFixed(2)}</span>
                            ${scene.transition ? `<span class="tempo-chip">✂ ${esc(scene.transition)}</span>` : ''}
                            ${scene.motion_speed ? `<span class="tempo-chip">▶ ${esc(scene.motion_speed)}</span>` : ''}
                        </div>
                        ` : ''}

                        ${scene.narration_excerpt ? `
                            <div class="scene-narration">"${esc(scene.narration_excerpt)}"</div>
                        ` : ''}

                        <div class="scene-meta">
                            ${scene.search_query ? `
                                <div class="meta-row">
                                    <span class="meta-label">Query:</span>
                                    <span class="meta-value">${esc(scene.search_query)}</span>
                                </div>
                            ` : ''}
                            ${scene.comfyui_prompt ? `
                                <div class="meta-row">
                                    <span class="meta-label">Prompt:</span>
                                    <span class="meta-value">${esc(scene.comfyui_prompt.substring(0, 100))}${scene.comfyui_prompt.length > 100 ? '...' : ''}</span>
                                </div>
                            ` : ''}
                            ${(scene.wishlist && scene.wishlist.length && !assetPath) ? `
                                <div class="meta-row wishlist-row" title="Authoring shopping list — add a matching asset via the tray">
                                    <span class="meta-label">🛒 Needs:</span>
                                    <span class="meta-value">${scene.wishlist.map(w => esc(w.want || '') + (w.status ? ` (${esc(w.status)})` : '')).join('; ')}</span>
                                </div>
                            ` : ''}
                        </div>

                        <div class="scene-expand">
                            <button class="expand-btn" onclick="toggleExpand(${index})">+ Show more details</button>
                            <div class="scene-full-details" id="details-${index}">
                                ${scene.visual_description ? `
                                    <div class="detail-section">
                                        <div class="detail-section-title">Visual Description</div>
                                        <div class="detail-section-content">${esc(scene.visual_description)}</div>
                                    </div>
                                ` : ''}
                                ${scene.sync_points && scene.sync_points.length > 0 ? `
                                    <div class="detail-section">
                                        <div class="detail-section-title">Sync Points</div>
                                        <div class="detail-section-content">${JSON.stringify(scene.sync_points, null, 2)}</div>
                                    </div>
                                ` : ''}
                                ${scene.infographic ? `
                                    <div class="detail-section">
                                        <div class="detail-section-title">Infographic Spec</div>
                                        <div class="detail-section-content">${JSON.stringify(scene.infographic, null, 2)}</div>
                                    </div>
                                ` : ''}
                                <div class="detail-section">
                                    <div class="detail-section-title">Section</div>
                                    <div class="detail-section-content">${esc(scene._section)}</div>
                                </div>
                            </div>
                        </div>

                        <div class="scene-edit">
                            <button class="edit-toggle" onclick="toggleEdit('${scene.id}')">✎ Edit / comment</button>
                            <button class="edit-toggle" onclick="superSearchToggle('${scene.id}')" title="Context-aware asset search for THIS beat (the /broll engine, project + beat prefilled)">🔎 Super search</button>
                            <div class="super-search" id="ss-${scene.id}" style="display:none;">
                                <div class="ss-controls">
                                    <select class="ss-op" id="ss-op-${scene.id}">
                                        <option value="auto">Auto (agent picks)</option>
                                        <option value="literal">Literal (keyword)</option>
                                        <option value="tonal">Evocative</option>
                                        <option value="knowledge">Knowledge (real)</option>
                                        <option value="conceptual">Conceptual</option>
                                        <option value="ironic">Ironic</option>
                                        <option value="trait">Trait</option>
                                        <option value="relational">Relational</option>
                                        <option value="scale">Scale</option>
                                    </select>
                                    <button onclick="superSearch('${scene.id}')">Search this beat</button>
                                    <span class="ss-status" id="ss-status-${scene.id}"></span>
                                </div>
                                <div class="ss-results" id="ss-results-${scene.id}"></div>
                            </div>
                            <div class="edit-panel" id="edit-${scene.id}" style="display:none;">
                                <div class="edit-mode-tabs">
                                    <button class="tab-btn active" id="tab-note-${scene.id}" onclick="setEditMode('${scene.id}','note')">Comment</button>
                                    <button class="tab-btn" id="tab-assets-${scene.id}" onclick="setEditMode('${scene.id}','assets')">Assets${(scene.assets&&scene.assets.length)?` (${scene.assets.length})`:''}</button>
                                    <button class="tab-btn" id="tab-fields-${scene.id}" onclick="setEditMode('${scene.id}','fields')">Edit fields</button>
                                </div>
                                <div class="edit-body" id="body-note-${scene.id}">
                                    <textarea id="note-${scene.id}" class="edit-note" rows="2"
                                        placeholder="e.g. make it grimmer  ·  type @ to reference an asset  ·  or: rework to Remotion kinetic text"></textarea>
                                    <div class="note-actions">
                                        <button class="apply-btn" onclick="applyNote('${scene.id}')" title="Fast LLM — instant text/prompt tweaks">⚡ Quick edit (LLM)</button>
                                        <span class="note-or">or hand to an agent:</span>
                                        <select class="js-agent-select scene-agent" id="sceneAgent-${scene.id}"></select>
                                        <button class="agent-btn" onclick="dispatchSceneToAgent('${scene.id}')" title="Claude Code agent — hard edits (Remotion, recreate effect, validate)">Send to Claude →</button>
                                    </div>
                                </div>
                                <div class="edit-body" id="body-assets-${scene.id}" style="display:none;">
                                    <div class="asset-tray" id="tray-${scene.id}">${assetTrayHtml(scene)}</div>
                                    <button class="apply-btn" onclick="openPicker('${scene.id}')">＋ Add from library</button>
                                    <div class="edit-hint">Curate the pictures &amp; clips this scene can use, then reference them in a Comment (e.g. "grid of these, zoom the Knight when the VO says 'crash'"). Click a card's grid dot to set where it sits.</div>
                                </div>
                                <div class="edit-body" id="body-fields-${scene.id}" style="display:none;">
                                    ${inlineEditFields(scene).map(f => `
                                        <label class="field-edit">
                                            <span class="field-label">${f}</span>
                                            <input id="field-${scene.id}-${f}" value="${(scene[f] ?? '').toString().replace(/"/g, '&quot;')}">
                                        </label>`).join('')}
                                    <button class="apply-btn" onclick="applyFields('${scene.id}')">Apply edits</button>
                                </div>
                                <div class="edit-status" id="editstatus-${scene.id}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="asset-preview">
                        ${assetHtml}
                    </div>
                </div>
            `;
        }

        // Toggle expand/collapse
        function toggleExpand(index) {
            const details = document.getElementById(`details-${index}`);
            const btn = details.previousElementSibling;
            if (details.classList.contains('expanded')) {
                details.classList.remove('expanded');
                btn.textContent = '+ Show more details';
            } else {
                details.classList.add('expanded');
                btn.textContent = '- Hide details';
            }
        }

        // Render all scenes
        function renderScenes() {
            const list = document.getElementById('sceneList');
            let html = '';
            let visibleCount = 0;
            let lastSection = null;

            allScenes.forEach((scene, index) => {
                // Filter by section
                if (currentSection !== 'all' && scene._section !== currentSection) return;

                // Filter by status
                const status = getAssetStatus(scene);
                if (currentStatus !== 'all' && status !== currentStatus) return;

                // Add section divider
                if (scene._section !== lastSection) {
                    html += `<div class="section-divider">${esc(scene._section)}</div>`;
                    lastSection = scene._section;
                }

                html += renderScene(scene, index);
                visibleCount++;
            });

            list.innerHTML = html || '<div class="loading">No scenes match the filter.</div>';

            // Update stats
            const matched = allScenes.filter(s => getAssetStatus(s) === 'matched').length;
            const generated = allScenes.filter(s => getAssetStatus(s) === 'generated').length;
            const infographic = allScenes.filter(s => getAssetStatus(s) === 'infographic').length;
            const missing = allScenes.filter(s => getAssetStatus(s) === 'missing').length;

            document.getElementById('stats').textContent =
                `${visibleCount}/${allScenes.length} scenes | ${matched} matched | ${generated} generated | ${infographic} infographic | ${missing} missing`;

            updateRerenderBar();
            refreshAgentSelect();   // populate per-scene agent dropdowns right away
        }

        // ---------- Iteration: select / edit / comment / re-render ----------
        function toggleSelect(id, checked) {
            if (checked) selectedScenes.add(id); else selectedScenes.delete(id);
            updateRerenderBar();
        }
        function clearSelection() { selectedScenes.clear(); renderScenes(); }

        function updateRerenderBar() {
            let bar = document.getElementById('rerenderBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'rerenderBar';
                bar.className = 'rerender-bar';
                document.body.appendChild(bar);
            }
            if (selectedScenes.size === 0) { bar.style.display = 'none'; return; }
            bar.style.display = 'flex';
            const agentOpts = fleetAgents.filter(a => a.session_alive)
                .map(a => `<option value="${a.agent}">${a.agent}${a.state==='working'?' (busy)':''}</option>`).join('')
                || '<option value="">no agents</option>';
            bar.innerHTML =
                `<div class="rerender-row">
                   <span>${selectedScenes.size} scene(s) selected · pipeline <b>${currentPipeline}</b></span>
                   <label class="rerender-model">gen model:
                     <select id="rerenderModel">
                       <option value="flux-dev">flux-dev</option>
                       <option value="z-image">z-image-turbo</option>
                     </select>
                   </label>
                   <button onclick="clearSelection()">Clear</button>
                   <button class="primary" onclick="rerenderSelected()">Re-render selected</button>
                 </div>
                 <div class="rerender-row">
                   <input id="agentNote" class="agent-note" placeholder="note for the agent (e.g. rework these to Remotion kinetic text)">
                   <label class="rerender-model">agent:
                     <select id="agentSelect" class="js-agent-select">${agentOpts}</select>
                   </label>
                   <button class="primary" onclick="dispatchToAgent()">Send to agent →</button>
                   <span id="rerenderMsg" class="rerender-msg"></span>
                 </div>`;
        }

        function toggleEdit(id) {
            const p = document.getElementById(`edit-${id}`);
            p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        }

        // Per-beat super search — the /broll pairing engine WITH the loaded project + this scene's
        // beat as context (auto-located server-side from the narration).
        function superSearchToggle(id) {
            const p = document.getElementById(`ss-${id}`);
            p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        }
        function _pollSS(jobId) {
            return new Promise(resolve => {
                (function tick() {
                    fetch(`/api/jobs/${jobId}`).then(r => r.json()).then(j => {
                        if (['done', 'error', 'cancelled'].includes(j.status)) resolve(j);
                        else setTimeout(tick, 1500);
                    }).catch(() => setTimeout(tick, 2500));
                })();
            });
        }
        async function superSearch(id) {
            const scene = allScenes.find(s => s.id === id);
            const line = scene ? (scene.narration_excerpt || scene.visual_description || '') : '';
            if (!line) { return; }
            const op = (document.getElementById(`ss-op-${id}`) || {}).value || 'auto';
            const st = document.getElementById(`ss-status-${id}`);
            const out = document.getElementById(`ss-results-${id}`);
            st.textContent = `searching (${op})…`; out.innerHTML = '';
            try {
                const start = await (await fetch('/scenes/api/scene/super-search', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, line, operator: op, media: ['image', 'video'] })
                })).json();
                const job = await _pollSS(start.job_id);
                if (job.status !== 'done' || !job.result) { st.textContent = 'failed: ' + (job.error || job.status); return; }
                renderSSPicks(id, job.result);
            } catch (e) { st.textContent = 'error: ' + e.message; }
        }
        function renderSSPicks(id, res) {
            const st = document.getElementById(`ss-status-${id}`);
            const out = document.getElementById(`ss-results-${id}`);
            let trace = '';
            if (res.auto) {
                const a = res.auto;
                trace = `<div class="ss-trace">🤖 chose <b>${esc(a.chosen || a.primary)}</b>` +
                    (a.judge ? ` · judge ${a.judge.score}/10` : '') + ` — ${esc(a.why || '')}</div>`;
            }
            const picks = res.picks || [];
            st.textContent = `${res.status} · ${picks.length} pick(s)`;
            if (!picks.length) { out.innerHTML = trace + `<div class="ss-trace">Nothing fit (${esc(res.reason || '')}).</div>`; return; }
            const cards = picks.map(c => {
                const isVid = c.kind === 'video' || /\.mp4($|\?)/.test(c.url || '');
                const media = (c.kind === 'image')
                    ? `<img src="${esc(c.poster || c.url)}">`
                    : (c.poster ? `<img src="${esc(c.poster)}">` : `<video src="${esc(c.url)}" muted></video>`);
                const kind = isVid ? 'video' : 'image';
                return `<div class="ss-pick">${media}<div class="ss-meta">${esc(c.source || '')} · ${esc((c.why || '').slice(0, 40))}</div>` +
                    `<button onclick="attachAsset('${id}', ${JSON.stringify(c.url)}, '${kind}', ${JSON.stringify(c.source || '')})">Attach →</button></div>`;
            }).join('');
            out.innerHTML = trace + `<div class="ss-grid">${cards}</div>`;
        }
        async function attachAsset(id, url, kind, source) {
            const st = document.getElementById(`ss-status-${id}`);
            st.textContent = 'attaching…';
            try {
                const start = await (await fetch('/scenes/api/scene/attach', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_id: id, url, kind, source })
                })).json();
                const job = await _pollSS(start.job_id);
                if (job.status === 'done') { st.textContent = '✓ attached — reloading'; await loadSceneData(); }
                else st.textContent = 'attach failed: ' + (job.error || job.status);
            } catch (e) { st.textContent = 'error: ' + e.message; }
        }
        function setEditMode(id, mode) {
            ['note','assets','fields'].forEach(m => {
                const body = document.getElementById(`body-${m}-${id}`);
                if (body) body.style.display = (mode === m) ? 'block' : 'none';
                const tab = document.getElementById(`tab-${m}-${id}`);
                if (tab) tab.classList.toggle('active', mode === m);
            });
        }

        // ---------- Asset tray (per-scene binding) ----------
        const ANCHORS = [[0.2,0.25],[0.5,0.2],[0.8,0.25],[0.2,0.5],[0.5,0.5],[0.8,0.5],[0.2,0.78],[0.5,0.82],[0.8,0.78]];
        function placeDots(sceneId, a) {
            const cur = a.place ? `${a.place[0]},${a.place[1]}` : '';
            const dots = ANCHORS.map(p => {
                const on = (`${p[0]},${p[1]}` === cur);
                return `<i class="pdot${on?' on':''}" title="place ${p[0]},${p[1]}"
                          onclick="assetSetPlace('${sceneId}','${a.id}',[${p[0]},${p[1]}])"></i>`;
            }).join('');
            const clr = a.place ? `<i class="pclr" title="auto-place" onclick="assetSetPlace('${sceneId}','${a.id}',null)">×</i>` : '';
            return `<div class="pgrid">${dots}${clr}</div>`;
        }
        function assetTrayHtml(scene) {
            const assets = scene.assets || [];
            if (!assets.length) return `<div class="tray-empty">No assets yet — search below to add pictures.</div>`;
            return assets.map((a, i) => `
                <div class="tray-card" draggable="true"
                     ondragstart="trayDragStart(event,'${scene.id}','${a.id}')"
                     ondragover="event.preventDefault()"
                     ondrop="trayDrop(event,'${scene.id}','${a.id}')">
                    <span class="tray-idx">${i}</span>
                    <span class="tray-kind ${a.kind||'image'}" title="${a.kind||'image'}">${(a.kind||'image')==='image'?'IMG':(a.kind==='clip'||a.kind==='video'?'VID':a.kind.toUpperCase())}</span>
                    <img class="tray-thumb" src="${a.thumb || assetUrl(a.src)}" alt="">
                    <div class="tray-meta">
                        <div class="tray-label" title="id=${a.id}">${esc(a.label || a.id)}</div>
                        ${placeDots(scene.id, a)}
                    </div>
                    <button class="tray-eye" title="preview" onclick="previewAsset('${scene.id}','${a.id}')">⤢</button>
                    <button class="tray-x" title="remove" onclick="assetOp('${scene.id}',{op:'remove',asset_id:'${a.id}'})">✕</button>
                </div>`).join('');
        }
        function assetUrl(src) {
            // best-effort thumb for path-added assets that live under the project
            return `/scenes/file?project=${encodeURIComponent(currentProject)}&path=${encodeURIComponent(src)}&_=${assetNonce}`;
        }
        async function assetOp(sceneId, body) {
            body.project = currentProject; body.scene_id = sceneId;
            const res = await fetch('/scenes/api/scene/assets', {
                method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(j.detail || res.statusText);
            const scene = allScenes.find(s => s.id === sceneId);
            if (scene) scene.assets = j.assets;
            const tray = document.getElementById(`tray-${sceneId}`);
            if (tray && scene) tray.innerHTML = assetTrayHtml(scene);
            const tab = document.getElementById(`tab-assets-${sceneId}`);
            if (tab) tab.textContent = 'Assets' + (j.assets.length ? ` (${j.assets.length})` : '');
            return j;
        }
        function assetSetPlace(sceneId, assetId, place) {
            assetOp(sceneId, {op:'set_place', asset_id: assetId, place}).catch(e => alert(e.message));
        }
        // ---------- Drag & drop (desktop): reorder tray + drop local files onto a scene ----------
        let _trayDrag = null;
        function trayDragStart(e, sceneId, aid) {
            _trayDrag = { sceneId, aid };
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', aid); } catch (x) {}
        }
        function trayDrop(e, sceneId, targetId) {
            e.preventDefault(); e.stopPropagation();
            if (!_trayDrag || _trayDrag.sceneId !== sceneId) { _trayDrag = null; return; }
            const scene = allScenes.find(s => s.id === sceneId); if (!scene) { _trayDrag = null; return; }
            const ids = (scene.assets || []).map(a => a.id);
            const from = ids.indexOf(_trayDrag.aid), to = ids.indexOf(targetId);
            _trayDrag = null;
            if (from < 0 || to < 0 || from === to) return;
            ids.splice(to, 0, ids.splice(from, 1)[0]);
            assetOp(sceneId, { op: 'reorder', order: ids }).catch(err => alert(err.message));
        }
        function sceneDragOver(e) {
            if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) {
                e.preventDefault();
                e.currentTarget.classList.add('drop-target');
            }
        }
        function sceneDragLeave(e) { e.currentTarget.classList.remove('drop-target'); }
        async function sceneFileDrop(e, sceneId) {
            const files = e.dataTransfer && e.dataTransfer.files;
            if (!files || !files.length) return;   // tray reorder (no files) — ignore here
            e.preventDefault(); e.stopPropagation();
            e.currentTarget.classList.remove('drop-target');
            for (const file of files) {
                if (!/^(image|video)\//.test(file.type)) continue;
                try {
                    const fd = new FormData();
                    fd.append('project', currentProject); fd.append('file', file);
                    const res = await fetch('/scenes/api/scene/upload', { method: 'POST', body: fd });
                    const j = await res.json();
                    if (!res.ok) throw new Error(j.detail || 'upload failed');
                    await assetOp(sceneId, { op: 'add', source: 'path', path: j.path, kind: j.kind, label: j.label });
                } catch (err) { alert('Drop failed: ' + err.message); }
            }
        }

        // ---------- @-mention: reference a scene's bound assets inside a comment ----------
        (function () {
            let pop = null, curTa = null, matchStart = 0;
            function ensure() {
                if (!pop) { pop = document.createElement('div'); pop.className = 'mention-pop'; pop.style.display = 'none'; document.body.appendChild(pop); }
                return pop;
            }
            function hide() { if (pop) pop.style.display = 'none'; curTa = null; }
            function sceneFor(ta) { const id = (ta.id || '').replace(/^note-/, ''); return allScenes.find(s => s.id === id); }
            document.addEventListener('input', function (e) {
                const ta = e.target;
                if (!ta.classList || !ta.classList.contains('edit-note')) return;
                const before = ta.value.slice(0, ta.selectionStart);
                const m = before.match(/@(\w*)$/);
                if (!m) return hide();
                const scene = sceneFor(ta); const assets = (scene && scene.assets) || [];
                if (!assets.length) return hide();
                const q = m[1].toLowerCase();
                const hits = assets.filter(a => (a.id + ' ' + (a.label || '')).toLowerCase().includes(q)).slice(0, 8);
                if (!hits.length) return hide();
                curTa = ta; matchStart = ta.selectionStart - m[0].length;
                const p = ensure();
                p.innerHTML = hits.map(a => `<div class="mention-item" data-id="${a.id}">
                    <img src="${a.thumb || assetUrl(a.src)}" onerror="this.style.visibility='hidden'">
                    <b>@${a.id}</b><span class="mi-kind">${a.kind || 'image'}</span>
                    <span class="mi-label">${esc((a.label || '').slice(0, 40))}</span></div>`).join('');
                const r = ta.getBoundingClientRect();
                p.style.left = (r.left + window.scrollX) + 'px';
                p.style.top = (r.bottom + window.scrollY + 2) + 'px';
                p.style.width = Math.max(240, r.width) + 'px';
                p.style.display = 'block';
            });
            document.addEventListener('click', function (e) {
                if (!pop || pop.style.display === 'none') return;
                const item = e.target.closest && e.target.closest('.mention-item');
                if (item && curTa) {
                    const id = item.getAttribute('data-id');
                    const ta = curTa, pos = ta.selectionStart;
                    ta.value = ta.value.slice(0, matchStart) + '@' + id + ' ' + ta.value.slice(pos);
                    const np = matchStart + id.length + 2;
                    ta.focus(); ta.setSelectionRange(np, np);
                    hide();
                } else if (!pop.contains(e.target)) hide();
            });
            document.addEventListener('keydown', function (e) { if (e.key === 'Escape') hide(); });
        })();

        // ---------- Asset picker drawer (browse + search, multi-select) ----------
        let pickerScene = null, pickerTab = 'pictures', pickerSel = new Map(), pickerItems = [];
        let vidScope = 'project', vidSource = 'clips', vidVideo = null, pickerVideos = [];
        function openPicker(sceneId) {
            pickerScene = sceneId; pickerSel = new Map();
            document.getElementById('pickerTitle').textContent = 'Add assets → ' + sceneId;
            document.getElementById('pickerDrawer').classList.add('open');
            document.getElementById('pickerBackdrop').classList.add('open');
            setPickerTab('pictures');
        }
        function closePicker() {
            document.getElementById('pickerDrawer').classList.remove('open');
            document.getElementById('pickerBackdrop').classList.remove('open');
            pickerScene = null;
        }
        function setPickerTab(tab) {
            pickerTab = tab; vidVideo = null;
            document.getElementById('ptab-pictures').classList.toggle('active', tab === 'pictures');
            document.getElementById('ptab-videos').classList.toggle('active', tab === 'videos');
            document.getElementById('pickerQ').placeholder = tab === 'pictures'
                ? 'search pictures (blank = browse all)…' : 'filter by name…';
            renderSub(); loadPicker();
        }
        function renderSub() {
            const sub = document.getElementById('pickerSub');
            if (pickerTab !== 'videos') { sub.style.display = 'none'; sub.innerHTML = ''; return; }
            sub.style.display = 'flex';
            const tog = (cur, val, lbl, fn) => `<button class="subbtn${cur===val?' on':''}" onclick="${fn}('${val}')">${lbl}</button>`;
            sub.innerHTML =
                `<span class="subseg">Scope ${tog(vidScope,'project','This project','setVidScope')}${tog(vidScope,'all','All','setVidScope')}</span>` +
                `<span class="subseg">Source ${tog(vidSource,'clips','Saved clips','setVidSource')}${tog(vidSource,'segments','Segments','setVidSource')}</span>`;
        }
        function setVidScope(s) { vidScope = s; vidVideo = null; renderSub(); loadPicker(); }
        function setVidSource(s) { vidSource = s; vidVideo = null; renderSub(); loadPicker(); }
        function pickKey(it) { return `${it.source}:${it.k}`; }
        function thumbUrl(src, t) { return `/scenes/api/frame-thumb?project=${encodeURIComponent(currentProject)}&src=${encodeURIComponent(src)}&t=${t||0}`; }

        async function loadPicker() {
            const q = document.getElementById('pickerQ').value.trim();
            const grid = document.getElementById('pickerGrid');
            grid.innerHTML = '<div class="loading">Loading…</div>';
            try {
                if (pickerTab === 'pictures') return renderItems(await fetchPictures(q), grid);
                if (vidSource === 'clips') return renderItems(await fetchClips(q), grid);
                if (!vidVideo) return renderVideoList(await fetchVideos(q), grid);
                return renderItems(await fetchSegments(vidVideo, q), grid, true);
            } catch (e) { grid.innerHTML = '<div class="tray-empty">Error: ' + e.message + '</div>'; }
        }
        async function fetchPictures(q) {
            const url = q
                ? `/api/images/search?q=${encodeURIComponent(q)}&scope=both&project=${encodeURIComponent(currentProject)}&k=40`
                : `/api/images/list?scope=global&limit=60`;
            const j = await (await fetch(url)).json();
            return (j.results || []).map(h => ({
                source: 'library', k: h.id, thumb: h.raw, label: h.title || ('#' + h.id),
                payload: {op:'add', source:'library', image_id: h.id, scope: h.scope || 'global',
                          scope_project: h.scope_project || null, label: h.title || ''} }));
        }
        async function fetchClips(q) {
            const proj = vidScope === 'project' ? currentProject : '';
            const j = await (await fetch(`/library/api/clips?projects=${encodeURIComponent(proj)}`)).json();
            let clips = j.clips || [];
            if (q) { const ql = q.toLowerCase(); clips = clips.filter(c =>
                ((c.label||'') + ' ' + (c.video_name||'')).toLowerCase().includes(ql)); }
            return clips.map(c => ({
                source: 'clip', k: c.id, thumb: thumbUrl(c.source_video_path, c.clip_start),
                label: c.label || c.video_name || c.id,
                payload: {op:'add', source:'clip', source_video_path: c.source_video_path,
                          clip_start: c.clip_start, clip_end: c.clip_end, label: c.label || c.video_name || ''} }));
        }
        async function fetchVideos(q) {
            const proj = vidScope === 'project' ? currentProject : '';
            const j = await (await fetch(`/library/api/videos${proj?`?project=${encodeURIComponent(proj)}`:''}`)).json();
            let vids = j.videos || [];
            if (q) { const ql = q.toLowerCase(); vids = vids.filter(v => (v.name||'').toLowerCase().includes(ql)); }
            return vids;
        }
        async function fetchSegments(videoPath, q) {
            const j = await (await fetch(`/library/api/videos/${encodeURIComponent(videoPath)}/segments`)).json();
            let segs = j.segments || [];
            if (q) { const ql = q.toLowerCase(); segs = segs.filter(s =>
                ((s.frame_description||'') + ' ' + (s.transcript||'')).toLowerCase().includes(ql)); }
            return segs.map((s, i) => ({
                source: 'seg', k: `${videoPath}#${s.timestamp_start}`,
                thumb: thumbUrl(s.video_path, s.timestamp_start),
                label: s.frame_description || s.timestamp_formatted || ('seg ' + i),
                payload: {op:'add', source:'clip', source_video_path: s.video_path,
                          clip_start: s.timestamp_start, clip_end: s.timestamp_end,
                          label: s.frame_description || s.timestamp_formatted || ''} }));
        }
        function renderVideoList(videos, grid) {
            grid.className = 'picker-list';
            pickerVideos = videos;
            if (!videos.length) { grid.innerHTML = '<div class="tray-empty">No indexed videos in scope.</div>'; return; }
            grid.innerHTML = videos.map((v, i) => `
                <div class="vid-row" onclick="pickVideo(${i})">
                    <span class="vid-name">${esc(v.name)}</span>
                    <span class="vid-meta">${v.segment_count||0} segs · ${esc(v.duration_formatted||'')} ›</span>
                </div>`).join('');
        }
        function pickVideo(i) { const v = pickerVideos[i]; if (!v) return; vidVideo = v.path;
            document.getElementById('pickerQ').value = ''; loadPicker(); }
        function renderItems(items, grid, segMode) {
            grid.className = 'picker-grid';
            pickerItems = items;
            const back = segMode ? `<div class="seg-back" onclick="vidVideo=null;loadPicker()">← all videos</div>` : '';
            if (!items.length) { grid.innerHTML = back + '<div class="tray-empty">Nothing here.</div>'; return; }
            grid.innerHTML = back + items.map((it, i) => {
                const on = pickerSel.has(pickKey(it));
                return `<div class="pk-card${on?' on':''}" data-key="${pickKey(it)}" onclick="togglePick(${i})">
                    <img src="${it.thumb}" loading="lazy" alt=""><span>${esc((it.label||'').slice(0,42))}</span>
                    <i class="pk-eye" title="preview" onclick="event.stopPropagation();previewItem(${i})">⤢</i>
                    <i class="pk-check">✓</i></div>`;
            }).join('');
        }
        function togglePick(i) {
            const it = pickerItems[i]; if (!it) return;
            const key = pickKey(it);
            if (pickerSel.has(key)) pickerSel.delete(key); else pickerSel.set(key, it.payload);
            const el = document.querySelector(`.pk-card[data-key="${key}"]`);
            if (el) el.classList.toggle('on', pickerSel.has(key));
            document.getElementById('pickerAdd').textContent = `Add ${pickerSel.size} to scene`;
            document.getElementById('pickerAdd').disabled = pickerSel.size === 0;
