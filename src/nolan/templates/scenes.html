        async function pickerAddSelected() {
            if (!pickerScene || !pickerSel.size) return;
            const btn = document.getElementById('pickerAdd'); btn.disabled = true; btn.textContent = 'Adding…';
            try {
                for (const payload of pickerSel.values()) await assetOp(pickerScene, {...payload});
                closePicker();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        async function postRevise(body) {
            const res = await fetch('/scenes/api/scene/revise', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body) });
            const j = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(j.detail || res.statusText);
            return j;
        }

        async function refreshScenes() {
            const res = await fetch(`/scenes/api/scenes/flat?project=${encodeURIComponent(currentProject)}`);
            const data = await res.json();
            allScenes = data.scenes;
            renderScenes();
        }

        // Populate the flow-refine agent selector from the live tmux sessions (script_projects pattern).
        async function loadFlowAgents() {
            const sel = document.getElementById('flowAgent'); if (!sel) return;
            try {
                const sessions = ((await (await fetch('/library/api/tmux-sessions')).json()).sessions) || [];
                const list = sessions.length ? sessions : ['nolan4'];
                const cur = sel.value;
                sel.innerHTML = list.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
                if (list.includes(cur)) sel.value = cur;
                else if (list.includes('nolan4')) sel.value = 'nolan4';
            } catch (e) { sel.innerHTML = '<option value="nolan4">nolan4</option>'; }
        }

        // Authoring mode (Gate A): refine the per-beat plan via the chosen NOLAN agent, then accept it.
        async function flowRefine() {
            if (!currentProject) return;
            const stats = document.getElementById('stats');
            const agent = (document.getElementById('flowAgent') || {}).value || 'nolan4';
            stats.textContent = `✨ Dispatching ${agent} to refine the plan…`;
            try {
                const r = await fetch('/scenes/api/flow/refine', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, agent })
                });
                const d = await r.json();
                stats.textContent = r.ok
                    ? `Refining via ${d.dispatched || agent} — watch the fleet panel, then ✓ Accept draft.`
                    : ('Refine error: ' + (d.detail || r.status));
            } catch (e) { stats.textContent = 'Refine error: ' + e.message; }
        }

        async function flowAccept() {
            if (!currentProject) return;
            if (!confirm("Promote the refined draft to this project's plan? (replaces the current plan)")) return;
            const stats = document.getElementById('stats');
            stats.textContent = 'Accepting draft…';
            try {
                const r = await fetch('/scenes/api/flow/accept', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject })
                });
                const d = await r.json();
                if (r.ok) { await loadSceneData(); }
                else { stats.textContent = 'Accept error: ' + (d.detail || r.status); }
            } catch (e) { stats.textContent = 'Accept error: ' + e.message; }
        }

        async function applyNote(id) {
            const note = document.getElementById(`note-${id}`).value.trim();
            const st = document.getElementById(`editstatus-${id}`);
            if (!note) { st.textContent = 'Enter a comment first.'; return; }
            st.textContent = 'Applying (agent)…';
            try {
                const r = await postRevise({ project: currentProject, scene_id: id, note });
                const keys = Object.keys(r.applied || {});
                st.textContent = keys.length ? ('Applied: ' + keys.join(', ') + ' — Re-render to see it') : 'No change produced.';
                if (keys.length) { selectedScenes.add(id); editedScenes.add(id); await refreshScenes(); }
            } catch (e) { st.textContent = 'Error: ' + e.message; }
        }

        async function applyFields(id) {
            const scene = allScenes.find(s => s.id === id);
            const patch = {};
            inlineEditFields(scene).forEach(f => {
                const el = document.getElementById(`field-${id}-${f}`);
                if (el && el.value !== (scene[f] ?? '').toString()) patch[f] = el.value;
            });
            const st = document.getElementById(`editstatus-${id}`);
            if (Object.keys(patch).length === 0) { st.textContent = 'No changes.'; return; }
            st.textContent = 'Saving…';
            try {
                const r = await postRevise({ project: currentProject, scene_id: id, patch });
                st.textContent = 'Saved: ' + Object.keys(r.applied || {}).join(', ') + ' — Re-render to see it';
                selectedScenes.add(id);
                editedScenes.add(id);
                await refreshScenes();
            } catch (e) { st.textContent = 'Error: ' + e.message; }
        }

        async function rerenderSelected() {
            const ids = [...selectedScenes];
            if (ids.length === 0) return;
            const msg = document.getElementById('rerenderMsg');
            const model = (document.getElementById('rerenderModel') || {}).value || 'flux-dev';
            msg.textContent = 'Submitting…';
            try {
                const res = await fetch('/scenes/api/rerender', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: ids, comfyui_model: model }) });
                const j = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(j.detail || res.statusText);
                pollJob(j.job_id, msg);
            } catch (e) { msg.textContent = 'Error: ' + e.message; }
        }

        async function pollJob(jobId, msg) {
            msg.textContent = 'Rendering…';
            const tick = async () => {
                try {
                    const r = await fetch(`/api/jobs/${jobId}`);
                    const j = await r.json();
                    msg.textContent = j.message || j.status;
                    if (j.status === 'done') {
                        msg.textContent = 'Done ✓ — reloading';
                        selectedScenes.clear();
                        await loadSceneData();
                        return;
                    }
                    if (j.status === 'error') { msg.textContent = 'Error: ' + (j.error || 'render failed'); return; }
                    if (j.status === 'cancelled') { msg.textContent = 'Cancelled'; return; }
                } catch (e) { msg.textContent = 'Poll error: ' + e.message; }
                setTimeout(tick, 1500);
            };
            tick();
        }

        // Reload the current project's scenes + clips (e.g. after an agent finishes).
        async function refreshView() {
            if (!currentProject) return;
            const btn = document.getElementById('refreshBtn');
            const label = btn ? btn.textContent : '';
            if (btn) { btn.textContent = '↻ Refreshing…'; btn.disabled = true; }
            assetNonce = Date.now();          // force re-rendered clips to reload (bypass cache)
            try {
                await loadSceneData();
                await loadFleet();
            } finally {
                if (btn) { btn.textContent = label || '↻ Refresh'; btn.disabled = false; }
            }
        }

        // ---------- Fleet: dispatch scenes to Claude Code agents + status board ----------
        async function loadFleet() {
            try {
                const r = await fetch('/scenes/api/fleet');
                fleetAgents = (await r.json()).agents || [];
            } catch (e) { fleetAgents = []; }
            renderFleet();
            refreshAgentSelect();   // update dropdown options in place (don't rebuild the bar / lose the note)
        }

        function refreshAgentSelect() {
            const live = fleetAgents.filter(a => a.session_alive);
            const opts = live.length
                ? live.map(a => `<option value="${a.agent}">${a.agent}${a.state==='working'?' (busy)':''}</option>`).join('')
                : '<option value="">no agents</option>';
            document.querySelectorAll('.js-agent-select').forEach(sel => {
                const cur = sel.value;
                sel.innerHTML = opts;
                if (cur && live.some(a => a.agent === cur)) sel.value = cur;
            });
        }

        function renderFleet() {
            let panel = document.getElementById('fleetPanel');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'fleetPanel';
                panel.className = 'fleet-panel';
                document.body.appendChild(panel);
            }
            if (!fleetAgents.length) { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            const rows = fleetAgents.map(a => {
                const st = a.state || 'idle';
                const where = a.scene_ids ? ` · ${(a.scene_ids || []).join(', ')}` : '';
                const msg = a.message ? `<div class="fleet-msg">${a.message}</div>` : '';
                const dead = a.session_alive ? '' : ' (gone)';
                return `<div class="fleet-agent">
                          <span class="fleet-dot ${st}"></span>
                          <b>${a.agent}</b><span class="fleet-state">${st}${dead}${where}</span>
                          ${msg}
                        </div>`;
            }).join('');
            panel.innerHTML = `<div class="fleet-title">Agents</div>${rows}`;
        }

        async function dispatchToAgent() {
            const ids = [...selectedScenes];
            const note = (document.getElementById('agentNote') || {}).value || '';
            const agent = (document.getElementById('agentSelect') || {}).value || '';
            const msg = document.getElementById('rerenderMsg');
            if (!ids.length) { msg.textContent = 'Select scene(s) first.'; return; }
            if (!note.trim()) { msg.textContent = 'Write a note for the agent.'; return; }
            if (!agent) { msg.textContent = 'No live agent to send to.'; return; }
            msg.textContent = `Dispatching to ${agent}…`;
            try {
                const res = await fetch('/scenes/api/dispatch', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: ids, note, agent }) });
                const j = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(j.detail || res.statusText);
                msg.textContent = `Sent ${ids.length} scene(s) to ${agent} ✓ — watch the Agents panel`;
                loadFleet();
            } catch (e) { msg.textContent = 'Dispatch error: ' + e.message; }
        }

        async function dispatchSceneToAgent(id) {
            const note = ((document.getElementById('note-' + id) || {}).value || '').trim();
            const agent = (document.getElementById('sceneAgent-' + id) || {}).value || '';
            const st = document.getElementById('editstatus-' + id);
            if (!note) { st.textContent = 'Write a note first.'; return; }
            if (!agent) { st.textContent = 'No live agent to send to.'; return; }
            st.textContent = `Dispatching to ${agent}…`;
            try {
                const res = await fetch('/scenes/api/dispatch', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: currentProject, scene_ids: [id], note, agent }) });
                const j = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(j.detail || res.statusText);
                st.textContent = `Sent to ${agent} ✓ — watch the Agents panel (top-right)`;
                loadFleet();
            } catch (e) { st.textContent = 'Dispatch error: ' + e.message; }
        }

        // ---------- Preview modal (image OR in/out-bounded clip) ----------
        function _lbReset() {
            const img = document.getElementById('lightboxImg');
            const vid = document.getElementById('lightboxVid');
            img.style.display = 'none'; img.src = '';
            vid.style.display = 'none'; try { vid.pause(); } catch (e) {}
            vid.src = ''; vid.onloadedmetadata = null; vid.ontimeupdate = null;
            document.getElementById('lightboxCap').textContent = '';
        }
        function openLightbox(src, cap) {
            _lbReset();
            const img = document.getElementById('lightboxImg');
            img.src = src; img.style.display = '';
            document.getElementById('lightboxCap').textContent = cap || '';
            document.getElementById('lightbox').classList.add('active');
        }
        function openClipPreview(src, start, end, cap) {
            _lbReset();
            const vid = document.getElementById('lightboxVid');
            start = +start || 0; end = (end != null && +end > start) ? +end : null;
            vid.src = `/scenes/api/source-video?project=${encodeURIComponent(currentProject)}&src=${encodeURIComponent(src)}`;
            vid.style.display = '';
            vid.onloadedmetadata = () => { try { vid.currentTime = start; vid.play().catch(() => {}); } catch (e) {} };
            // bound playback to the clip's out-point (loop the segment)
            vid.ontimeupdate = () => { if (end != null && vid.currentTime >= end) vid.currentTime = start; };
            document.getElementById('lightboxCap').textContent = cap || '';
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            _lbReset();
        }
        // Preview a picker result (image → full pic; clip/segment → bounded video).
        function previewItem(i) {
            const it = pickerItems[i]; if (!it) return;
            if (it.source === 'library') return openLightbox(it.thumb, it.label);
            const p = it.payload || {};
            openClipPreview(p.source_video_path, p.clip_start, p.clip_end, it.label);
        }
        // Preview a bound tray asset.
        function previewAsset(sceneId, assetId) {
            const scene = allScenes.find(s => s.id === sceneId); if (!scene) return;
            const a = (scene.assets || []).find(x => x.id === assetId); if (!a) return;
            if (a.kind === 'clip' || a.kind === 'video') return openClipPreview(a.src, a.clip_start, a.clip_end, a.label || a.id);
            openLightbox(a.thumb || assetUrl(a.src), a.label || a.id);
        }
        // Close on backdrop or × click — never when interacting with the media itself.
        document.getElementById('lightbox').addEventListener('click', function (e) {
            if (e.target === this || e.target.classList.contains('lightbox-close')) closeLightbox();
        });

        // Seek audio to time and set range
        function seekTo(start, end, sceneId) {
            const audio = document.getElementById('audioPlayer');
            if (audio.src) {
                // Set playback range
                playbackRange = { start, end, sceneId };

                // Show range UI
                const rangeContainer = document.getElementById('playbackRange');
                const rangeInfo = document.getElementById('rangeInfo');
                rangeContainer.style.display = 'flex';
                rangeInfo.textContent = `${formatTime(start)} - ${formatTime(end)} (${sceneId})`;

                // Seek and play
                audio.currentTime = start;
                audio.play();
            }
        }

        // Stop range playback
        function stopRangePlayback() {
            const audio = document.getElementById('audioPlayer');
            audio.pause();
            playbackRange = null;
            document.getElementById('playbackRange').style.display = 'none';
        }

        // Update audio time display and highlight current scene
        function updateAudioTime() {
            const audio = document.getElementById('audioPlayer');
            const timeDisplay = document.getElementById('audioTime');
            const currentTime = audio.currentTime;

            timeDisplay.textContent = formatTime(currentTime);

            // Check range playback
            if (playbackRange && currentTime >= playbackRange.end) {
                const loopCheckbox = document.getElementById('loopCheckbox');
                if (loopCheckbox.checked) {
                    // Loop back to start
                    audio.currentTime = playbackRange.start;
                } else {
                    // Stop at end
                    audio.pause();
                    playbackRange = null;
                    document.getElementById('playbackRange').style.display = 'none';
                }
            }

            // Highlight current scene
            document.querySelectorAll('.scene-row').forEach(row => {
                const start = parseFloat(row.dataset.start);
                const end = parseFloat(row.dataset.end);
                if (currentTime >= start && currentTime < end) {
                    row.classList.add('active');
                    // Scroll into view if not visible
                    if (!isElementInViewport(row)) {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    row.classList.remove('active');
                }
            });
        }

        function isElementInViewport(el) {
            const rect = el.getBoundingClientRect();
            return (
                rect.top >= 0 &&
                rect.left >= 0 &&
                rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
                rect.right <= (window.innerWidth || document.documentElement.clientWidth)
            );
        }

        // Load projects list
        async function loadProjects() {
            try {
                const res = await fetch('/scenes/api/projects');
                const data = await res.json();
                projects = data.projects || [];

                const projectFilter = document.getElementById('projectFilter');
                projectFilter.innerHTML = '<option value="">Select Project...</option>';

                projects.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.name;
                    option.textContent = `${p.name} (${p.scene_count} scenes)`;
                    projectFilter.appendChild(option);
                });

                // Set from URL or auto-select if only one project
                currentProject = getProjectFromUrl();
                if (!currentProject && projects.length === 1) {
                    currentProject = projects[0].name;
                    updateUrl(currentProject);
                }

                if (currentProject) {
                    projectFilter.value = currentProject;
                    await loadSceneData();
                } else if (projects.length === 0) {
                    document.getElementById('sceneList').innerHTML =
                        '<div class="loading">No projects found. Run <code>nolan process essay.md</code> to create one.</div>';
                } else {
                    document.getElementById('sceneList').innerHTML =
                        '<div class="loading">Select a project from the dropdown above.</div>';
                }
            } catch (err) {
                console.error('Failed to load projects:', err);
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Error loading projects.</div>';
            }
        }

        // Load scene data for current project
        async function loadSceneData() {
            if (!currentProject) return;

            try {
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Loading scene plan...</div>';

                // Load scenes
                const scenesRes = await fetch(`/scenes/api/scenes/flat?project=${encodeURIComponent(currentProject)}`);
                const scenesData = await scenesRes.json();
                allScenes = scenesData.scenes;
                sections = scenesData.sections;
                currentPipeline = scenesData.pipeline || 'segment';
                editableFields = scenesData.editable_fields || [];
                // authoring-mode controls (Refine / Accept) only for flow projects
                const fc = document.getElementById('flowControls');
                if (fc) {
                    const isFlow = (currentPipeline === 'flow');
                    fc.style.display = isFlow ? '' : 'none';
                    if (isFlow) loadFlowAgents();
                }
                selectedScenes.clear();
                editedScenes.clear();

                // Reset and populate section filter
                const sectionFilter = document.getElementById('sectionFilter');
                sectionFilter.innerHTML = '<option value="all">All Sections</option>';
                sections.forEach(section => {
                    const option = document.createElement('option');
                    option.value = section;
                    option.textContent = section;
                    sectionFilter.appendChild(option);
                });
                currentSection = 'all';

                renderScenes();

                // Load audio
                const audioRes = await fetch(`/scenes/api/audio-info?project=${encodeURIComponent(currentProject)}`);
                const audioData = await audioRes.json();
                const audioContainer = document.getElementById('audioContainer');
                const audioPlayer = document.getElementById('audioPlayer');

                if (audioData.exists) {
                    audioPlayer.src = audioData.path;
                    audioContainer.style.display = 'flex';
                    audioPlayer.addEventListener('timeupdate', updateAudioTime);
                } else {
                    audioContainer.style.display = 'none';
                    audioPlayer.src = '';
                }

            } catch (err) {
                console.error('Failed to load data:', err);
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Error loading scene plan.</div>';
            }
        }

        // Filter handlers
        document.getElementById('projectFilter').addEventListener('change', function() {
            currentProject = this.value;
            updateUrl(currentProject);
            if (currentProject) {
                loadSceneData();
            } else {
                allScenes = [];
                sections = [];
                document.getElementById('sceneList').innerHTML =
                    '<div class="loading">Select a project from the dropdown above.</div>';
                document.getElementById('audioContainer').style.display = 'none';
            }
        });

        document.getElementById('sectionFilter').addEventListener('change', function() {
            currentSection = this.value;
            renderScenes();
        });

        document.getElementById('statusFilter').addEventListener('change', function() {
            currentStatus = this.value;
            renderScenes();
        });

        // Initialize
        loadProjects();
        loadFleet();
        setInterval(loadFleet, 5000);   // poll the agent fleet board
</script>

<div class="picker-backdrop" id="pickerBackdrop" onclick="closePicker()"></div>
<div class="picker-drawer" id="pickerDrawer">
    <div class="picker-head">
        <span id="pickerTitle">Add assets</span>
        <button class="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div class="picker-tabs">
        <button class="ptab active" id="ptab-pictures" onclick="setPickerTab('pictures')">Pictures</button>
        <button class="ptab" id="ptab-videos" onclick="setPickerTab('videos')">Videos / Clips</button>
    </div>
    <div class="picker-subbar" id="pickerSub" style="display:none"></div>
    <div class="picker-search">
        <input id="pickerQ" placeholder="search…" onkeydown="if(event.key==='Enter')loadPicker()">
        <button onclick="loadPicker()">Go</button>
    </div>
    <div class="picker-grid" id="pickerGrid"></div>
    <div class="picker-foot">
        <button class="picker-add" id="pickerAdd" disabled onclick="pickerAddSelected()">Add 0 to scene</button>
    </div>
</div>
</body>
</html>
