<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLAN - Scene Plan Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 680;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .filter-select {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.15s ease;
        }

        .filter-select:hover {
            border-color: var(--text-secondary);
        }

        .stats {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Audio Player */
        .audio-container {
            background: var(--bg-tertiary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .audio-container audio {
            height: 32px;
        }

        .audio-time {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent);
            min-width: 60px;
        }

        .playback-range {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: 1rem;
            padding-left: 1rem;
            border-left: 1px solid var(--border);
        }

        .range-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        #rangeInfo {
            font-family: monospace;
            color: #4ecdc4;
            font-size: 0.85rem;
        }

        .loop-toggle {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .loop-toggle input {
            cursor: pointer;
        }

        .stop-range-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .stop-range-btn:hover {
            background: var(--accent-hover);
        }

        /* Main Content */
        .main {
            padding: 1rem 2rem;
        }

        /* Scene Grid */
        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .scene-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .scene-row:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .scene-row.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .scene-row.missing-asset {
            border-left: 3px solid var(--danger);
        }

        /* Left Column - Scene Details */
        .scene-details {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .scene-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .scene-id {
            font-weight: 650;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .scene-timing {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .scene-timing:hover {
            color: var(--accent);
        }

        .scene-type {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .scene-type.b-roll { background: var(--bg-tertiary); color: #4ecdc4; }
        .scene-type.graphics { background: var(--bg-tertiary); color: #ffe66d; }
        .scene-type.generated { background: var(--bg-tertiary); color: var(--accent); }
        .scene-type.a-roll { background: var(--bg-tertiary); color: #95e1d3; }
        .scene-type.host { background: var(--bg-tertiary); color: #dfe6e9; }

        .scene-narration {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.5;
            background: var(--bg-tertiary);
            padding: 0.75rem 0.85rem;
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .scene-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .meta-row {
            display: flex;
            gap: 0.5rem;
        }

        .meta-label {
            color: var(--text-secondary);
            min-width: 80px;
        }

        .meta-value {
            color: var(--text-primary);
            word-break: break-word;
        }

        .scene-status {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .status-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .status-badge.matched { background: #2d6a4f; color: #95d5b2; }
        .status-badge.generated { background: #7b2cbf; color: #e0aaff; }
        .status-badge.infographic { background: #1d3557; color: #a8dadc; }
        .status-badge.missing { background: #9d0208; color: #ffccd5; }
        .status-badge.rendered { background: #006d77; color: #83c5be; }

        /* tempo (editorial arc) row */
        .scene-tempo { display: flex; align-items: center; gap: 6px; margin: 4px 0 2px; }
        .tempo-bar { position: relative; width: 90px; height: 6px; background: #23232b; border-radius: 3px; overflow: hidden; }
        .tempo-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; }
        .tempo-chip { font-size: 0.66rem; padding: 0.12rem 0.4rem; border-radius: 5px; background: #2a2a34; color: #c7c7d0; letter-spacing: 0.02em; }

        /* Expandable details */
        .scene-expand {
            margin-top: 0.5rem;
        }

        .expand-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.25rem 0;
        }

        .expand-btn:hover {
            color: var(--accent);
        }

        .scene-full-details {
            display: none;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .scene-full-details.expanded {
            display: block;
        }

        .detail-section {
            margin-bottom: 0.75rem;
        }

        .detail-section-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .detail-section-content {
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg-tertiary);
            padding: 0.5rem;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Right Column - Asset Preview */
        .asset-preview {
            background: linear-gradient(150deg, var(--bg-tertiary), var(--bg-primary));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            padding: 0.75rem;
            position: relative;
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .asset-preview img,
        .asset-preview video {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 16px -6px rgba(0, 0, 0, 0.55);
        }

        .asset-preview img:hover {
            transform: scale(1.015);
            box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.65);
        }

        .asset-placeholder {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: center;
            padding: 2rem;
        }

        .asset-placeholder-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .asset-path {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0));
            padding: 1.25rem 0.5rem 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            font-family: monospace;
            word-break: break-all;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Section Divider */
        .section-divider {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.55rem 0.85rem;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            margin: 1.25rem 0 0.25rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .scene-row {
                grid-template-columns: 1fr;
            }

            .asset-preview {
                min-height: 150px;
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        /* ---- Iteration UI (select / edit / comment / re-render) ---- */
        .scene-select { margin-right: 8px; cursor: pointer; }
        .scene-edit { margin-top: 10px; }
        .edit-toggle {
            background: none; border: 1px solid var(--border); color: var(--text-secondary);
            border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
        }
        .edit-toggle:hover { color: #fff; border-color: var(--text-secondary); }
        .edit-panel {
            margin-top: 8px; padding: 10px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--bg-secondary);
        }
        /* per-beat super search */
        .super-search { margin-top: 8px; padding: 10px; border: 1px solid var(--accent, #4c7dff);
            border-radius: 8px; background: var(--bg-secondary); }
        .ss-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .ss-op { padding: 4px 8px; background: var(--bg-primary, #0f172a); color: var(--text-primary, #e2e8f0);
            border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
        .ss-controls button { padding: 5px 12px; border-radius: 6px; border: 0; background: var(--accent, #4c7dff);
            color: #fff; cursor: pointer; font-size: 12px; }
        .ss-status { font-size: 12px; color: var(--text-secondary); }
        .ss-trace { font-size: 11px; color: var(--text-secondary); margin: 6px 0; }
        .ss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 8px; }
        .ss-pick { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #000; }
        .ss-pick img, .ss-pick video { width: 100%; height: 92px; object-fit: cover; display: block; }
        .ss-pick .ss-meta { padding: 4px 6px; font-size: 10px; color: var(--text-secondary); background: var(--bg-secondary); }
        .ss-pick button { width: 100%; border: 0; padding: 4px; font-size: 11px; background: #2d6a4f; color: #d8f3dc; cursor: pointer; }
        .edit-mode-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
        .tab-btn {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary);
            border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer;
        }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .edit-note, .field-edit input {
            width: 100%; box-sizing: border-box; background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px;
        }
        .field-edit { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .field-edit .field-label { flex: 0 0 130px; color: var(--text-secondary); font-size: 12px; font-family: monospace; }
        .apply-btn {
            margin-top: 6px; background: var(--success); color: #fff; border: none;
            border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer;
        }
        .apply-btn:hover { background: var(--success); }
        .note-actions { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
        .note-or { color: var(--text-secondary); font-size: 11px; }
        /* ---- Asset tray ---- */
        .asset-tray { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .tray-empty { color: var(--text-secondary); font-size: 12px; padding: 4px 0; }
        .tray-card { position: relative; width: 92px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 7px; padding: 5px; }
        .tray-idx { position: absolute; top: 3px; left: 3px; background: var(--accent); color: #fff; font-size: 10px; border-radius: 4px; padding: 0 4px; z-index: 2; }
        .tray-thumb { width: 100%; height: 64px; object-fit: cover; border-radius: 4px; background: var(--bg-primary); display: block; }
        .tray-label { font-size: 10px; color: var(--text-secondary); margin-top: 3px; line-height: 1.2; max-height: 24px; overflow: hidden; }
        .tray-x { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6); color: var(--danger); border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
        .tray-pin { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,.6); color: var(--warning); border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
        .tray-pinbar { grid-column: 1 / -1; position: relative; background: var(--bg-tertiary); border: 1px solid var(--warning); border-radius: 6px; padding: 6px 26px 6px 8px; font-size: 11px; color: var(--text-primary); margin-bottom: 4px; }
        .tray-cands { grid-column: 1 / -1; border-top: 1px dashed var(--border); margin-top: 6px; padding-top: 4px; display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 6px; }
        .tray-card.cand { opacity: .85; position: relative; }
        .pgrid { display: grid; grid-template-columns: repeat(3, 8px); gap: 2px; margin-top: 4px; align-items: center; }
        .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-tertiary); cursor: pointer; }
        .pdot.on { background: var(--warning); }
        .pclr { grid-column: 1 / span 3; color: var(--text-secondary); font-size: 10px; cursor: pointer; text-align: right; }
        .asset-add { display: flex; gap: 6px; margin: 4px 0; }
        .asset-search { flex: 1; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; padding: 5px 8px; font-size: 12px; }
        .asset-results { display: flex; flex-wrap: wrap; gap: 6px; max-height: 220px; overflow-y: auto; }
        .res-card { width: 80px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; padding: 3px; background: var(--bg-primary); }
        .res-card:hover { border-color: var(--accent); }
        .res-card img { width: 100%; height: 56px; object-fit: cover; border-radius: 4px; display: block; }
        .res-card span { font-size: 9px; color: var(--text-secondary); display: block; margin-top: 2px; line-height: 1.1; max-height: 22px; overflow: hidden; }
        .edit-hint { color: var(--text-secondary); font-size: 11px; margin-top: 6px; line-height: 1.4; }
        .tray-kind { position: absolute; top: 3px; right: 22px; font-size: 8px; font-weight: 700; border-radius: 3px; padding: 0 3px; z-index: 2; color: #fff; }
        .tray-kind.image { background: var(--success); }
        .tray-kind.clip, .tray-kind.video { background: var(--warning); }
        /* ---- Asset picker drawer ---- */
        /* the picker opens FROM the Inspector — it must stack above it AND the sticky header */
        .picker-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 120; }
        .picker-backdrop.open { opacity: 1; pointer-events: auto; }
        .picker-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 92vw; background: var(--bg-secondary); border-left: 1px solid var(--border); box-shadow: -8px 0 30px rgba(0,0,0,.5); transform: translateX(100%); transition: transform .2s ease; z-index: 121; display: flex; flex-direction: column; }
        .picker-drawer.open { transform: translateX(0); }
        .picker-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-primary); }
        .picker-close { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; }
        .picker-tabs { display: flex; gap: 4px; padding: 8px 14px 0; }
        .ptab { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px 6px 0 0; padding: 6px 12px; cursor: pointer; font-size: 12px; }
        .ptab.active { background: var(--bg-primary); color: #fff; border-bottom-color: var(--bg-primary); }
        .picker-search { display: flex; gap: 6px; padding: 10px 14px; }
        .picker-search input { flex: 1; background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; padding: 6px 9px; font-size: 12px; }
        .picker-search button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0 12px; cursor: pointer; }
        .picker-grid { flex: 1; overflow-y: auto; padding: 0 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-content: start; }
        .pk-card { position: relative; cursor: pointer; border: 2px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--bg-primary); }
        .pk-card img { width: 100%; height: 78px; object-fit: cover; display: block; background: var(--bg-primary); }
        .pk-card span { display: block; font-size: 9px; color: var(--text-secondary); padding: 2px 4px; line-height: 1.15; max-height: 24px; overflow: hidden; }
        .pk-card.on { border-color: var(--warning); }
        .pk-check { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; line-height: 16px; text-align: center; font-size: 11px; border-radius: 50%; background: var(--warning); color: var(--bg-primary); opacity: 0; }
        .pk-card.on .pk-check { opacity: 1; }
        .pk-eye { position: absolute; top: 4px; left: 4px; width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 11px; border-radius: 4px; background: rgba(0,0,0,.6); color: #fff; cursor: pointer; opacity: 0; transition: opacity .12s; }
        .pk-card:hover .pk-eye { opacity: 1; }
        .tray-eye { position: absolute; top: 2px; right: 20px; background: rgba(0,0,0,.6); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; padding: 1px 4px; }
        .lightbox-cap { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: #e5e7eb; background: rgba(0,0,0,.55); padding: 4px 12px; border-radius: 6px; font-size: 13px; max-width: 80vw; text-align: center; }
        .lightbox-cap:empty { display: none; }
        .tray-card[draggable] { cursor: grab; }
        .tray-card[draggable]:active { cursor: grabbing; }
        .scene-row.drop-target { outline: 2px dashed var(--accent); outline-offset: -4px; background: color-mix(in srgb, var(--accent) 8%, transparent); }
        .mention-pop { position: absolute; z-index: 400; max-height: 280px; overflow-y: auto; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 10px 28px rgba(0,0,0,.45); padding: 4px; }
        .mention-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 7px; cursor: pointer; font-size: 13px; }
        .mention-item:hover { background: var(--bg-tertiary); }
        .mention-item img { width: 40px; height: 28px; object-fit: cover; border-radius: 4px; background: var(--bg-primary); flex: 0 0 auto; }
        .mention-item b { color: var(--accent); font-weight: 600; }
        .mention-item .mi-kind { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
        .mention-item .mi-label { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .picker-subbar { gap: 14px; padding: 8px 14px 0; flex-wrap: wrap; }
        .subseg { font-size: 11px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; }
        .subbtn { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 5px; padding: 3px 8px; cursor: pointer; font-size: 11px; }
        .subbtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
        .picker-list { flex: 1; overflow-y: auto; padding: 4px 14px; display: block; }
        .vid-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 10px; border: 1px solid var(--border); border-radius: 7px; margin-bottom: 6px; cursor: pointer; background: var(--bg-primary); }
        .vid-row:hover { border-color: var(--accent); }
        .vid-name { font-size: 12px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
        .vid-meta { font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
        .seg-back { grid-column: 1 / -1; font-size: 11px; color: var(--accent); cursor: pointer; padding: 2px 0 6px; }
        .picker-foot { padding: 12px 14px; border-top: 1px solid var(--border); }
        .picker-add { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 9px; cursor: pointer; font-size: 13px; }
        .picker-add:disabled { background: var(--bg-tertiary); color: var(--text-secondary); cursor: default; }
        .scene-agent {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 4px 6px; font-size: 12px;
        }
        .agent-btn {
            background: var(--accent); color: #fff; border: none; border-radius: 6px;
            padding: 5px 12px; font-size: 12px; cursor: pointer;
        }
        .agent-btn:hover { background: var(--accent-hover); }
        .status-badge.edited { background: var(--warning); color: var(--bg-primary); }
        .asset-placeholder.edited { color: var(--warning); }
        .edit-status { margin-top: 6px; font-size: 12px; color: var(--warning); min-height: 14px; }
        .rerender-bar {
            /* above the Inspector backdrop: "Queue re-render" from the
               drawer must leave the bar clickable, not dimmed behind it */
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 115;
            display: flex; align-items: center; gap: 12px;
            background: var(--bg-secondary); border-top: 1px solid var(--border);
            padding: 10px 18px; font-size: 13px; color: var(--text-primary);
            box-shadow: 0 -8px 24px -12px rgba(0, 0, 0, 0.6);
        }
        .rerender-bar button {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 5px 12px; cursor: pointer;
        }
        .rerender-bar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .rerender-model { color: var(--text-secondary); font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .rerender-model select {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 4px 6px; font-size: 12px;
        }
        .rerender-msg { color: var(--warning); }
        .refresh-btn {
            background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
            border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
        }
        .refresh-btn:hover { color: #fff; border-color: var(--text-secondary); }
        .refresh-btn:disabled { opacity: 0.6; cursor: default; }
        .rerender-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .agent-note {
            flex: 1; min-width: 240px; background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px;
        }
        .fleet-panel {
            position: fixed; top: 70px; right: 16px; z-index: 40; width: 260px;
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 12px; font-size: 12px; color: var(--text-primary);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .fleet-title { font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: .04em; text-transform: uppercase; font-size: 11px; }
        .fleet-agent { padding: 6px 0; border-top: 1px solid var(--border); }
        .fleet-agent:first-of-type { border-top: none; }
        .fleet-state { color: var(--text-secondary); margin-left: 6px; }
        .fleet-msg { color: var(--text-secondary); margin-top: 2px; font-size: 11px; }
        .fleet-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); margin-right: 4px; }
        .fleet-dot.working { background: var(--warning); animation: pulse 1.2s infinite; }
        .fleet-dot.done { background: var(--success); }
        .fleet-dot.error { background: var(--danger); }
        .fleet-dot.dispatched { background: var(--accent); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

        /* iPhone / narrow-screen: stack header + controls, single-column scenes, no zoom-on-focus */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
            }
            .header-controls {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .filter-select,
            .refresh-btn {
                width: 100%;
            }
            select, input, textarea {
                font-size: 16px;
            }
            .main {
                padding: 0.75rem 1rem;
            }
            .scene-row {
                grid-template-columns: 1fr;
            }
            .audio-container {
                flex-wrap: wrap;
            }
            .playback-range {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
            }
            .fleet-panel {
                position: static;
                width: auto;
                margin-bottom: 1rem;
            }
            .rerender-bar {
                flex-wrap: wrap;
            }
            .picker-drawer {
                width: 100%;
                max-width: 100%;
            }
        }

        /* ===== slim scan rows + Scene Inspector drawer (card redesign) ===== */
        .srow { display: flex; align-items: center; gap: 12px; padding: 9px 12px;
                background: var(--bg-secondary); border: 1px solid var(--border);
                border-radius: 10px; margin-bottom: 6px; cursor: pointer; }
        .srow:hover { border-color: var(--text-secondary); }
        .srow.active { border-color: var(--accent); box-shadow: 0 0 14px rgba(37,99,235,.25); }
        .srow.selected-row { outline: 2px solid var(--accent); outline-offset: 1px; }
        .srow.drop-target { border-color: var(--accent); }
        .srow .sthumb { flex: 0 0 84px; width: 84px; height: 48px; border-radius: 6px;
                overflow: hidden; background: #000; display: flex; align-items: center;
                justify-content: center; color: var(--text-secondary); font-size: 18px; }
        .srow .sthumb img, .srow .sthumb video { width: 100%; height: 100%; object-fit: cover; }
        .srow .smain { flex: 1; min-width: 0; }
        .srow .sline1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .srow .sid { font-weight: 700; font-size: 13px; }
        .srow .stime { font-size: 11px; color: var(--text-secondary); cursor: pointer; }
        .srow .stime:hover { color: var(--accent); }
        .srow .snarr { font-size: 12px; color: var(--text-secondary); white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
        .chip { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
                border: 1px solid var(--border); color: var(--text-secondary); white-space: nowrap; }
        .chip.prov-search, .chip.prov-search-bridged { color: #7aa2f7; border-color: #7aa2f7; }
        .chip.prov-library, .chip.prov-library-bridged { color: #9ece6a; border-color: #9ece6a; }
        .chip.prov-art { color: #e0af68; border-color: #e0af68; }
        .chip.prov-generated { color: #bb9af7; border-color: #bb9af7; }
        .chip.prov-motion { color: #7dcfff; border-color: #7dcfff; }
        .chip.prov-none { color: var(--danger); border-color: var(--danger); }
        .sdot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px; }
        .sdot.ok { background: var(--success); } .sdot.miss { background: var(--danger); }
        .sdot.pend { background: #f2c14e; }
        /* drawer */
        /* drawer stack sits ABOVE the sticky header (z 100): backdrop 110 <
           inspector 111 < re-render bar 115 < picker 120/121 < mention-pop 400 */
        .insp-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); opacity: 0;
                pointer-events: none; transition: opacity .15s; z-index: 110; }
        .insp-backdrop.open { opacity: 1; pointer-events: auto; }
        .insp { position: fixed; top: 0; right: -560px; width: 540px; max-width: 96vw; height: 100vh;
                background: var(--bg-primary); border-left: 1px solid var(--border); z-index: 111;
                transition: right .18s ease; display: flex; flex-direction: column; }
        .insp.open { right: 0; }
        .insp-hd { padding: 14px 18px; border-bottom: 1px solid var(--border);
                display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .insp-hd .sid { font-size: 15px; font-weight: 700; }
        .insp-x { margin-left: auto; background: none; border: 1px solid var(--border);
                color: var(--text-secondary); border-radius: 8px; padding: 4px 10px; cursor: pointer; }
        .insp-body { flex: 1; overflow-y: auto; padding: 14px 18px 80px; }
        .insp-prev { border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 12px; }
        .insp-prev img, .insp-prev video { width: 100%; max-height: 260px; object-fit: contain; display: block; }
        .igrp { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        .igrp > .ihd { padding: 9px 12px; font-size: 12px; font-weight: 700; letter-spacing: .05em;
                text-transform: uppercase; color: var(--text-secondary); background: var(--bg-secondary);
                display: flex; justify-content: space-between; align-items: baseline; }
        .igrp > .ihd .fx { font-size: 10px; font-weight: 500; text-transform: none;
                letter-spacing: 0; color: var(--accent); }
        .igrp > .ibody { padding: 12px; }
        .insp-narr { font-size: 13px; color: var(--text-primary); font-style: italic; line-height: 1.55; }
        .insp-note { font-size: 11px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
        .insp-foot { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 18px;
                background: var(--bg-secondary); border-top: 1px solid var(--border);
                display: flex; gap: 10px; align-items: center; }
        /* motion-spec fold (How it moves) */
        .mo-fold { border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; }
        .mo-fold > summary { cursor: pointer; padding: 7px 10px; font-size: 12px;
                color: var(--text-secondary); user-select: none; }
        .mo-fold[open] > summary { border-bottom: 1px solid var(--border); }
        .mo-fold .mo-body { padding: 8px 10px 10px; }

        /* ===== Timeline view (P2, read-only) ===== */
        .tl-panel { display: none; background: var(--bg-secondary); border: 1px solid var(--border);
                    border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
        .tl-head { display: flex; gap: 10px; align-items: center; padding: 8px 12px;
                   border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
        .tl-head button { background: var(--bg-primary); border: 1px solid var(--border);
                   color: var(--text-primary); border-radius: 6px; padding: 2px 9px; cursor: pointer; }
        .tl-scroll { overflow-x: auto; padding: 10px 12px 12px; }
        .tl-canvas { position: relative; }
        .tl-ruler { position: relative; height: 18px; }
        .tl-tick { position: absolute; top: 0; font-size: 10px; color: var(--text-secondary);
                   border-left: 1px solid var(--border); padding-left: 3px; height: 14px; }
        .tl-lane { position: relative; height: 34px; margin-top: 6px; }
        .tl-lane.audio { height: 46px; }
        .tl-lanelabel { position: sticky; left: 0; z-index: 3; font-size: 10px; text-transform: uppercase;
                   letter-spacing: .07em; color: var(--text-secondary); width: 0; white-space: nowrap; }
        .tl-block { position: absolute; top: 12px; height: 22px; border-radius: 5px; font-size: 10.5px;
                   line-height: 20px; padding: 0 6px; white-space: nowrap; overflow: hidden;
                   text-overflow: ellipsis; border: 1px solid var(--border); box-sizing: border-box; }
        .tl-block.sec { background: var(--bg-primary); color: var(--text-secondary); cursor: default; }
        .tl-block.scene { background: rgba(37,99,235,.16); border-color: rgba(37,99,235,.5); cursor: pointer; }
        .tl-block.scene:hover { border-color: var(--accent); }
        .tl-block.scene.missing { background: rgba(220,38,38,.14); border-color: rgba(220,38,38,.5); }
        .tl-block.unit { background: var(--bg-primary); cursor: pointer; display: flex; gap: 5px;
                   align-items: center; padding-right: 4px; }
        .tl-badge { font-size: 9.5px; border-radius: 4px; padding: 0 5px; line-height: 15px;
                   border: 1px solid var(--accent); color: var(--accent); flex: none; }
        .tl-badge.derived { border-style: dashed; opacity: .8; }
        .tl-shots { font-size: 9.5px; color: var(--text-secondary); flex: none; }
        .tl-vo { position: absolute; inset: 12px 0 0 0; }
        .tl-sfx { position: absolute; top: 0; font-size: 11px; cursor: default; z-index: 2; }
        /* P3 edit affordances */
        .tl-h { position: absolute; top: 0; bottom: 0; width: 7px; cursor: ew-resize; z-index: 2; }
        .tl-h.l { left: 0; border-left: 2px solid transparent; }
        .tl-h.r { right: 0; border-right: 2px solid transparent; }
        .tl-block.scene:hover .tl-h.l { border-left-color: var(--accent); }
        .tl-block.scene:hover .tl-h.r { border-right-color: var(--accent); }
        .tl-block.scene.dirty { border-style: dashed; }
        .tl-conflict { flex: none; font-size: 11px; }
        .tl-conflict.error { filter: none; }
        /* Inspector "what will render" strip */
        .intent-strip { margin: -4px 0 10px; }
        .intent-line { font-size: 12px; color: var(--text-primary); }
        .intent-detail { color: var(--text-secondary); font-size: 11px; }
        .intent-over { color: var(--warning); font-size: 11px; }
        .intent-c { font-size: 11.5px; margin-top: 3px; border-left: 3px solid var(--border); padding-left: 7px; }
        .intent-c.error { color: var(--danger); border-left-color: var(--danger); }
        .intent-c.warn { color: var(--warning); border-left-color: var(--warning); }
        .intent-c.info { color: var(--text-secondary); }
        .tl-badge.lockable { cursor: pointer; }
        .tl-badge.lockable:hover { background: rgba(37,99,235,.15); }
        .tl-lane.notes { min-height: 30px; background: repeating-linear-gradient(90deg,
                   transparent 0 40px, rgba(255,255,255,.02) 40px 80px); cursor: crosshair; }
        .tl-block.note { background: rgba(217,119,6,.15); border-color: rgba(217,119,6,.55); cursor: pointer; }
        .tl-block.note.applied { background: rgba(22,163,74,.15); border-color: rgba(22,163,74,.55); }
        .tl-block.note.dispatched { background: rgba(147,51,234,.15); border-color: rgba(147,51,234,.55); }
        .tl-note-dlg { background: var(--bg-secondary); color: var(--text-primary);
                   border: 1px solid var(--border); border-radius: 12px; padding: 16px; max-width: 420px; }
        .tl-note-dlg::backdrop { background: rgba(0,0,0,.5); }
        .tl-note-dlg label { display: block; font-size: 11px; color: var(--text-secondary); margin: 8px 0 3px; }
        .tl-note-dlg input, .tl-note-dlg textarea, .tl-note-dlg select { width: 100%;
                   background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border);
                   border-radius: 7px; padding: 6px 8px; font-size: 12.5px; box-sizing: border-box; }
        .tl-note-dlg .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
        .tl-note-dlg button { background: var(--bg-primary); border: 1px solid var(--border);
                   color: var(--text-primary); border-radius: 7px; padding: 5px 12px; font-size: 12.5px; cursor: pointer; }
    </style>
</head>
<body>
<link rel="stylesheet" href="/static/nolan.css">
<script src="/static/nav.js" data-active="scenes"></script>
    <header class="header">
        <h1>Scene Plan Viewer</h1>
        <div class="header-controls">
            <select id="projectFilter" class="filter-select" style="min-width: 150px;">
                <option value="">Select Project...</option>
            </select>
            <select id="sectionFilter" class="filter-select">
                <option value="all">All Sections</option>
            </select>
            <select id="statusFilter" class="filter-select">
                <option value="all">All Status</option>
                <option value="matched">Matched</option>
                <option value="generated">Generated</option>
                <option value="infographic">Infographic</option>
                <option value="missing">Missing</option>
            </select>
            <button id="refreshBtn" class="refresh-btn" onclick="refreshView()" title="Reload scenes + re-rendered clips (after an agent finishes)">↻ Refresh</button>
            <button id="tlToggle" class="refresh-btn" onclick="toggleTimeline()" title="Timeline view: scenes, visual units + motion badges, sfx and VO on a time axis">📊 Timeline</button>
            <span id="flowControls" style="display:none;">
                <label style="font-size:.72rem;color:var(--text-secondary)">agent:</label>
                <select id="flowAgent" title="Which NOLAN tmux agent runs the refine" style="font-size:.72rem;padding:2px 5px;background:var(--bg-primary,#111);color:var(--text-primary,#eee);border:1px solid #333;border-radius:5px"></select>
                <button class="refresh-btn" onclick="loadFlowAgents()" title="Refresh agent sessions">⟳</button>
                <button class="refresh-btn" onclick="flowRefine()" title="Authoring mode (Gate A): dispatch the chosen agent to refine the per-beat plan (blocks from the palette + asset wishlist)">✨ Refine plan</button>
                <button class="refresh-btn" onclick="flowAccept()" title="Promote the refined draft to the project's plan">✓ Accept draft</button>
            </span>
            <div class="stats" id="stats">Loading...</div>
        </div>
    </header>

    <div class="audio-container" id="audioContainer" style="display: none;">
        <span class="audio-time" id="audioTime">0:00</span>
        <audio id="audioPlayer" controls></audio>
        <div class="playback-range" id="playbackRange" style="display: none;">
            <span class="range-label">Playing:</span>
            <span id="rangeInfo">--</span>
            <label class="loop-toggle">
                <input type="checkbox" id="loopCheckbox"> Loop
            </label>
            <button class="stop-range-btn" onclick="stopRangePlayback()">Stop</button>
        </div>
    </div>

    <main class="main">
        <div class="tl-panel" id="timelinePanel">
            <div class="tl-head">
                <b style="color:var(--text-primary)">Timeline</b>
                <span>sections are locked — narration owns duration</span>
                <button onclick="tlZoom(1.4)">＋</button>
                <button onclick="tlZoom(1/1.4)">－</button>
                <span id="tlStat"></span>
            </div>
            <div class="tl-scroll"><div class="tl-canvas" id="tlCanvas"></div></div>
        </div>
        <dialog class="tl-note-dlg" id="tlNoteDlg">
            <div style="font-weight:700;font-size:13.5px">Range note</div>
            <div style="font-size:11.5px;color:var(--text-secondary);margin-top:3px">
                Asset and motion apply <b>deterministically</b> (pin + camera lock);
                free text goes to the agent revise lane for the scene under the range.</div>
            <div style="display:flex;gap:8px">
                <span style="flex:1"><label>from (s)</label><input id="tlnT0" type="number" step="0.1"></span>
                <span style="flex:1"><label>to (s)</label><input id="tlnT1" type="number" step="0.1"></span>
            </div>
            <label>what you want here (free text — agent lane · @ references assets/motions)</label>
            <textarea id="tlnText" class="mention-input" rows="2" placeholder="e.g. slow reveal of @[pic]… , hold on the final line"></textarea>
            <label>asset to pin (path, optional — from the pool/tray)</label>
            <input id="tlnAsset" placeholder="D:\...\assets\art\x.jpg">
            <label>camera motion (optional — locks still_treatment)</label>
            <select id="tlnMotion">
                <option value="">— no lock —</option>
                <option>kenburns-in</option><option>kenburns-out</option>
                <option>kenburns-pan</option><option>drift</option><option>tour</option>
            </select>
            <div class="row">
                <button onclick="document.getElementById('tlNoteDlg').close()">Cancel</button>
                <button onclick="tlSaveNote(false)">Save</button>
                <button style="border-color:var(--accent)" onclick="tlSaveNote(true)">Save + apply</button>
            </div>
        </dialog>
        <div class="scene-list" id="sceneList">
            <div class="loading">Loading scene plan...</div>
        </div>
    </main>

    <div class="insp-backdrop" id="inspBackdrop" onclick="closeInspector()"></div>
    <aside class="insp" id="insp" aria-label="Scene inspector">
        <div class="insp-hd" id="inspHd"></div>
        <div class="insp-body" id="inspBody"></div>
        <div class="insp-foot" id="inspFoot"></div>
    </aside>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="Full size">
        <video id="lightboxVid" src="" controls playsinline style="display:none; max-width:92vw; max-height:84vh; border-radius:8px;"></video>
        <div id="lightboxCap" class="lightbox-cap"></div>
    </div>

    <script>
        let allScenes = [];
        let sections = [];
        let projects = [];
        let currentProject = '';
        let currentSection = 'all';
        let currentStatus = 'all';

        // Iteration state
        let currentPipeline = 'segment';      // 'segment' | 'orchestrator'
        let editableFields = [];
        let selectedScenes = new Set();       // scene ids queued for re-render
        let shortlistKeys = new Set();        // shortlist item keys — drives the ☆/★ toggle
        let inspectorScene = null;            // scene id open in the Inspector drawer
        let editedScenes = new Set();         // scene ids edited this session, pending re-render

        // Range playback state
        let playbackRange = null;  // { start, end, sceneId }

        // Get project from URL
        function getProjectFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('project') || '';
        }

        // Update URL with project
        function updateUrl(project) {
            const url = new URL(window.location);
            if (project) {
                url.searchParams.set('project', project);
            } else {
                url.searchParams.delete('project');
            }
            window.history.replaceState({}, '', url);
        }

        // Format seconds to MM:SS
        function formatTime(seconds) {
            if (!seconds && seconds !== 0) return '--:--';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Get asset status for a scene
        function getAssetStatus(scene) {
            if (scene.rendered_clip) return 'rendered';
            if (scene.generated_asset) return 'generated';
            if (scene.matched_asset) return 'matched';
            if (scene.infographic_asset) return 'infographic';
            return 'missing';
        }

        // Get asset path for a scene
        function getAssetPath(scene) {
            if (scene.rendered_clip) return scene.rendered_clip;
            if (scene.generated_asset) return `assets/generated/${scene.generated_asset}`;
            if (scene.matched_asset) return scene.matched_asset;
            if (scene.infographic_asset) return `assets/${scene.infographic_asset}`;
            return null;
        }

        // Build a project-scoped file URL (handles nested project names + clip paths).
        // The nonce busts the browser cache so re-rendered clips (same path) reload.
        let assetNonce = Date.now();
        function fileUrl(relPath) {
            return `/scenes/file?project=${encodeURIComponent(currentProject)}&path=${encodeURIComponent(relPath)}&_=${assetNonce}`;
        }

        // The handful of fields worth editing inline, per pipeline.
        function inlineEditFields(scene) {
            const order = ['search_query', 'comfyui_prompt', 'visual_type',
                           'narration_excerpt', 'visual_description', 'duration'];
            return order.filter(f => editableFields.includes(f));
        }

        // Escape user-controlled text before inserting into HTML.
        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        // Render a single scene row
        function provChip(scene) {
            const src = scene.resolved_source || '';
            if (!src) return '';
            const head = src.split('(')[0].split(':')[0];
            return `<span class="chip prov-${esc(head)}" title="resolved_source: ${esc(src)}">${esc(head)}</span>`;
        }

        function renderScene(scene, index) {
            const pendingEdit = editedScenes.has(scene.id) && !scene.rendered_clip;
            const status = pendingEdit ? 'edited' : getAssetStatus(scene);
            const assetPath = getAssetPath(scene);
            const duration = (scene.end_seconds || 0) - (scene.start_seconds || 0);
            const isVideo = assetPath && (assetPath.endsWith('.mp4') || assetPath.endsWith('.webm'));

            let thumb = '<span>?</span>';
            if (assetPath) {
                const url = fileUrl(assetPath);
                thumb = isVideo ? `<video src="${url}" muted preload="metadata"></video>`
                                : `<img src="${url}" alt="" loading="lazy">`;
            } else if (pendingEdit) {
                thumb = '<span title="edited — re-render to see it">✎</span>';
            }
            const dot = status === 'missing' ? 'miss' : (status === 'edited' ? 'pend' : 'ok');

            return `
                <div class="srow ${scene.id === inspectorScene ? 'selected-row' : ''}"
                     data-section="${esc(scene._section)}" data-status="${status}"
                     data-start="${scene.start_seconds || 0}" data-end="${scene.end_seconds || 0}"
                     data-scene-id="${scene.id}" id="scene-${index}"
                     onclick="openInspector('${scene.id}')"
                     ondragover="sceneDragOver(event)" ondragleave="sceneDragLeave(event)"
                     ondrop="sceneFileDrop(event,'${scene.id}')">
                    <label class="scene-select" title="Queue for re-render" onclick="event.stopPropagation()">
                        <input type="checkbox" ${selectedScenes.has(scene.id) ? 'checked' : ''}
                               onchange="toggleSelect('${scene.id}', this.checked)">
                    </label>
                    <span class="sdot ${dot}" title="${status}"></span>
                    <div class="sthumb">${thumb}</div>
                    <div class="smain">
                        <div class="sline1">
                            <span class="sid">${scene.id}</span>
                            <span class="stime" onclick="event.stopPropagation(); seekTo(${scene.start_seconds || 0}, ${scene.end_seconds || 0}, '${scene.id}')"
                                  title="Play this scene's narration">${formatTime(scene.start_seconds)}–${formatTime(scene.end_seconds)} · ${duration.toFixed(1)}s</span>
                            <span class="chip">${esc(scene.visual_type || '?')}</span>
                            ${provChip(scene)}
                            ${scene.energy != null ? `<span class="chip" title="energy (tempo_enrich)">⚡ ${scene.energy.toFixed(2)}</span>` : ''}
                            ${scene.motion_speed ? `<span class="chip">▶ ${esc(scene.motion_speed)}</span>` : ''}
                        </div>
                        ${scene.narration_excerpt ? `<div class="snarr">“${esc(scene.narration_excerpt)}”</div>` : ''}
                    </div>
                </div>
            `;
        }

        // Toggle expand/collapse
        function toggleExpand(index) {
            const details = document.getElementById(`details-${index}`);
            const btn = details.previousElementSibling;
            if (details.classList.contains('expanded')) {
                details.classList.remove('expanded');
                btn.textContent = '+ Show more details';
            } else {
                details.classList.add('expanded');
                btn.textContent = '- Hide details';
            }
        }

        // Render all scenes
        function renderScenes() {
            const list = document.getElementById('sceneList');
            let html = '';
            let visibleCount = 0;
            let lastSection = null;

            allScenes.forEach((scene, index) => {
                // Filter by section
                if (currentSection !== 'all' && scene._section !== currentSection) return;

                // Filter by status
                const status = getAssetStatus(scene);
                if (currentStatus !== 'all' && status !== currentStatus) return;

                // Add section divider
                if (scene._section !== lastSection) {
                    html += `<div class="section-divider">${esc(scene._section)}</div>`;
                    lastSection = scene._section;
                }

                html += renderScene(scene, index);
                visibleCount++;
            });

            list.innerHTML = html || '<div class="loading">No scenes match the filter.</div>';

            // Update stats
            const matched = allScenes.filter(s => getAssetStatus(s) === 'matched').length;
            const generated = allScenes.filter(s => getAssetStatus(s) === 'generated').length;
            const infographic = allScenes.filter(s => getAssetStatus(s) === 'infographic').length;
            const missing = allScenes.filter(s => getAssetStatus(s) === 'missing').length;

            document.getElementById('stats').textContent =
                `${visibleCount}/${allScenes.length} scenes | ${matched} matched | ${generated} generated | ${infographic} infographic | ${missing} missing`;

            updateRerenderBar();
            refreshAgentSelect();   // populate per-scene agent dropdowns right away
        }

        // ---------- Scene Inspector (ONE editor, opened per scene) ----------
        // The drawer reuses the pre-existing per-scene element ids
        // (ss-*, note-*, field-*, tray-*, sceneAgent-*) so every existing
        // function — superSearch, attachAsset, applyNote, applyFields,
        // dispatchSceneToAgent, tray ops — works unchanged.
        function openInspector(id) {
            inspectorScene = id;
            renderInspector();
            document.getElementById('insp').classList.add('open');
            document.getElementById('inspBackdrop').classList.add('open');
            renderScenes();
        }
        function closeInspector() {
            inspectorScene = null;
            document.getElementById('insp').classList.remove('open');
            document.getElementById('inspBackdrop').classList.remove('open');
            renderScenes();
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInspector(); });

        const GROUP_FIELDS = {
            show: ['search_query', 'comfyui_prompt', 'visual_type'],
            move: ['duration'],
            say:  ['narration_excerpt', 'visual_description'],
        };

        function fieldInputs(scene, names) {
            const editable = inlineEditFields(scene);
            return names.filter(f => editable.includes(f)).map(f => `
                <label class="field-edit">
                    <span class="field-label">${f}</span>
                    <input id="field-${scene.id}-${f}" value="${(scene[f] ?? '').toString().replace(/"/g, '&quot;')}">
                </label>`).join('');
        }

        function renderInspector() {
            const scene = allScenes.find(s => s.id === inspectorScene);
            if (!scene) { closeInspector(); return; }
            const assetPath = getAssetPath(scene);
            const isVideo = assetPath && (assetPath.endsWith('.mp4') || assetPath.endsWith('.webm'));
            const dur = (scene.end_seconds || 0) - (scene.start_seconds || 0);

            document.getElementById('inspHd').innerHTML = `
                <span class="sid">${scene.id}</span>
                <span class="stime" onclick="seekTo(${scene.start_seconds || 0}, ${scene.end_seconds || 0}, '${scene.id}')"
                      title="Play this scene's narration">▶ ${formatTime(scene.start_seconds)}–${formatTime(scene.end_seconds)} · ${dur.toFixed(1)}s</span>
                <span class="chip">${esc(scene.visual_type || '?')}</span>
                ${provChip(scene)}
                <button class="insp-x" onclick="closeInspector()">✕ close</button>`;

            const preview = assetPath
                ? (isVideo ? `<video src="${fileUrl(assetPath)}" controls></video>`
                           : `<img src="${fileUrl(assetPath)}" onclick="openLightbox('${fileUrl(assetPath)}')">`)
                : '<div class="insp-note" style="padding:18px;text-align:center;">no asset yet</div>';

            document.getElementById('inspBody').innerHTML = `
                <div class="insp-prev">${preview}</div>
                <div class="intent-strip" id="intent-${scene.id}"></div>
                ${scene.resolved_source ? `<div class="insp-note" style="margin:-4px 0 10px;">provenance: <b>${esc(scene.resolved_source)}</b> — how the asset engine resolved this scene</div>` : ''}

                <div class="igrp">
                    <div class="ihd">What it shows <span class="fx">edits here → re-match + re-render this scene</span></div>
                    <div class="ibody">
                        ${fieldInputs(scene, GROUP_FIELDS.show)}
                        <div class="row" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                            <button class="apply-btn" onclick="applyFields('${scene.id}')">Apply edits</button>
                            <button class="edit-toggle" onclick="ssToggleInsp('${scene.id}')">🔎 Super search this beat</button>
                            <button class="apply-btn" onclick="openPicker('${scene.id}')">＋ Add from library</button>
                        </div>
                        <div class="super-search" id="ss-${scene.id}" style="display:none;">
                            <div class="ss-controls">
                                <select class="ss-op" id="ss-op-${scene.id}">
                                    <option value="auto">Auto (agent picks)</option>
                                    <option value="literal">Literal (keyword)</option>
                                    <option value="tonal">Evocative</option>
                                    <option value="knowledge">Knowledge (real)</option>
                                    <option value="conceptual">Conceptual</option>
                                    <option value="ironic">Ironic</option>
                                    <option value="trait">Trait</option>
                                    <option value="relational">Relational</option>
                                    <option value="scale">Scale</option>
                                </select>
                                <button onclick="superSearch('${scene.id}')">Search</button>
                                <span class="ss-status" id="ss-status-${scene.id}"></span>
                            </div>
                            <div class="ss-results" id="ss-results-${scene.id}"></div>
                        </div>
                        <div class="asset-tray" id="tray-${scene.id}">${assetTrayHtml(scene)}</div>
                        <div class="insp-note">The tray is this scene's curated asset set. <b>Grid dots now drive the premium render</b>:
                            one placed image → the camera pushes to that spot; two or more → a montage with the cards at their dots.
                            Unplaced cards stay comment references (e.g. "grid of these, zoom the Knight on 'crash'").</div>
                    </div>
                </div>

                <div class="igrp">
                    <div class="ihd">How it moves <span class="fx">edits here → re-render this scene</span></div>
                    <div class="ibody">
                        <div class="insp-note">energy <b>${scene.energy != null ? scene.energy.toFixed(2) : '—'}</b>
                            · motion <b>${esc(scene.motion_speed || '—')}</b>
                            ${scene.layout_spec ? ` · layout: <b>${esc((scene.layout_spec.template) || '?')}</b>` : ''}</div>
                        <label class="field-edit" title="Camera treatment for a STILL asset. Auto = the render pre-pass picks per tempo/cues; choosing one LOCKS it (authored still_treatment — solid badge on the timeline).">
                            <span class="field-label">camera (stills)</span>
                            <select id="camera-${scene.id}" onchange="setCameraLock('${scene.id}', this.value)">
                                <option value="">auto (derived per render)</option>
                                ${TL_TREATMENTS.map(t =>
                                    `<option value="${t}" ${scene.still_treatment === t ? 'selected' : ''}>🔒 ${t}</option>`).join('')}
                            </select>
                        </label>
                        ${fieldInputs(scene, GROUP_FIELDS.move)}
                        <label class="field-edit">
                            <span class="field-label">transition</span>
                            <select id="field-${scene.id}-transition">
                                ${['cut', 'dissolve', 'fade'].map(t =>
                                    `<option value="${t}" ${scene.transition === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </label>
                        <label class="field-edit" title='Shot list: [{"src": "path", "place": [x,y], "weight": 1.5}] — cuts this scene into shots (premium)'>
                            <span class="field-label">shots</span>
                            <input id="field-${scene.id}-shots"
                                   value="${scene.shots ? esc(JSON.stringify(scene.shots)) : ''}"
                                   placeholder='[{"src": "assets/broll/a.jpg", "weight": 1.5}, …] — empty = one shot'>
                        </label>
                        <details class="mo-fold" id="mofold-${scene.id}" ${scene.motion_spec ? 'open' : ''}>
                            <summary>Motion effect ${scene.motion_spec ? `— <b>${esc(scene.motion_spec.effect || '?')}</b>` : '<span style="opacity:.6">(none — unfold to add one)</span>'}</summary>
                            <div id="mobody-${scene.id}" class="mo-body"><div class="insp-note">loading registry…</div></div>
                        </details>
                        <div class="insp-note">camera = still-image movement (locks still_treatment); transition = how this
                            scene ENTERS; shots = cut the window into a still sequence; motion effect = the full
                            registry spec — every parameter the effect exposes, validated on Apply.
                            Deeper layout changes: use a Comment (the agent rewrites the spec).</div>
                    </div>
                </div>

                <div class="igrp">
                    <div class="ihd">What it says <span class="fx">narration is locked to the voiceover</span></div>
                    <div class="ibody">
                        <div class="insp-narr">“${esc(scene.narration_excerpt || '')}”</div>
                        <div class="insp-note">Changing narration needs re-voiceover + re-align — edit script.md and re-run those steps from the Dashboard; editing the excerpt here would silently desync.</div>
                    </div>
                </div>

                <div class="igrp">
                    <div class="ihd">Tell the agent <span class="fx">comment → revise → re-render</span></div>
                    <div class="ibody">
                        <textarea id="note-${scene.id}" class="edit-note" rows="2"
                            placeholder="e.g. make it grimmer · type @ to reference pictures/clips/motions (@[pic] @[vid] @[motion] @[pool] @[asset])"></textarea>
                        <div class="note-actions">
                            <button class="apply-btn" onclick="applyNote('${scene.id}')" title="Fast LLM — instant text/prompt tweaks">⚡ Quick edit</button>
                            <span class="note-or">or</span>
                            <select class="js-agent-select scene-agent" id="sceneAgent-${scene.id}"></select>
                            <button class="agent-btn" onclick="dispatchSceneToAgent('${scene.id}')" title="Claude agent — hard edits (Remotion, recreate effect)">Send to agent →</button>
                        </div>
                        <div class="insp-note">Quick edit = one LLM pass over this scene's fields. Agent = a Claude session for structural work.</div>
                    </div>
                </div>

                <div class="igrp">
                    <div class="ihd">Details</div>
                    <div class="ibody">
                        ${scene.visual_description ? `<div class="insp-note"><b>visual description:</b> ${esc(scene.visual_description)}</div>` : ''}
                        <div class="insp-note"><b>section:</b> ${esc(scene._section)}</div>
                        ${assetPath ? `<div class="insp-note"><b>asset:</b> ${esc(assetPath)}</div>` : ''}
                        ${scene.rendered_clip ? `<div class="insp-note"><b>rendered:</b> ${esc(scene.rendered_clip)}</div>` : ''}
                    </div>
                </div>
                <div class="edit-status" id="editstatus-${scene.id}"></div>`;

            document.getElementById('inspFoot').innerHTML = `
                <button class="apply-btn" onclick="queueSceneChecked('${scene.id}')">↻ Queue re-render</button>
                <span class="insp-note" style="margin:0;">${selectedScenes.has(scene.id)
                    ? 'queued ✓ — the bar at the bottom runs it: inline (gen model) or send to a Claude agent'
                    : 'edits invalidate the old clip; queue, then run from the bottom bar (inline or agent)'}</span>`;

            refreshAgentSelect();
            renderMotionFold(scene.id);   // async — fills the motion-effect fold from the registry
            renderIntent(scene.id);       // async — the render ladder's dry-run + collision flags
        }

        // "What will render": the ladder's dry-run for this scene — which rung
        // wins, which authored edits lose, every collision (server: one
        // function shared with the timeline markers and the pre-render plan).
        async function renderIntent(id) {
            const el = document.getElementById(`intent-${id}`);
            if (!el) return;
            try {
                const it = await (await fetch(`/api/scenes/intent?project=${encodeURIComponent(currentProject)}&scene_id=${encodeURIComponent(id)}`)).json();
                const w = it.winner || {};
                const over = (it.overridden || []).map(o => o.detail || o.rung).filter(Boolean).join(', ');
                const confl = (it.conflicts || []).map(c =>
                    `<div class="intent-c ${c.severity}">${c.severity === 'error' ? '⛔' : c.severity === 'warn' ? '⚠' : 'ℹ'} ${esc(c.message)}</div>`).join('');
                el.innerHTML = `<div class="intent-line">renders via <b>${esc(w.rung || '?')}</b>${w.media ? ` — ${esc(w.media)}` : ''}
                        <span class="intent-detail">${esc(w.detail || '')}</span>
                        ${over ? `<span class="intent-over">· loses: ${esc(over)}</span>` : ''}</div>${confl}`;
            } catch (e) { el.innerHTML = ''; }
        }

        function ssToggleInsp(id) {
            const el = document.getElementById('ss-' + id);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // ---------- How it moves: camera lock + full motion-spec param editor ----------
        // The camera select writes the SAME authored still_treatment the timeline
        // badge locks; the motion fold renders whatever params the registry
        // declares for the chosen effect (single source of truth: /api/motion/registry).
        async function setCameraLock(id, treatment) {
            try {
                await tlPost('/api/timeline/treatment', { scene_id: id, treatment: treatment || null });
                const st = document.getElementById(`editstatus-${id}`);
                if (st) st.textContent = treatment ? `camera locked: ${treatment}` : 'camera back to auto';
                await refreshScenes();
                if (tlOn) await loadTimeline();
            } catch (e) { alert('camera: ' + e.message); }
        }

        let _moReg = null, _moEffSel = {};
        async function getMotionRegistry() {
            if (!_moReg) _moReg = await (await fetch('/api/motion/registry')).json();
            return _moReg;
        }
        function moParamInput(sceneId, group, p, cur) {
            const idp = `mo-${sceneId}-${group}-${p.name}`;
            const val = (cur !== undefined && cur !== null) ? cur : (p.default ?? '');
            const title = esc(p.doc || '');
            const label = `<span class="field-label">${esc(p.name)}${p.required ? ' *' : ''}</span>`;
            if (p.values && p.values.length) {
                const opts = (p.required ? [] : ['']).concat(p.values);
                return `<label class="field-edit" title="${title}">${label}
                    <select id="${idp}">${opts.map(v =>
                        `<option value="${esc(v)}" ${String(v) === String(val) ? 'selected' : ''}>${v === '' ? '— default —' : esc(v)}</option>`).join('')}</select></label>`;
            }
            if (p.type === 'int' || p.type === 'number')
                return `<label class="field-edit" title="${title}">${label}
                    <input id="${idp}" type="number" step="${p.type === 'int' ? '1' : '0.1'}" value="${esc(val)}"></label>`;
            const isJson = /\[\]|array|object/.test(p.type || '');
            const shown = (isJson && typeof val === 'object') ? JSON.stringify(val) : val;
            return `<label class="field-edit" title="${title}">${label}
                <input id="${idp}" value="${esc(shown)}" placeholder="${esc(p.type || 'string')}${p.required ? ' — required' : ''}"></label>`;
        }
        function moReadVal(id, group, p) {
            const el = document.getElementById(`mo-${id}-${group}-${p.name}`);
            if (!el) return undefined;
            const raw = (el.value || '').trim();
            if (raw === '') return undefined;
            if (p.type === 'int') return parseInt(raw, 10);
            if (p.type === 'number') return parseFloat(raw);
            if (/\[\]|array|object/.test(p.type || '')) {
                try { return JSON.parse(raw); }
                catch (e) {
                    if (p.type === 'string[]') return raw.split(',').map(s => s.trim()).filter(Boolean);
                    throw new Error(`${p.name}: not valid JSON`);
                }
            }
            return raw;
        }
        async function renderMotionFold(id) {
            const body = document.getElementById(`mobody-${id}`);
            const scene = allScenes.find(s => s.id === id);
            if (!body || !scene) return;
            let reg;
            try { reg = await getMotionRegistry(); }
            catch (e) { body.innerHTML = `<div class="insp-note">registry unavailable: ${esc(e.message)}</div>`; return; }
            const spec = scene.motion_spec || {};
            const effId = (_moEffSel[id] !== undefined) ? _moEffSel[id] : (spec.effect || '');
            const eff = (reg.effects || []).find(e => e.id === effId);
            let html = `<label class="field-edit"><span class="field-label">effect</span>
                <select id="mo-${id}-effect" onchange="moEffectChange('${id}', this.value)">
                    <option value="">(none — remove the motion spec)</option>
                    ${(reg.effects || []).map(e =>
                        `<option value="${esc(e.id)}" ${e.id === effId ? 'selected' : ''}>${esc(e.id)} · ${esc(e.category)}</option>`).join('')}
                </select></label>`;
            if (eff) {
                html += `<div class="insp-note"><b>${esc(eff.purpose)}</b> ${esc(eff.when_to_use || '')} · backend: ${esc(eff.backend)}</div>`;
                const same = spec.effect === eff.id;   // switching effects starts from registry defaults
                html += (eff.content || []).map(p => moParamInput(id, 'content', p, same ? (spec.content || {})[p.name] : undefined)).join('');
                html += (eff.style || []).map(p => moParamInput(id, 'style', p, same ? (spec.style || {})[p.name] : undefined)).join('');
                (eff.shared || []).forEach(n => {
                    const p = (reg.shared || {})[n];
                    if (p) html += moParamInput(id, 'shared', p, same ? spec[n] : undefined);
                });
                html += moParamInput(id, 'shared',
                    { name: 'duration', type: 'number', doc: 'effect duration in seconds', default: eff.duration_default },
                    same ? spec.duration : undefined);
                html += `<div style="display:flex;gap:8px;margin-top:8px">
                    <button class="apply-btn" onclick="moApply('${id}')">Apply motion spec</button></div>`;
            } else if (spec.effect) {
                html += `<div style="display:flex;gap:8px;margin-top:8px">
                    <button class="apply-btn" onclick="moApply('${id}')">Remove motion spec</button></div>`;
            } else {
                html += `<div class="insp-note">Pick an effect to see and set every parameter it exposes.</div>`;
            }
            body.innerHTML = html;
            delete _moDirty[id];   // redraw = inputs back to saved/registry values
        }
        function moEffectChange(id, v) { _moEffSel[id] = v; renderMotionFold(id); }
        async function moApply(id) {
            const st = document.getElementById(`editstatus-${id}`);
            const effId = (document.getElementById(`mo-${id}-effect`) || {}).value || '';
            let patch;
            try {
                if (!effId) { patch = { motion_spec: null }; }
                else {
                    const reg = await getMotionRegistry();
                    const eff = reg.effects.find(e => e.id === effId);
                    const spec = { effect: effId, content: {}, style: {} };
                    for (const p of eff.content || []) { const v = moReadVal(id, 'content', p); if (v !== undefined) spec.content[p.name] = v; }
                    for (const p of eff.style || []) { const v = moReadVal(id, 'style', p); if (v !== undefined) spec.style[p.name] = v; }
                    for (const n of eff.shared || []) {
                        const p = (reg.shared || {})[n];
                        if (!p) continue;
                        const v = moReadVal(id, 'shared', p);
                        if (v !== undefined) spec[n] = v;
                    }
                    const dur = moReadVal(id, 'shared', { name: 'duration', type: 'number' });
                    if (dur !== undefined && !isNaN(dur)) spec.duration = dur;
                    patch = { motion_spec: spec };
                }
                st.textContent = 'Saving motion spec…';
                const r = await postRevise({ project: currentProject, scene_id: id, patch });
                const warn = (r.motion_warnings || []).length ? ' ⚠ ' + r.motion_warnings.join('; ') : '';
                selectedScenes.add(id); editedScenes.add(id);
                delete _moEffSel[id]; delete _moDirty[id];
                await refreshScenes();
                // refreshScenes re-renders the Inspector — set the message on the FRESH element
                const st2 = document.getElementById(`editstatus-${id}`);
                if (st2) st2.textContent = (patch.motion_spec ? 'Motion spec saved' : 'Motion spec removed') + ' — Re-render to see it' + warn;
            } catch (e) { if (st) st.textContent = 'Error: ' + e.message; }
        }

        // ---------- unapplied-edit detection (typing ≠ saving) ----------
        // Field inputs only exist in the OPEN Inspector, so this covers exactly
        // the scene the user is looking at. Queue/run warn instead of silently
        // rendering stale values.
        let _moDirty = {};   // motion-fold param inputs touched since last apply/redraw
        document.addEventListener('input', e => {
            const mo = e.target.closest && e.target.closest('.mo-body');
            if (mo) { const m = mo.id.match(/^mobody-(.+)$/); if (m) _moDirty[m[1]] = true; }
        });
        function pendingEdits(id) {
            const scene = allScenes.find(s => s.id === id);
            if (!scene) return [];
            const out = [];
            inlineEditFields(scene).forEach(f => {
                const el = document.getElementById(`field-${id}-${f}`);
                if (el && el.value !== (scene[f] ?? '').toString()) out.push(f);
            });
