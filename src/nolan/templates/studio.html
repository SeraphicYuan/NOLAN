<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Dashboard · NOLAN</title>
  <link rel="stylesheet" href="/static/nolan.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .wrap { max-width: 940px; margin: 28px auto; padding: 0 20px; }
    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .sub { color: var(--text-secondary); margin-bottom: 24px; font-size: 14px; line-height: 1.5; }
    .picker { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .picker select { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border);
                     border-radius: 8px; padding: 10px 12px; font-size: 14px; min-width: 240px; }
    .panel { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px;
             padding: 18px 20px; margin-bottom: 16px; }
    .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .empty { color: var(--text-secondary); font-size: 14px; padding: 40px; text-align: center; }
    .pipeline-strip { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .pstep { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; cursor: pointer;
             background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary);
             transition: border-color .12s; }
    .pstep:hover { border-color: var(--text-secondary); }
    .pstep.done { color: var(--success); border-color: var(--success); }
    .pstep.error { color: var(--danger); border-color: var(--danger); }
    .pstep.next { color: var(--accent); border-color: var(--accent); }
    .pstep.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
    .pstep-arrow { color: var(--text-secondary); font-size: 11px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    .stat-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; min-width: 92px; }
    .stat .v { font-size: 18px; font-weight: 700; }
    .stat .k { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .05em; }
    .stat.ok .v { color: var(--success); }
    .stat.warn .v { color: var(--text-secondary); }
    video.final { width: 100%; max-height: 420px; border-radius: 10px; background: #000; margin-top: 12px; }
    .note { font-size: 12px; color: var(--text-secondary); margin-top: 8px; line-height: 1.5; }
    input.inline, select.inline { background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
    .pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border);
            color: var(--text-secondary); }
    .pill.premium { color: #e8b45a; border-color: #e8b45a; }
    /* ---- step inspector ---- */
    .inspector { border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; display: none; }
    .inspector.open { display: block; }
    .insp-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .insp-head .name { font-size: 15px; font-weight: 700; }
    .insp-purpose { font-size: 13px; color: var(--text-secondary); margin: 6px 0 4px; line-height: 1.5; }
    .insp-last { font-size: 12px; color: var(--text-secondary); background: var(--bg-primary);
                 border-radius: 8px; padding: 8px 10px; margin-top: 8px; }
    .artifact-box { margin-top: 10px; }
    .artifact-box textarea { width: 100%; min-height: 220px; background: var(--bg-primary);
      color: var(--text-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px;
      font-family: ui-monospace, monospace; font-size: 12px; line-height: 1.5; }
    .artifact-box pre { max-height: 260px; overflow: auto; background: var(--bg-primary);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 12px;
      white-space: pre-wrap; }
    .job-widget { margin-top: 8px; }
  </style>
</head>
<body>
  <script src="/static/nav.js" data-active="studio"></script>
  <div class="wrap">
    <h1>Project Dashboard</h1>
    <div class="sub">One project, one view. Click a pipeline step to inspect it: what it does, its artifact, its last run, and its actions — including that step's manual overrides.</div>

    <div class="picker">
      <select id="project" onchange="onSelect()"><option value="">— select a project —</option></select>
      <a class="btn secondary" href="/process">+ New from essay</a>
      <a class="btn ghost" href="/library/add">+ Add to library</a>
    </div>

    <div id="content" style="display:none;">
      <div class="panel">
        <h2>Pipeline <span class="pill" id="modePill"></span></h2>
        <div class="pipeline-strip" id="pipeline"></div>
        <div class="note" id="pipeNote"></div>
        <div class="row">
          <button class="btn" onclick="runStep(false)">▶ Run next step</button>
          <button class="btn secondary" onclick="runStep(true)">⏩ Run all (auto)</button>
          <a class="btn ghost" id="agentsLink" href="/agents">Open in Agents</a>
          <span class="note" id="runStatus"></span>
        </div>

        <div class="inspector" id="inspector">
          <div class="insp-head">
            <span class="name" id="inspName"></span>
            <span id="inspState"></span>
          </div>
          <div class="insp-purpose" id="inspPurpose"></div>
          <div class="insp-last" id="inspLast" style="display:none;"></div>
          <div class="artifact-box" id="inspArtifact"></div>
          <div class="row" id="inspActions"></div>
          <div class="job-widget" id="inspJob" style="display:none;"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Artifacts</h2>
        <div class="stat-badges" id="stats"></div>
        <div id="finalBox"></div>
      </div>
    </div>
    <div id="empty" class="empty">Select a project above, or create one.</div>
  </div>

  <script src="/static/jobs.js"></script>
  <script>
    var current = null, mapSpine = {}, lastState = null, selectedStep = null;

    var STEP_LABELS = {
      match_and_adapt_style: 'style', script_to_scenes: 'scenes', tempo_enrich: 'tempo',
      select_clips: 'clips', slide_designer: 'slides', generate_assets: 'comfyui',
      voiceover: 'voice', align_narration: 'align', soundtrack: 'music', render: 'render'
    };

    // Per-step inspector config: artifact viewer + the step's manual overrides.
    // Every override states what it writes — no mystery buttons.
    var STEP_META = {
      match_and_adapt_style: {
        artifact: { kind: 'text', name: 'style_guide', label: 'style_guide.md' } },
      script_to_scenes: {
        artifact: { kind: 'link', href: function (p) { return '/scenes?project=' + enc(p); },
                    label: 'Open scene_plan.json in the Scenes editor' } },
      tempo_enrich: {
        artifact: { kind: 'link', href: function (p) { return '/scenes?project=' + enc(p); },
                    label: 'Energy/pacing lives on each scene — view in Scenes' } },
      select_clips: {
        artifact: { kind: 'link', href: function (p) { return '/scenes?project=' + enc(p); },
                    label: 'Matches (matched_clip / matched_asset + resolved_source) — view in Scenes' },
        overrides: [
          { label: 'Match b-roll (video + archival)', writes: 'matched_clip / matched_asset',
            run: function () { job('/api/match', { project: current, kind: 'broll-video' }); } },
          { label: 'Match library clips', writes: 'matched_clip',
            run: function () { job('/api/match', { project: current, kind: 'clips' }); } },
          { label: 'Stock images only', writes: 'matched_asset',
            run: function () { job('/api/match', { project: current, kind: 'broll' }); } },
        ] },
      slide_designer: {
        artifact: { kind: 'link', href: function (p) { return '/scenes?project=' + enc(p); },
                    label: 'layout_specs live on each info scene — view in Scenes' } },
      generate_assets: {
        overrides: [
          { label: 'Generate (ComfyUI)', writes: 'assets/generated/*.png + generated_asset',
            run: function () { job('/api/generate', { project: current }); } },
        ] },
      voiceover: {
        artifact: { kind: 'link', href: function () { return '/voices'; },
                    label: 'Voice library + project voiceover — Voices page' } },
      align_narration: {},
      soundtrack: {
        artifact: { kind: 'json-edit', name: 'soundtrack', label: 'soundtrack.json' } },
      render: {
        overrides: [
          { label: 'Fetch & trim matched clips', writes: 'rendered_clip (from matched_clip)',
            run: function () { job('/api/materialize-clips', { project: current }); } },
          { label: 'Render clips', writes: 'assets/rendered/*.mp4',
            run: function () { job('/api/render-clips', { project: current }); } },
          { label: 'Assemble final', writes: 'output/final.mp4',
            run: function () { job('/api/assemble', { project: current }); } },
        ] },
    };

    function enc(s) { return encodeURIComponent(s); }
    function esc(t) { var d = document.createElement('div'); d.textContent = t == null ? '' : t; return d.innerHTML; }
    function qs(name) { return new URLSearchParams(location.search).get(name); }

    fetch('/api/map?ping=false').then(function (r) { return r.json(); }).then(function (m) {
      (m.spine || []).forEach(function (s) { mapSpine[s.name] = s.purpose; });
      if (selectedStep) renderInspector(selectedStep);
    });

    function loadProjects() {
      fetch('/api/status').then(function (r) { return r.json(); }).then(function (s) {
        var sel = document.getElementById('project');
        (s.projects || []).forEach(function (p) {
          var name = p.slug || p.name || p;
          var o = document.createElement('option'); o.value = name; o.textContent = name; sel.appendChild(o);
        });
        var pre = qs('project');
        if (pre) { sel.value = pre; onSelect(); }
      });
    }

    function onSelect() {
      current = document.getElementById('project').value;
      var has = !!current;
      document.getElementById('content').style.display = has ? 'block' : 'none';
      document.getElementById('empty').style.display = has ? 'none' : 'block';
      selectedStep = null;
      document.getElementById('inspector').classList.remove('open');
      if (has) refresh();
    }

    function refresh() {
      fetch('/api/project/' + enc(current) + '/status')
        .then(function (r) { return r.json(); }).then(renderStats);
      fetch('/api/agents/' + enc(current) + '/state')
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (st) { lastState = st; renderPipeline(st); if (selectedStep) renderInspector(selectedStep); })
        .catch(function () { lastState = null; renderPipeline(null); });
      document.getElementById('agentsLink').href = '/agents?project=' + enc(current);
    }

    function renderPipeline(st) {
      var strip = document.getElementById('pipeline');
      var note = document.getElementById('pipeNote');
      var steps = (st && st.pipeline && st.pipeline.length)
        ? st.pipeline
        : Object.keys(STEP_LABELS).map(function (n) { return { step: n, status: 'pending' }; });
      strip.innerHTML = steps.map(function (s, i) {
        var mark = s.status === 'done' ? '✓ ' : s.status === 'error' ? '✕ ' : s.status === 'next' ? '▶ ' : '';
        var sel = s.step === selectedStep ? ' selected' : '';
        return (i ? '<span class="pstep-arrow">→</span>' : '') +
          '<span class="pstep ' + s.status + sel + '" onclick="selectStep(\'' + s.step + '\')" ' +
          'title="' + esc(s.step) + ' — click to inspect">' + mark + esc(STEP_LABELS[s.step] || s.step) + '</span>';
      }).join('');
      if (!st || !st.pipeline || !st.pipeline.length) {
        note.textContent = 'Pipeline not started — "Run next step" begins with the style guide. Click any step to see what it will do.';
      } else {
        var last = (st.step_history || []).slice(-1)[0];
        note.textContent = 'status: ' + (st.status || '?') +
          (last ? (' · last: ' + last.name + ' (' + last.status + ')') : '');
      }
    }

    function selectStep(name) {
      selectedStep = (selectedStep === name) ? null : name;
      renderPipeline(lastState);
      var box = document.getElementById('inspector');
      if (!selectedStep) { box.classList.remove('open'); return; }
      box.classList.add('open');
      renderInspector(selectedStep);
    }

    function renderInspector(name) {
      var meta = STEP_META[name] || {};
      document.getElementById('inspName').textContent = name;
      document.getElementById('inspPurpose').textContent = mapSpine[name] || '';

      var lastBox = document.getElementById('inspLast');
      var runs = ((lastState || {}).step_history || []).filter(function (h) { return h.name === name; });
      if (runs.length) {
        var h = runs[runs.length - 1];
        lastBox.style.display = 'block';
        lastBox.innerHTML = '<b>last run:</b> ' + esc(h.status) +
          (h.finished_at ? ' · ' + esc(h.finished_at) : '') +
          (h.notes ? '<br>' + esc(String(h.notes).slice(0, 400)) : '');
        document.getElementById('inspState').innerHTML =
          '<span class="pill">' + esc(h.status) + '</span>';
      } else {
        lastBox.style.display = 'none';
        document.getElementById('inspState').innerHTML = '<span class="pill">not run yet</span>';
      }

      renderArtifact(meta.artifact);
      renderActions(meta);
    }

    function renderArtifact(a) {
      var box = document.getElementById('inspArtifact');
      box.innerHTML = '';
      if (!a) return;
      if (a.kind === 'link') {
        box.innerHTML = '<a class="btn ghost" href="' + a.href(current) + '">' + esc(a.label) + '</a>';
        return;
      }
      fetch('/api/project/' + enc(current) + '/artifact/' + a.name)
        .then(function (r) { return r.json(); }).then(function (d) {
          if (!d.exists) {
            box.innerHTML = '<div class="note">' + esc(a.label) + ' — not created yet (run the step).</div>';
            return;
          }
          if (a.kind === 'json-edit') {
            box.innerHTML =
              '<div class="note"><b>' + esc(a.label) + '</b> — edit and save; the render step executes it as written.</div>' +
              '<textarea id="artText">' + esc(d.content) + '</textarea>' +
              '<div class="row"><button class="btn" onclick="saveArtifact(\'' + a.name + '\')">Save</button>' +
              '<span class="note" id="artStatus"></span></div>';
          } else {
            box.innerHTML = '<div class="note"><b>' + esc(a.label) + '</b></div><pre>' + esc(d.content) + '</pre>';
          }
        });
    }

    function saveArtifact(name) {
      var st = document.getElementById('artStatus');
      st.textContent = 'Saving…';
      fetch('/api/project/' + enc(current) + '/artifact/' + name, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: document.getElementById('artText').value }),
      }).then(async function (r) {
        if (!r.ok) { var e = await r.json().catch(function () { return {}; }); throw new Error(e.detail || r.statusText); }
        st.textContent = '✓ saved';
      }).catch(function (e) { st.textContent = '✗ ' + e.message; });
    }

    function renderActions(meta) {
      var box = document.getElementById('inspActions');
      var html = '';
      (meta.overrides || []).forEach(function (o, i) {
        html += '<button class="btn secondary" onclick="STEP_META[selectedStep].overrides[' + i + '].run()" ' +
                'title="writes: ' + esc(o.writes) + '">' + esc(o.label) + '</button>';
      });
      if (meta.overrides && meta.overrides.length) {
        html += '<span class="note">manual overrides — hover to see what each writes</span>';
      }
      box.innerHTML = html;
    }

    function job(url, body) {
      var w = document.getElementById('inspJob');
      w.style.display = 'block';
      NolanJobs.start(url, body, { into: w, onDone: function () { refresh(); } })
        .catch(function (e) { alert('Failed: ' + e.message); });
    }

    function renderStats(st) {
      var pill = document.getElementById('modePill');
      pill.textContent = st.render_mode === 'premium' ? '✦ premium render' : '';
      pill.className = 'pill' + (st.render_mode === 'premium' ? ' premium' : '');
      function stat(v, k, ok) {
        return '<div class="stat ' + (ok ? 'ok' : 'warn') + '"><div class="v">' + v + '</div><div class="k">' + k + '</div></div>';
      }
      document.getElementById('stats').innerHTML =
        stat(st.has_script ? '✓' : '—', 'script', st.has_script) +
        stat(st.scenes || 0, 'scenes', st.has_scene_plan) +
        stat((st.matched || 0) + '/' + (st.scenes || 0), 'matched', st.scenes > 0 && st.matched >= st.scenes) +
        stat(st.rendered || 0, 'rendered', st.rendered > 0) +
        stat(st.has_voiceover ? '✓' : '—', 'voiceover', st.has_voiceover) +
        stat(st.has_final ? '✓' : '—', 'final', st.has_final) +
        (st.voice_id ? stat(esc(st.voice_id), 'voice', true) : '');
      document.getElementById('finalBox').innerHTML = st.has_final
        ? '<video class="final" controls preload="metadata" src="/api/project/' + enc(current) + '/final"></video>'
        : '<div class="note">No final video yet — run the pipeline above.</div>';
    }

    function runStep(auto) {
      var st = document.getElementById('runStatus');
      st.textContent = auto ? 'Starting full run…' : 'Starting next step…';
      fetch('/api/agents/' + enc(current) + '/run', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ auto: !!auto }),
      }).then(function (r) {
        if (!r.ok) return r.text().then(function (t) { throw new Error(t || r.statusText); });
        return r.json();
      }).then(function (d) {
        st.textContent = '✓ started (pid ' + (d.pid || '?') + ')';
        setTimeout(refresh, 4000);
        setTimeout(refresh, 15000);
      }).catch(function (e) { st.textContent = 'failed: ' + e.message; });
    }

    loadProjects();
  </script>
</body>
</html>
