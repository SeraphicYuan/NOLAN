<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Library · NOLAN</title>
  <link rel="stylesheet" href="/static/nolan.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg-primary); color: var(--text-primary); min-height: 100vh;
           font-size: 14px; line-height: 1.5; }
    .wrap { max-width: 1200px; margin: 28px auto; padding: 0 20px; }
    h1 { font-size: 25px; font-weight: 680; letter-spacing: -0.02em; margin-bottom: 4px; color: var(--text-primary); }
    .sub { color: var(--text-secondary); margin-bottom: 20px; font-size: 13px; line-height: 1.5; }
    .bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
           background: var(--bg-secondary); border: 1px solid var(--border);
           border-radius: 12px; padding: 16px; }
    label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    input[type=text], select {
      background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
      border-radius: 8px; padding: 9px 11px; font-size: 14px; }
    input#q { min-width: 280px; flex: 1; }
    button { background: var(--accent); color: #fff; border: none; border-radius: 8px;
             padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: var(--accent-hover); }
    .meta { margin: 16px 2px 12px; font-size: 12px; color: var(--text-secondary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
    .tile { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px;
            overflow: hidden; display: flex; flex-direction: column;
            transition: border-color .12s ease, transform .12s ease; }
    .tile:hover { border-color: var(--bg-tertiary); transform: translateY(-1px); }
    .tile.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
    .tile .imgwrap { position: relative; background: var(--bg-primary); aspect-ratio: 4/3; }
    .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tile .score { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,.65);
                   color: #fff; font-size: 11px; padding: 2px 6px; border-radius: 6px; }
    .tile .body { padding: 10px; font-size: 12px; color: var(--text-secondary); }
    .tile .ttl { color: var(--text-primary); font-size: 13px; line-height: 1.4; margin-bottom: 4px;
                 display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tile .lic { color: var(--success); }
    .tile .actions { display: flex; justify-content: space-between; margin-top: 8px; }
    .tile a { color: var(--accent); text-decoration: none; }
    .reject { background: transparent; color: var(--danger); border: 1px solid var(--border);
              border-radius: 6px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
    .reject:hover { border-color: var(--danger); }
    .empty { color: var(--text-secondary); padding: 30px; text-align: center; }
    @media (max-width: 768px) {
      .wrap { padding: 0 14px; margin: 16px auto; }
      .bar { flex-direction: column; align-items: stretch; }
      .bar > div { width: 100%; }
      input[type=text], select, input#q,
      input#project, input#license, input#addlic { width: 100% !important; min-width: 0; font-size: 16px; }
      button { width: 100%; }
      .tile .ttl, .tile a { overflow-wrap: anywhere; }
    }
  </style>
</head>
<body>
  <script src="/static/nav.js" data-active="images"></script>
  <div class="wrap">
    <h1>Picture Library</h1>
    <p class="sub">Persistent, license-aware image store with CLIP semantic search.
       Leave the box empty to browse newest; type to search by meaning.</p>

    <div class="bar">
      <div style="flex:1;">
        <label for="q">Search (semantic)</label>
        <input type="text" id="q" placeholder="e.g. soldiers in a trench">
      </div>
      <div>
        <label for="scope">Scope</label>
        <select id="scope">
          <option value="global">Global</option>
          <option value="project">Project</option>
          <option value="both">Both</option>
        </select>
      </div>
      <div>
        <label for="project">Project</label>
        <input type="text" id="project" placeholder="(name)" style="width:130px;">
      </div>
      <div>
        <label for="license">License contains</label>
        <input type="text" id="license" placeholder="e.g. CC0" style="width:120px;">
      </div>
      <div>
        <label for="cutmodel">Cutout model</label>
        <select id="cutmodel">
          <option value="isnet">isnet (fast)</option>
          <option value="birefnet">birefnet (best)</option>
          <option value="u2net">u2net</option>
        </select>
      </div>
      <button id="go">Search</button>
    </div>

    <div class="bar" style="margin-top:10px;">
      <div style="flex:1;">
        <label for="addurl">Add image by URL (into the selected scope)</label>
        <input type="text" id="addurl" placeholder="https://… .jpg">
      </div>
      <div>
        <label for="addlic">License</label>
        <input type="text" id="addlic" placeholder="(optional)" style="width:130px;">
      </div>
      <button id="addbtn">Add</button>
    </div>

    <div id="meta" class="meta"></div>
    <div id="grid" class="grid"></div>
  </div>

  <script>
    var qEl = document.getElementById("q");
    var scopeEl = document.getElementById("scope");
    var projEl = document.getElementById("project");
    var licEl = document.getElementById("license");
    var grid = document.getElementById("grid");
    var meta = document.getElementById("meta");

    function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

    function params(){
      var p = new URLSearchParams();
      p.set("scope", scopeEl.value);
      if (projEl.value.trim()) p.set("project", projEl.value.trim());
      if (licEl.value.trim()) p.set("license", licEl.value.trim());
      return p;
    }

    function tile(r){
      var sc = (r.score != null) ? '<span class="score">'+r.score.toFixed(3)+'</span>' : '';
      var dims = (r.width && r.height) ? r.width+"x"+r.height : "";
      var src = r.source_url ? '<a href="'+esc(r.source_url)+'" target="_blank" rel="noopener">source</a>' : '';
      var promote = projEl.value.trim()
        ? '<button class="reject" style="color:#818cf8;" onclick="promote('+r.id+',this)">Promote</button>' : '';
      return '<div class="tile" data-id="'+r.id+'">'+
        '<div class="imgwrap">'+sc+'<a href="'+esc(r.raw)+'" target="_blank" rel="noopener">'+
          '<img loading="lazy" src="'+esc(r.raw)+'" alt=""></a></div>'+
        '<div class="body"><div class="ttl">'+esc(r.title||"(untitled)")+'</div>'+
          '<div class="lic">'+esc(r.license||"?")+'</div>'+
          '<div>'+esc(r.source||"")+' '+dims+'</div>'+
          '<div class="actions">'+src+promote+
            '<button class="reject" style="color:var(--accent);border-color:var(--accent);" onclick="openCutout('+r.id+')">Cut out</button>'+
            '<button class="reject" onclick="reject('+r.id+',this)">Reject</button></div>'+
        '</div></div>';
    }

    function render(results, label){
      meta.textContent = results.length + " " + label;
      grid.innerHTML = results.length
        ? results.map(tile).join("")
        : '<div class="empty">Nothing here yet. Save assets via the Extract page or '+
          '<code>nolan image-search --save</code>.</div>';
    }

    function run(){
      var q = qEl.value.trim();
      var url = q ? "/api/images/search?q="+encodeURIComponent(q)+"&"+params().toString()
                  : "/api/images/list?"+params().toString();
      meta.textContent = "Loading...";
      fetch(url).then(function(r){return r.json();}).then(function(d){
        render(d.results||[], q ? "result(s) for '"+q+"'" : "asset(s)");
      }).catch(function(e){ meta.textContent = "Error: "+e.message; });
    }

    function reject(id, btn){
      var body = {scope: scopeEl.value, project: projEl.value.trim() || null};
      fetch("/api/images/"+id+"/reject", {method:"POST",
        headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)})
        .then(function(){ var t=btn.closest(".tile"); if(t) t.remove(); });
    }
    window.reject = reject;

    function promote(id, btn){
      var proj = projEl.value.trim();
      if (!proj){ alert("Set the Project field to promote from."); return; }
      btn.disabled = true; btn.textContent = "…";
      fetch("/api/images/"+id+"/promote", {method:"POST",
        headers:{"Content-Type":"application/json"}, body: JSON.stringify({project: proj})})
        .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); })
        .then(function(){ btn.textContent = "✓ global"; })
        .catch(function(e){ btn.disabled=false; btn.textContent="Promote"; alert("Promote failed: "+e.message); });
    }
    window.promote = promote;

    var cutState = {id:null, scope:null, project:null, url:null};
    function cutBody(){
      return {scope: cutState.scope, project: cutState.project,
              model: document.getElementById("cutModalModel").value,
              alpha_matting: document.getElementById("cutModalMatting").checked};
    }
    function openCutout(id){
      cutState.id = id; cutState.scope = scopeEl.value; cutState.project = projEl.value.trim() || null;
      var pr = encodeURIComponent(cutState.project || "");
      document.getElementById("cutBefore").src =
        "/api/images/raw?scope="+encodeURIComponent(cutState.scope)+"&project="+pr+"&id="+id;
      var after = document.getElementById("cutAfter");
      after.style.display = "none"; after.removeAttribute("src");
      document.getElementById("cutHint").style.display = "";
      document.getElementById("cutSaveBtn").disabled = true;
      document.getElementById("cutStatus").textContent = "";
      var tm = (document.getElementById("cutmodel")||{}).value;
      if (tm) document.getElementById("cutModalModel").value = tm;
      document.getElementById("cutModal").style.display = "flex";
    }
    function cutRun(){
      var st = document.getElementById("cutStatus"); st.textContent = "rendering… (first birefnet run downloads ~1GB)";
      var b = document.getElementById("cutRunBtn"); b.disabled = true;
      fetch("/api/images/"+cutState.id+"/cutout/preview", {method:"POST",
        headers:{"Content-Type":"application/json"}, body: JSON.stringify(cutBody())})
        .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.blob(); })
        .then(function(blob){
          if (cutState.url) URL.revokeObjectURL(cutState.url);
          cutState.url = URL.createObjectURL(blob);
          var a = document.getElementById("cutAfter"); a.src = cutState.url; a.style.display = "";
          document.getElementById("cutHint").style.display = "none";
          document.getElementById("cutSaveBtn").disabled = false;
          st.textContent = "preview ready"; b.disabled = false;
        })
        .catch(function(e){ st.textContent = "error: "+e.message; b.disabled = false; });
    }
    function cutSave(){
      var st = document.getElementById("cutStatus"); st.textContent = "saving…";
      var b = document.getElementById("cutSaveBtn"); b.disabled = true;
      fetch("/api/images/"+cutState.id+"/cutout", {method:"POST",
        headers:{"Content-Type":"application/json"}, body: JSON.stringify(cutBody())})
        .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); })
        .then(function(){ cutClose(); run(); })
        .catch(function(e){ st.textContent = "save failed: "+e.message; b.disabled = false; });
    }
    function cutClose(){ document.getElementById("cutModal").style.display = "none"; }
    window.openCutout = openCutout; window.cutRun = cutRun; window.cutSave = cutSave; window.cutClose = cutClose;

    function addByUrl(){
      var url = document.getElementById("addurl").value.trim();
      if (!url){ return; }
      var body = {url: url, scope: scopeEl.value, project: projEl.value.trim() || null,
                  license: document.getElementById("addlic").value.trim() || null,
                  query: qEl.value.trim() || null};
      var b = document.getElementById("addbtn");
      b.disabled = true; b.textContent = "Adding…";
      fetch("/api/images/add", {method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)})
        .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); })
        .then(function(){ document.getElementById("addurl").value=""; run(); })
        .catch(function(e){ alert("Add failed: "+e.message); })
        .finally(function(){ b.disabled=false; b.textContent="Add"; });
    }
    document.getElementById("addbtn").addEventListener("click", addByUrl);

    document.getElementById("go").addEventListener("click", run);
    qEl.addEventListener("keydown", function(e){ if(e.key==="Enter") run(); });

    // Visual selection: highlight the image tile you click.
    document.addEventListener("click", function(e){
      var tile = e.target.closest(".tile");
      if (!tile) return;
      document.querySelectorAll(".tile.selected").forEach(function(t){ t.classList.remove("selected"); });
      tile.classList.add("selected");
    });

    run();  // initial browse
  </script>

  <!-- Cutout (remove background) preview panel -->
  <div id="cutModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
       z-index:300; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto;">
    <div style="background:var(--bg-secondary); border:1px solid var(--border); border-radius:14px;
         padding:24px; width:100%; max-width:780px;">
      <h2 style="margin:0 0 14px; font-size:20px;">Remove background</h2>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:14px;">
        <label style="font-size:13px;">Model
          <select id="cutModalModel" style="margin-left:4px; background:var(--bg-primary);
                  color:var(--text-primary); border:1px solid var(--border); border-radius:6px; padding:4px 8px;">
            <option value="isnet">isnet (fast)</option>
            <option value="birefnet">birefnet (best edges)</option>
            <option value="u2net">u2net</option>
          </select>
        </label>
        <label style="font-size:13px; display:flex; align-items:center; gap:5px;">
          <input type="checkbox" id="cutModalMatting"> alpha matting</label>
        <button class="btn sm" id="cutRunBtn" onclick="cutRun()">Preview</button>
        <span id="cutStatus" style="font-size:12px; color:var(--text-secondary);"></span>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div>
          <div style="font-size:11px; color:var(--text-secondary); margin-bottom:4px;">Before</div>
          <img id="cutBefore" alt="" style="width:100%; border-radius:8px; border:1px solid var(--border);">
        </div>
        <div>
          <div style="font-size:11px; color:var(--text-secondary); margin-bottom:4px;">After (transparent)</div>
          <div style="border-radius:8px; border:1px solid var(--border); min-height:140px;
               display:flex; align-items:center; justify-content:center; overflow:hidden;
               background:repeating-conic-gradient(#c8c8cc 0% 25%, #97979d 0% 50%) 0/22px 22px;">
            <img id="cutAfter" alt="" style="max-width:100%; display:none;">
            <span id="cutHint" style="font-size:12px; color:#333;">Click Preview</span>
          </div>
        </div>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
        <button class="btn ghost" onclick="cutClose()">Close</button>
        <button class="btn" id="cutSaveBtn" onclick="cutSave()" disabled>Save to library</button>
      </div>
    </div>
  </div>
</body>
</html>
