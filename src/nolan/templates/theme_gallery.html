<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOLAN Themes</title>
<link rel="stylesheet" href="/static/nolan.css">
<script src="/static/nav.js" data-active="themes"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg-primary); color:var(--text-primary); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:14px; line-height:1.5; }
  .wrap { max-width:1400px; margin:0 auto; padding:28px 24px 80px; }
  h1 { font-size:26px; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px; }
  .sub { color:var(--text-secondary); font-size:13.5px; margin:0 0 18px; max-width:70ch; }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:20px; }
  .chip { font:600 12px/1 ui-monospace,Menlo,monospace; letter-spacing:.02em; border:1px solid var(--border); border-radius:100px; padding:7px 11px; cursor:pointer; color:var(--text-secondary); background:var(--bg-secondary); user-select:none; }
  .chip.on { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }
  .chip .ct { display:inline-block; margin-left:5px; opacity:.6; font-weight:700; }
  .chip.zero { opacity:.42; }
  input.search { flex:1; min-width:180px; max-width:280px; background:var(--bg-primary); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); padding:8px 11px; font-size:13px; }
  .count { color:var(--text-secondary); font:600 12px/1 ui-monospace,Menlo,monospace; margin-left:auto; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:18px; }
  .tcard { background:var(--bg-secondary); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:0 1px 0 rgba(0,0,0,.03), 0 10px 30px -22px rgba(0,0,0,.4); }

  /* the specimen stage — styled with THE THEME's own tokens (set inline: --ss surface, --st text, --sa accent, --ssh shell, --sd display-font) */
  .stage { aspect-ratio:16/9; background:var(--ss,#eee); color:var(--st,#222); position:relative; overflow:hidden; font-family:var(--sd),"Helvetica Neue",Helvetica,Arial,sans-serif; container-type:size; }
  .stage * { font-family:inherit; }
  .eyebrow { font:700 5.2cqw/1 ui-monospace,Menlo,monospace; letter-spacing:.28em; text-transform:uppercase; opacity:.62; }
  .hero { font-weight:800; font-size:15cqw; line-height:.92; letter-spacing:-.02em; }
  .mk { background:var(--sa,#ff0); color:var(--ss,#111); padding:0 .08em; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
  .rule-v { position:absolute; left:6cqw; top:16cqh; bottom:16cqh; width:2px; background:var(--sa,#ff0); }
  .dash { display:flex; gap:2.4cqw; }
  .dash i { width:7cqw; height:1.6cqh; background:var(--sa,#ff0); border-radius:2px; opacity:.9; }
  .dash i.off { background:var(--st,#222); opacity:.16; }
  .brk { position:absolute; width:8cqw; height:8cqh; border:2px solid var(--st,#222); opacity:.3; }
  .card-shape { background:var(--sa,#ff0); border-radius:8px; }

  .meta { padding:14px 15px 16px; }
  .name { display:flex; align-items:baseline; gap:8px; }
  .name b { font-size:16px; font-weight:700; letter-spacing:-.01em; }
  .name .zh { color:var(--text-secondary); font-size:12px; }
  .tone { font:600 10px/1 ui-monospace,Menlo,monospace; letter-spacing:.1em; text-transform:uppercase; border:1px solid var(--border); border-radius:100px; padding:4px 7px; color:var(--text-secondary); margin-left:auto; }
  .desc { color:var(--text-secondary); font-size:12.5px; line-height:1.5; margin:8px 0 12px; }
  .axis { display:flex; align-items:center; gap:7px; margin:7px 0; flex-wrap:wrap; }
  .axis .lbl { font:600 10px/1 ui-monospace,Menlo,monospace; letter-spacing:.08em; text-transform:uppercase; color:var(--text-secondary); width:74px; flex:none; }
  .acat { font:600 11px/1 ui-monospace,Menlo,monospace; border-radius:6px; padding:5px 7px; background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-primary); cursor:help; }
  .acat.def { background:var(--text-primary); color:var(--bg-primary); border-color:var(--text-primary); }
  .sw { display:flex; gap:0; border-radius:6px; overflow:hidden; border:1px solid var(--border); }
  .sw i { width:26px; height:20px; }
  .font { font:600 11.5px/1 ui-monospace,Menlo,monospace; color:var(--text-secondary); }
  .moods { display:flex; gap:5px; flex-wrap:wrap; }
  .mood { font:600 10.5px/1 ui-monospace,Menlo,monospace; color:var(--text-secondary); background:var(--bg-tertiary); border-radius:5px; padding:4px 6px; }
  .empty { color:var(--text-secondary); padding:40px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Themes</h1>
  <p class="sub">Every theme, at a glance — its palette, type, and <b>composition archetype</b> (the layout its default beat resolves to). The specimen shows a live mini-composition in the theme's own colours. This is also the QA surface for the composition module.</p>
  <div class="toolbar">
    <span class="chip on" data-tone="all" onclick="setTone('all',this)">all</span>
    <span class="chip" data-tone="light" onclick="setTone('light',this)">light</span>
    <span class="chip" data-tone="dark" onclick="setTone('dark',this)">dark</span>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <span id="arch-chips"></span>
    <input class="search" placeholder="filter themes…" oninput="FILTER=this.value.toLowerCase();render()">
    <span class="count" id="count"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
let DATA = { themes: [], archetypes: {} };
let TONE = "all", ARCH = "all", FILTER = "";

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// a theme's specimen vars, from its preview + tokens
function stageVars(t){
  const p = t.preview||{}, k = t.tokens||{};
  const surface = p.surface || k["--surface"] || "#eee";
  const text = p.text || k["--text"] || "#222";
  const accent = p.accent || k["--accent"] || "#ff0";
  const shell = p.shell || k["--shell"] || surface;
  const disp = (t.fonts||{}).displayEn ? `"${t.fonts.displayEn}"` : "";
  return `--ss:${surface};--st:${text};--sa:${accent};--ssh:${shell};--sd:${disp}`;
}

// the mini composition preview for an archetype (styled by the stage's theme vars)
function archetypeStage(a){
  const H = (cls, txt) => `<div class="hero" style="${cls}">${txt}</div>`;
  switch(a){
    case "centered-hero": return `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6cqh">
      <div class="eyebrow">By the numbers</div>${H("font-size:20cqw","<span class='mk'>7</span>")}
      <div class="dash"><i></i><i></i><i></i><i class="off"></i></div></div>`;
    case "editorial-column": return `<div class="rule-v"></div><div style="position:absolute;left:11cqw;top:20cqh;right:38cqw">
      <div class="eyebrow" style="margin-bottom:3cqh">Analysis</div>${H("font-size:12cqw","A quiet<br><span class='mk'>reckoning</span>")}</div>`;
    case "swiss-grid": return `<div style="position:absolute;inset:9cqw;display:grid;grid-template-columns:1fr 1fr 1fr;grid-auto-rows:1fr;gap:3cqw">
      ${Array.from({length:6},(_,i)=>`<div style="background:${i===1?'var(--sa)':'var(--st)'};opacity:${i===1?1:.14};border-radius:3px"></div>`).join("")}</div>`;
    case "split-screen": return `<div style="position:absolute;inset:0;display:flex">
      <div style="flex:1;display:flex;align-items:center;justify-content:center">${H("font-size:13cqw","THIS")}</div>
      <div style="width:2px;background:var(--st);opacity:.3"></div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--sa);color:var(--ss)">${H("font-size:13cqw","THAT")}</div></div>`;
    case "full-bleed-overlay": return `<div style="position:absolute;inset:0;background:radial-gradient(ellipse at 60% 35%,var(--sa),transparent 70%),var(--ssh)"></div>
      <div style="position:absolute;left:8cqw;bottom:12cqh;right:8cqw">${H("font-size:12cqw;color:var(--st)","The whole story")}</div>`;
    case "focal-card": return `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5cqh">
      <div class="card-shape" style="width:30cqw;height:44cqh"></div><div class="eyebrow">the subject</div></div>`;
    case "sidebar": return `<div style="position:absolute;left:0;top:0;bottom:0;width:26cqw;background:var(--sa);color:var(--ss);display:flex;align-items:center;justify-content:center">${H("font-size:18cqw","01")}</div>
      <div style="position:absolute;left:34cqw;top:0;bottom:0;right:8cqw;display:flex;align-items:center">${H("font-size:11cqw","The first<br>step")}</div>`;
    case "framed": return `<div style="position:absolute;inset:11cqw;border:2px solid var(--st);opacity:.9;display:flex;align-items:center;justify-content:center;border-radius:2px">${H("font-size:11cqw;opacity:1","<span class='mk'>Fig 1</span>")}</div>`;
    default: return `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">${H("font-size:11cqw","Aa")}</div>`;
  }
}

function card(t){
  const comp = t.composition||{}, def = comp.default||"", allowed = comp.allowed||[];
  const chips = allowed.map(a=>{
    const intent = (DATA.archetypes[a]||{}).intent||"";
    return `<span class="acat ${a===def?'def':''}" title="${esc(intent)}">${a}</span>`;
  }).join("");
  const sw = ["shell","surface","text","accent"].map(k=>`<i style="background:${(t.preview||{})[k]||'#888'}"></i>`).join("");
  const fonts = `${esc((t.fonts||{}).displayEn||'—')} · ${esc((t.fonts||{}).body||'—')}`;
  const moods = (t.mood||[]).slice(0,6).map(m=>`<span class="mood">${esc(m)}</span>`).join("");
  return `<div class="tcard">
    <div class="stage" style="${stageVars(t)}">${archetypeStage(def)}</div>
    <div class="meta">
      <div class="name"><b>${esc(t.name)}</b><span class="zh">${esc(t.nameZh)}</span><span class="tone">${esc(t.tone)}</span></div>
      <div class="desc">${esc(t.description)}</div>
      <div class="axis"><span class="lbl">composition</span>${chips||'<span class="mood">— none —</span>'}</div>
      <div class="axis"><span class="lbl">palette · type</span><span class="sw">${sw}</span><span class="font">${fonts}</span></div>
      <div class="axis"><span class="lbl">mood</span><div class="moods">${moods}</div></div>
    </div></div>`;
}

function render(){
  const g = document.getElementById("grid");
  let ts = DATA.themes.filter(t=>{
    if (TONE!=="all" && t.tone!==TONE) return false;
    if (ARCH!=="all" && (t.composition||{}).default!==ARCH) return false;  // filter on the theme's DEFAULT (what the specimen shows), not its permissive allowed-set
    if (FILTER && !(t.id+" "+t.name+" "+(t.mood||[]).join(" ")+" "+t.description).toLowerCase().includes(FILTER)) return false;
    return true;
  });
  document.getElementById("count").textContent = `${ts.length} / ${DATA.themes.length} themes`;
  g.innerHTML = ts.length ? ts.map(card).join("") : '<div class="empty">no themes match</div>';
}
function setTone(tone, el){ TONE=tone; document.querySelectorAll("[data-tone]").forEach(c=>c.classList.toggle("on",c===el)); render(); }
function setArch(a, el){ ARCH=(ARCH===a?"all":a); document.querySelectorAll("[data-arch]").forEach(c=>c.classList.toggle("on",c.dataset.arch===ARCH)); render(); }

(async function(){
  DATA = await (await fetch("/api/themes/gallery")).json();
  // how many themes LEAD with each archetype (their default) — makes the filter discriminating + the distribution visible
  const defCount = {};
  DATA.themes.forEach(t=>{ const d=(t.composition||{}).default; if(d) defCount[d]=(defCount[d]||0)+1; });
  // archetype filter chips (from the registry); the badge is the lead-count, dimmed when no theme leads with it
  document.getElementById("arch-chips").innerHTML = Object.keys(DATA.archetypes).map(a=>{
    const n = defCount[a]||0;
    return `<span class="chip${n?'':' zero'}" data-arch="${a}" onclick="setArch('${a}',this)" title="${esc(DATA.archetypes[a].intent)} — ${n} theme${n===1?'':'s'} lead with this layout">${a}<b class="ct">${n}</b></span>`;
  }).join("");
  render();
})();
</script>
</body>
</html>
